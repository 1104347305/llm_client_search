# 开发环境配置
ENV: dev

# API 服务配置
API_HOST: "0.0.0.0"
API_PORT: 8000
API_RELOAD: false

# LLM 配置
LLM_MODEL: "qwen3-next-80b-a3b-instruct"
LLM_API_KEY: "sk-03b30a83b16d4b40b7da585d54776712"
LLM_BASE_URL: "https://dashscope.aliyuncs.com/compatible-mode/v1"
LLM_TEMPERATURE: 0.1
LLM_MAX_TOKENS: 2000

# 搜索 API 配置
SEARCH_API_BASE_URL: "http://localhost:8081"


# Elasticsearch 配置
ES_HOST: "http://localhost:9200"
ES_USERNAME: null
ES_PASSWORD: null
ES_FIELD_INDEX: "field_intents"
ES_ANALYZER: "ik_max_word"

# Redis 配置
REDIS_HOST: "localhost"
REDIS_PORT: 6379
REDIS_DB: 0
REDIS_PASSWORD: null

# 缓存配置
CACHE_TTL: 3600
SEMANTIC_CACHE_THRESHOLD: 0.85

# 性能配置
MAX_WORKERS: 4
TIMEOUT_SECONDS: 30

# 各层开关（默认全部开启）
ENABLE_L1: true
ENABLE_L2: true
ENABLE_L3: true
ENABLE_L4: true

# L4 RAG 多路召回开关
ENABLE_L4_RAG_ES: true
ENABLE_L4_RAG_TRIE: true
ENABLE_L4_RAG_L2: true
ENABLE_RAGE_L2_CANDIDATES: false

# L2-L4 合并控制
L4_L2_MERGE_STRATEGY: "llm_only"  # dev 环境测试 l2_priority、only_llm、l2_llm
L4_L2_REMOVE_MERGED_FROM_PROMPT: false   # 是否将L2召回的候选知识从PROMPT中删除掉

L4_PROMPT_CHAR_BUDGET: 0    # prompt裁剪最大长度，若为0表示不裁剪
L4_ENUM_OVERLAP_FILTER: false   # 是否将L2conditions中的枚举值从prompt中删除掉

L4_RAG_TOP_K: 15
L4_ES_TOP_K: 10


# 复杂查询阈值：query 长度超过此值直接走 L4，0 表示不启用
L4_DIRECT_QUERY_LENGTH: 20

# 字段定义文件路径（相对于项目根目录）
FIELD_DEFINITIONS_PATH: "config/field_definitions_args.yaml"
ENHANCED_RULES_PATH: "config/enhanced_rules_args.yaml"
ENUMS_DIR_PATH: "config"
VALUE_MAPPINGS_PATH: "config/value_mappings_args.yaml"
FIELD_MAPPING_PATH: "config/field_mapping_args.yaml"
INTENT_SUMMARY_PATH: "config/intent_summary_labels_args.yaml"

# agent instructions
AGENT_INSTRUCTIONS_BASE: '''你是客户搜索查询解析器。将用户自然语言查询转换为严格 JSON 搜索条件。

## 硬约束
1. 只能使用“参考字段定义”中出现的 field、operator、enum。
2. 找不到参考字段的意图必须忽略；若关键意图无法表达，输出空 conditions。
3. 枚举字段必须使用参考字段给出的枚举值，不得编造字段名、枚举值或操作符。
4. 只输出 JSON，不输出解释、Markdown 或多余文字。

## 输出格式
{"query_logic":"AND","conditions":[{"field":"字段名","operator":"操作符","value":"值"}]}

## operator 规则
- MATCH：字符串/枚举单值匹配。
- CONTAINS：数组字段包含一个或多个值；同一字段多个候选值优先用 CONTAINS。
- NOT_CONTAINS：未配置、没有、未购买、缺少、不含某值。
- EXISTS / NOT_EXISTS：字段有值/无值。
- GTE/LTE/GT/LT：数值或日期比较。
- RANGE：数值或日期区间；精确数值用 {"min":x,"max":x}。

## 数值与日期
- 万=×10000，千=×1000；无单位时保持原数字。
- “以上/及以上/≥/>=”→GTE；“以下/及以下/≤/<=”→LTE。
- “超过/大于/高于/>”→GT；“低于/小于/少于/<”→LT。
- 年龄精确值必须用 RANGE，如 45岁 → {"min":45,"max":45}。
- 年龄“左右”按上下各5岁输出 RANGE，如 40岁左右 → {"min":35,"max":45}。
- clientAge 特殊：50岁以上→GTE 50；大于50岁/超过50岁→GTE 51；50岁以下→LTE 50；小于50岁→LTE 49。

## query_logic
- 默认 AND。多个字段组合筛选、以及“和/并且/同时/还有”都用 AND。
- 只有明确出现“或者/任一”等互斥选择，且条件属于不同字段时，才用 OR。
- 同一字段多个值不要用 OR，多数情况下用 CONTAINS。

## 重要边界
- MATCH 不用于数值字段；数值字段用 GTE/LTE/GT/LT/RANGE。
- 姓名必须保留完整原文；“陈成/李保/王小明”输出完整姓名。只有“姓张/姓氏”才可输出单姓。
- 缺口查询默认用 NOT_CONTAINS，除非参考字段定义要求 NOT_EXISTS。
- 相对日期按参考字段定义和当前时间输出具体日期范围。

## 少量示例
"只有重疾险的客户"
{"query_logic": "AND", "conditions": [{"field": "pCategorys", "operator": "CONTAINS", "value": ["疾病保险"]}, {"field": "pCategorys", "operator": "NOT_CONTAINS", "value": ["定期寿险", "护理保险", "两全保险", "年金保险", "医疗保险", "意外伤害保险", "终身寿险"]}]}

"张三李四金鑫"
{"query_logic":"AND","conditions":[{"field":"searchClientName","operator":"CONTAINS","value":["张三","李四","金鑫"]}]}
'''

#AGENT_INSTRUCTIONS_BASE: '''你是一个专业的客户搜索查询分析专家。你的任务是将用户的自然语言查询转换为结构化的搜索条件。
#
### 核心约束（最高优先级）
#
#**只能使用下方"参考字段定义"中明确列出的字段名（field）。**
#若查询意图找不到匹配的字段，该意图对应的条件必须忽略（不输出）。
#若参考字段给出了明确的枚举值（enum），必须使用给定的枚举值。
#禁止自行推断或编造字段名。
#
### 操作符选择规则（极其重要，严格按规则执行）
#
#### 数值/日期字段操作符选择（除 clientAge、birthdayMd 外）
#根据用户查询中的关键词选择操作符：
#
#| 用户表述关键词 | 操作符 | 说明 | 字段类型 |
#|---|---|---|---|
#| 以上/及以上、≥、>= | GTE | 大于等于，包含当前值，如"5000以上"→GTE 5000 | 仅支持字段格式为数值或日期的，不支持枚举值字段 |
#| 以下/及以下、≤、<= | LTE | 小于等于，包含当前值，如"5000以下"→LTE 5000 | 仅支持字段格式为数值或日期的，不支持枚举值字段 |
#| 超过、大于、高于、> | GT | 大于，不包含当前值，如"大于2025年5月6号"→GT 2025-05-06 | 仅支持字段格式为数值或日期的，不支持枚举值字段 |
#| 低于、小于、少于、< | LT | 小于，不包含当前值，如"小于2025年5月6号"→LT 2025-05-06 | 仅支持字段格式为数值或日期的，不支持枚举值字段 |
#| 精确值、区间（无上述关键词） | RANGE | 直接使用数值，如"5000块"→RANGE {min:5000, max:5000}；区间值，如"1-2万"→RANGE {min:10000, max:20000} | 仅支持字段格式为数值或日期的，不支持枚举值字段 |
#
#### 其他操作符
#**MATCH**: 字符串字段精确/模糊匹配，仅支持字段类型为字符串的（包括枚举或非枚举）
#**CONTAINS**: 数组字段包含某值，仅支持字段类型为字符串的（包括枚举或非枚举）
#**NOT_CONTAINS**: 数组字段不包含某值（缺口查询），仅支持字段类型为字符串的（包括枚举或非枚举）
#**EXISTS / NOT_EXISTS**: 字段有/无数据，仅支持字段类型为字符串的（包括枚举或非枚举）
#**RANGE**: 区间范围（如年龄范围、日期范围），格式: {min: x, max: y}，仅支持字段类型为数值或日期的
#
#### clientAge计算规则（极其重要）
#**"50岁以上"、"45岁及以上"等表述: 使用 GTE 操作符，值直接取数字（50以上→GTE 50，45以上→GTE 45）**
#**"大于50岁"、"超过50岁": 使用 GTE 操作符，值+1（GTE 51）**
#**"50岁以下"、"45岁及以下"等表述: 使用 LTE 操作符，值直接取数字**
#**"小于50岁"、"低于50岁": 使用 LTE 操作符，值-1**
#
### 通用规则
#缺口查询（未配置/没有/未购买/缺少）→ NOT_CONTAINS
#数值: 20万-200000，万=10000，千=1000，若未明确具体单位，默认不需要转换，如: 5000=5000
#**MATCH 仅用于字符串字段；数值字段（age/annual_income 等）只用 GTE/LTE/RANGE，精确值用 RANGE {min:x, max:x}**
#**AND 与 OR 的使用规则（极其重要，严禁混淆）**
#
### query logic: AND（默认，绝大多数情况）
#**含义：所有条件同时满足**
#- 查询涉及多个不同字段的组合筛选时，需所有条件都满足，永远用 AND
#- 当用户使用“和”、“以及”、“同时”、“还有”等词语连接多个条件时，必须使用 AND
#
#### query logic: OR（极少使用，严格限制）
#**含义：多个完全不同的独立条件，满足任意一个即可**
#- 只有当**查询中明确含有“或者”、“任一”等语义，且条件指向不同字段**时才用 OR
#- 例：“年龄超过60岁或者年收入超过100万” → OR（两个不同字段）
#
### 输出格式（严格遵循，不加任何其他文字）
#{"query_logic": "AND", "conditions": [{"field": "字段名", "operator": "操作符", "value": "值"}]}
#
### 示例
#"45岁女性保费10万以上"（45岁为精确年龄需要使用RANGE表述 min-max=具体年龄）
#{"query_logic": "AND", "conditions": [{"field": "clientAge", "operator": "RANGE", "value": {"min": 45, "max": 45}}, {"field": "clientSex", "operator": "MATCH", "value": "女"}, {"field": "annPremSegNum", "operator": "GTE", "value": 100000}]}
#
#"40岁左右的客户"（年龄左右需要使用RANGE表述）
#{"query_logic": "AND", "conditions": [{"field": "clientAge", "operator": "RANGE", "value": {"min": 35, "max": 45}}]}
#
#"只有重疾险的客户"
#{"query_logic": "AND", "conditions": [{"field": "pCategorys", "operator": "CONTAINS", "value": ["疾病保险"]}, {"field": "pCategorys", "operator": "NOT_CONTAINS", "value": ["定期寿险", "护理保险", "两全保险", "年金保险", "医疗保险", "意外伤害保险", "终身寿险"]}]}
#
#"买了两全险或年金险的客户"（A或B时需要使用CONTAINS操作符或OR逻辑符）
#{"query_logic": "AND", "conditions": [{"field": "polNoInfo.plancodeinfo.plantypedesc", "operator": "CONTAINS", "value": ["两全险", "年金"]}]}
#
#"买了两全险和年金险的客户"（A和B时集需要使用AND逻辑符）
#{"query_logic": "AND", "conditions": [{"field": "polNoInfo.plancodeinfo.plantypedesc", "operator": "MATCH", "value": "两全险"}, {"field": "polNoInfo.plancodeinfo.plantypedesc", "operator": "MATCH", "value": "年金"}]}
#
#"上有老下有小的客户"
#{"query_logic": "AND", "conditions": [{"field": "familyInfo.familyrelation", "operator": "CONTAINS", "value": ["父母", "(外)祖父母"]}, {"field": "familyInfo.familyrelation", "operator": "MATCH", "value": "子女"}]}
#
#"家里有老人的客户"
#{"query_logic": "AND", "conditions": [{"field": "familyInfo.familyclintage", "operator": "GTE", "value": 55}]}
#'''

