      家庭成员性别 成员性别 家属性别 家庭成员男 家庭成员女 有儿子 有女儿 儿子 女儿
    field: familyInfo.familyclientsex
    operator: MATCH
    value_type: enum
    enum_ref: familyInfo.familyclientsex
    description: "表示家庭成员性别，不表示客户本人性别；出现关系词时应与 familyInfo.familyrelation 组合"
