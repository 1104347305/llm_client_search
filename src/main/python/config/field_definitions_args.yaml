  - id: total_coverage_range
    retrieval_text: >
      总保额在 保额区间 保额范围 产品总保额在多少到多少之间
      保障额度在 保障金额范围
    field: insnoSumInsSeqNum
    operator: RANGE
    value_type: numeric
    unit: "元，万=×10000、千=×1000，若未明确标注万或元的单位，则默认为元，不需要转换"
    description: "表示产品总保额区间，不表示总保费区间、年缴保费区间"
