    description: "表示客户持有的寿险险种大类，如年金保险、医疗保险、疾病保险、意外伤害保险等，不表示具体产品名称。"
    notes: "医疗险/重疾险/年金险等口语应归到险种大类；具体产品简称或产品全称应映射到 polNoInfo.plancodeinfo.abbrname 或 polNoInfo.plancodeinfo.planfullname。"
    examples:
      - query: "持有年金保险的客户"
        output: {field: pCategorys, operator: CONTAINS, value: ["年金保险"]}
      - query: "买过终身寿险的客户"
