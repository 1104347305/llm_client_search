  # ==================== 年缴保费 ====================

  - id: annual_premium_gt
    retrieval_text: >
      年缴保费 保费 年缴 缴费 年保费 保费以上 保费超过
      保费大于 高保费 缴费多少 保费金额 年交
    field: annPremSegNum
    operator: GT
    value_type: numeric
    unit: "元，万=×10000，千=×1000，若为明确是万还是千单位，则默认是元"
    description: "表示年缴保费金额（大于），不表示总保费、产品总保额"
    notes: "仅包含大于关系，不包含等于"
    examples:
      - query: "年缴保费1万以上（不含1万）的客户"
        output: {field: annPremSegNum, operator: GT, value: 10000}
      - query: "保费超过5万的客户"
        output: {field: annPremSegNum, operator: GT, value: 50000}
    negative_examples:
      - query: "总保费为50万的客户"
        reason: "这是总保费语义，不是年缴保费；当前不能映射到 annPremSegNum"

  - id: annual_premium_gte
    retrieval_text: >
      年缴保费 保费 年缴 缴费 年保费 保费及以上 保费大于等于
      高保费 缴费多少 保费金额 年交
    field: annPremSegNum
    operator: GTE
    value_type: numeric
    unit: "元，万=×10000，千=×1000，若为明确是万还是千单位，则默认是元"
    description: "表示年缴保费金额（大于等于），不表示总保费、产品总保额"
    examples:
      - query: "年缴保费1万及以上的客户"
        output: {field: annPremSegNum, operator: GTE, value: 10000}
      - query: "年缴保费1万以上的客户"
        output: {field: annPremSegNum, operator: GTE, value: 10000}
      - query: "保费超过5万的客户"
        output: {field: annPremSegNum, operator: GTE, value: 50000}
      - query: "年交保费大于1000的客户（没有万或千单位，默认是元，不用做运算）"
        output: {field: annPremSegNum, operator: GTE, value: 1000}
    negative_examples:
      - query: "总保费为50万的客户"
        reason: "这是总保费语义，不是年缴保费；当前不能映射到 annPremSegNum"
      - query: "总保费90万以上"
        reason: "这是总保费语义，不是年缴保费；当前不能映射到 annPremSegNum"

  - id: annual_premium_range
    retrieval_text: >
      保费在 保费区间 保费范围 年缴保费在多少到多少之间 精确值 等于 正好 刚好
    field: annPremSegNum
    operator: RANGE
    value_type: numeric
    unit: "元，万=×10000，千=×1000"
    description: "表示年缴保费区间，或精确值（不带'以上'/'以下'等范围词时）"
    examples:
      - query: "年缴保费1万到5万的客户"
        output: {field: annPremSegNum, operator: RANGE, value: {min: 10000, max: 50000}}
      - query: "年交保费2万的客户"
        output: {field: annPremSegNum, operator: RANGE, value: {min: 20000, max: 20000}}
      - query: "年交保费5千的客户"
        output: {field: annPremSegNum, operator: RANGE, value: {min: 5000, max: 5000}}
      - query: "年缴保费20000的客户"
        output: {field: annPremSegNum, operator: RANGE, value: {min: 20000, max: 20000}}

