    field: validSinsMatuDateTime
    operator: GT
    value_type: date
    format: "yyyy-MM-dd"
    description: "表示寿险保单到期时间晚于某个日期（不含等于），不表示缴费期满、证件到期"
    notes: "相对时间按当前日期展开为具体日期时间，不输出占位符"
    examples:
