    retrieval_text: >
      犹豫期 犹豫期到期 犹豫期退保 即将过犹豫期 犹豫期内 犹豫期时间
      7天内犹豫期到期 有犹豫期 没有犹豫期 犹豫期不为空 犹豫期为空
