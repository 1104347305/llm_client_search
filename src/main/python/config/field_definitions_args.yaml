      - query: "2026年新添加的客户"
        output: { field: dateCreated, operator: RANGE, value: { min: "2026-01-01 00:00:00", max: "2026-12-31 23:59:59" } }
      - query: "2025年之后添加的客户"
        output: { field: dateCreated, operator: GTE, value: "2025-01-01 00:00:00" }
      - query: "今年新加的客户名单（当前时间为2026-05-11）"
        output: { field: dateCreated, operator: RANGE, value: { min: "2026-01-01 00:00:00", max: "2026-12-31 23:59:59" } }

  # ==================== 保单状态 ====================

  - id: policies_status_contains
    is_supported: true
    retrieval_text: >
      保单状态 有效保单 失效保单 退保 停效 缴费有效 犹豫期退保 到期终止 生效中
      展期 交清 减额 转换终止 失效 死亡理赔 等待续保 有效保单 生效保单 保单生效中 保单状态有效
    field: polNoInfo.polStatus
    operator: CONTAINS
    value_type: enum
    enum_ref: polNoInfo.polStatus
    show_enum_in_prompt: true
    enum_ordered: false
    description: "保单当前状态。有效保单、保单生效、保单状态有效=保单状态包括：交费有效、自垫交清、交清、减额交清、免交、自垫有效。缴费有效保单、交费有效保单=交费有效"
    examples:
      - query: "有效保单"
        output: { field: polNoInfo.polStatus, operator: CONTAINS, value: [ "交费有效", "自垫交清", "交清", "减额交清", "免交", "自垫有效" ] }
      - query: "退保或犹豫期退保的客户"
        output: { field: polNoInfo.polStatus, operator: CONTAINS, value: ["退保", "犹豫期退保"] }
      - query: "保单停了的客户"
        output: { field: polNoInfo.polStatus, operator: CONTAINS, value: ["停效"] }
      - query: "有退保保单的客户"
        output: { field: polNoInfo.polStatus, operator: CONTAINS, value: ["退保"] }
      - query: "保单终止了的客户"
        output: { field: polNoInfo.polStatus, operator: CONTAINS, value: ["效力终止"] }
      - query: "交费有效的保单"
        output: { field: polNoInfo.polStatus, operator: CONTAINS, value: ["交费有效"] }

  - id: policies_status_not_contains
    is_supported: true
    retrieval_text: >
      没有退保保单 没有停效保单 不包含缴费有效保单 不是失效保单客户
    field: polNoInfo.polStatus
    operator: NOT_CONTAINS
    value_type: enum
    enum_ref: polNoInfo.polStatus
    show_enum_in_prompt: true
    description: "表示客户保单状态中不包含某类状态；有效保单=保单生效=保单状态有效=保单状态包括：交费有效、自垫交清、交清、减额交清、免交、自垫有效；缴费有效保单=交费有效保单=交费有效"
    examples:
      - query: "没有退保保单的客户"
        output: { field: polNoInfo.polStatus, operator: NOT_CONTAINS, value: [ "退保" ] }
      - query: "没有停效保单的客户"
        output: { field: polNoInfo.polStatus, operator: NOT_CONTAINS, value: [ "停效" ] }


  # ==================== 投保日期 ====================

  - id: policies_insure_date
    is_supported: false
    retrieval_text: >
      投保日期 投保时间 什么时候投保 投保年份 今年投保 去年投保 本月投保 买保险日期 近一年买保险 买保险时间 什么时候买保险 买保险年份 去年买保险 本月买保险
    field: policies_insure_date
    operator: RANGE
    value_type: date
