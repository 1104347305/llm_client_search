        output: { field: pCategorys, operator: CONTAINS, value: [ "定期寿险" ] }
      - query: "买了重疾险和医疗险的客户"
        output: {field: pCategorys, operator: CONTAINS, value: ["疾病保险", "医疗保险"]}

