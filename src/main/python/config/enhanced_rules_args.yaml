      - '{SEARCH}【年龄-多岁】(?:[的、，, ]{0,3})?【客户价值-A类】(?:[的、，, ]{0,3})?【客户温度】(?:有哪些人|的客户|客户)?'
      - '{SEARCH}【年龄-范围】(?:[的、，, ]{0,3})?【客户价值-A类】(?:[的、，, ]{0,3})?【客户温度】(?:有哪些人|的客户|客户)?'
