  - name: "生日-后天"
    patterns:
      - '{SEARCH}后天{CW}{0,2}生日(?:的客户|客户|的人)?'
      - '{SEARCH}后天(?:有)?(?:哪些|哪几位|多少)?客户(?:会|要|将要|过)?生日(?:吗|么|嘛|的客户|客户)?'
      - '{SEARCH}后天(?:过生日|生日)的?(?:客户|人)(?:有哪些|有谁|名单)?'
      - '{SEARCH}生日{CW}{0,2}在后天(?:的客户|客户|的人)?'
      - '{SEARCH}生日{CW}{0,2}是后天(?:的客户|客户|的人)?'
