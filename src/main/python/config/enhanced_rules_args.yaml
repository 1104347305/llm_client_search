    field: "dateCreated"
    operator: "RANGE"
    value_type: "date_range_dynamic"
    value:
      date_range: "last_n_days"
      days: 7
      format: "yyyy-MM-dd HH:mm:ss"
    priority: 9
    merge_to_llm: true

  - name: "客户添加日-近一个月"
    patterns:
      - '{SEARCH}(?:近|最近|过去)一个?月(?:内|里)?(?:新增|添加|录入|建档|创建)的?(?:的客户|客户)?'
      - '{SEARCH}(?:新增|添加|录入|建档|创建){CW}{0,2}(?:近|最近|过去)一个?月(?:内|里)?的?(?:的客户|客户)?'
    field: "dateCreated"
    operator: "RANGE"
    value_type: "date_range_dynamic"
    value:
      date_range: "past_month_to_today"
      format: "yyyy-MM-dd HH:mm:ss"
    priority: 9
    merge_to_llm: true

  - name: "客户添加日-本月"
    patterns:
      - '{SEARCH}(?:本月|这个月|当月){CW}{0,2}(?:新增|添加|录入|建档|创建)的?(?:的客户|客户)?'
      - '{SEARCH}(?:新增|添加|录入|建档|创建)(?:日期|时间|日)?{CW}{0,2}在?(?:本月|这个月|当月)(?:的客户|客户)?'
    field: "dateCreated"
    operator: "RANGE"
    value_type: "date_range_dynamic"
    value:
      date_range: "current_month"
      format: "yyyy-MM-dd HH:mm:ss"
    priority: 9
    merge_to_llm: true

  - name: "客户添加日-本周"
    patterns:
      - '{SEARCH}(?:本周|这周|这个星期){CW}{0,2}(?:新增|添加|录入|建档|创建)的?(?:的客户|客户)?'
      - '{SEARCH}(?:新增|添加|录入|建档|创建)(?:日期|时间|日)?{CW}{0,2}在?(?:本周|这周|这个星期)(?:的客户|客户)?'
    field: "dateCreated"
    operator: "RANGE"
    value_type: "date_range_dynamic"
    value:
      date_range: "week_offset"
      offset: 0
      format: "yyyy-MM-dd HH:mm:ss"
    priority: 9
    merge_to_llm: true

  - name: "客户添加日-上周"
    patterns:
      - '{SEARCH}(?:上周|上星期|上个星期){CW}{0,2}(?:新增|添加|录入|建档|创建)的?(?:的客户|客户)?'
      - '{SEARCH}(?:新增|添加|录入|建档|创建)(?:日期|时间|日)?{CW}{0,2}在?(?:上周|上星期|上个星期)(?:的客户|客户)?'
    field: "dateCreated"
    operator: "RANGE"
    value_type: "date_range_dynamic"
    value:
      date_range: "week_offset"
      offset: -1
      format: "yyyy-MM-dd HH:mm:ss"
    priority: 9
    merge_to_llm: true

  - name: "客户添加日-今天"
    patterns:
      - '{SEARCH}(?:今天|今日|当天){CW}{0,2}(?:新增|添加|录入|建档|创建)的?(?:的客户|客户)?'
      - '{SEARCH}(?:新增|添加|录入|建档|创建)(?:日期|时间|日)?{CW}{0,2}在?(?:今天|今日|当天)(?:的客户|客户)?'
    field: "dateCreated"
    operator: "RANGE"
    value_type: "date_range_dynamic"
    value:
      date_range: "today"
      format: "yyyy-MM-dd HH:mm:ss"
    priority: 9
    merge_to_llm: true

  - name: "客户添加日-近期"
    patterns:
      - '{SEARCH}(?:最近|近期|新)(?:新增|添加|录入|建档|创建)的?(?:的客户|客户)?'
    field: "dateCreated"
    operator: "RANGE"
    value_type: "date_range_dynamic"
    value:
      date_range: "last_n_days"
      days: 30
      format: "yyyy-MM-dd HH:mm:ss"
    priority: 9

  - name: "客户添加日-存在"
    patterns:
      - '{SEARCH}有(?:添加|录入|建档|创建)(?:日期|时间|日)(?:的客户|客户|的)?'
    field: "dateCreated"
    operator: "EXISTS"
    value_type: "static"
    value: ""
    priority: 9
    merge_to_llm: true

  - name: "客户添加日-不存在"
    patterns:
      - '{SEARCH}(?:没有|无|未)(?:添加|录入|建档|创建)(?:日期|时间|日)(?:的客户|客户|的)?'
    field: "dateCreated"
    operator: "NOT_EXISTS"
    value_type: "static"
    value: ""
    priority: 9
    merge_to_llm: true

  - name: "客户添加日-精确"
    patterns:
      - '{SEARCH}(?:客户)?(?:新增|添加|录入|建档|创建)(?:日期|时间|日)(?:为|是|在|：)?(\d{4}-\d{2}-\d{2})(?:的客户|客户)?'
    field: "dateCreated"
    operator: "RANGE"
    value_type: "date_range_dynamic"
    value:
      date_range: "year_month_day"
      format: "yyyy-MM-dd HH:mm:ss"
    priority: 9

  # ==================== 期交保费 (polNoInfo.totmodalpremsum) ====================

  - name: "期交保费-以上"
    patterns:
      - '{SEARCH}每期(?:交|缴)(?:保费)?(?:超过|大于|>|高于)(\d+)万(?:的客户|客户|的)?'
      - '{SEARCH}(?:每个月|每月|每期)(?:交|缴)(?:保费)?(?:超过|大于|>|高于)(\d+)万(?:的客户|客户|的)?'
    field: "polNoInfo.totmodalpremsum"
    operator: "GT"
    value_type: "capture"
    value:
      group: 1
      transform: "multiply"
      multiplier: 10000
    priority: 9
    merge_to_llm: true

  - name: "期交保费-及以上"
    patterns:
      - '{SEARCH}期交?保费{CW}{0,2}(\d+)万及?以上(?:的客户|客户|的)?'
      - '{SEARCH}期交?保费(?:大于等于|大于或等于|不少于|不低于|>=|≥|及以上|以上)(\d+)万(?:的客户|客户|的)?'
      - '{SEARCH}(?:每个月|每月|每期)(?:交|缴)(?:保费)?(?:大于等于|大于或等于|不少于|不低于|>=|≥|及以上|以上)(\d+)万(?:的客户|客户|的)?'
    field: "polNoInfo.totmodalpremsum"
    operator: "GTE"
    value_type: "capture"
    value:
      group: 1
      transform: "multiply"
      multiplier: 10000
    priority: 9
    merge_to_llm: true

  - name: "期交保费-以下"
    patterns:
      - '{SEARCH}期交?保费(?:小于|低于|<)(\d+)万(?:的客户|客户|的)?'
      - '{SEARCH}(?:每个月|每月|每期)(?:交|缴)(?:保费)?(?:小于|低于|<)(\d+)万(?:的客户|客户|的)?'
    field: "polNoInfo.totmodalpremsum"
    operator: "LT"
    value_type: "capture"
    value:
      group: 1
      transform: "multiply"
      multiplier: 10000
    priority: 9
    merge_to_llm: true

  - name: "期交保费-及以下"
    patterns:
      # 带"万"单位的
      - '{SEARCH}期交?保费{CW}{0,2}(\d+)万及?以下(?:的客户|客户|的)?'
      - '{SEARCH}期交?保费(?:小于等于|小于或等于|不超过|至多|<=|≤)(\d+)万(?:的客户|客户|的)?'
      - '{SEARCH}(?:每个月|每月|每期)(?:交|缴)(?:保费)?(?:小于等于|小于或等于|不超过|至多|<=|≤){CW}{0,2}(\d+)万(?:的客户|客户|的)?'
    field: "polNoInfo.totmodalpremsum"
    operator: "LTE"
    value_type: "capture"
    value:
      group: 1
      transform: "multiply"
      multiplier: 10000
    priority: 9
    merge_to_llm: true

  - name: "期交保费-及以下-精确值"
    patterns:
      # 不带单位的精确值："期交保费不超过5000块的客户"
      - '{SEARCH}(?:期交?保费|每期(?:交|缴)(?:保费)?)(?:不超过|不大于|至多|<=|≤)(\d+)(?:块|元)?(?:的客户|客户|的)?'
      - '{SEARCH}(?:每个月|每月|每期)(?:交|缴)(?:保费)?(?:不超过|不大于|至多|<=|≤){CW}{0,2}(\d+)(?:块|元)?(?:的客户|客户|的)?'
    field: "polNoInfo.totmodalpremsum"
    operator: "LTE"
    value_type: "capture"
    value:
      group: 1
      transform: "int"
    priority: 10
    merge_to_llm: true

  - name: "期交保费-存在"
    patterns:
      - '{SEARCH}有期交?保费(?:的客户|客户)?'
    field: "polNoInfo.totmodalpremsum"
    operator: "GT"
    value_type: "static"
    value: 0
    priority: 9
    merge_to_llm: true

  # ==================== 期交保费-精确值 ====================
  - name: "期交保费-精确值"
    patterns:
      # 精确值匹配（不带"以上"/"以下"）："期交保费5000块的客户"、"期交保费500元的客户"、"每期交保费500元"
      - '{SEARCH}(?:期交?保费|每期(?:交|缴)(?:保费)?|每个月|每月|每期)(?:交|缴)?(?:等于|＝|是|为)?(\d+)(?:块|元)(?:的客户|客户|的)?'
    field: "polNoInfo.totmodalpremsum"
    operator: "RANGE"
    value_type: "exact_range"
    value:
      group: 1
      transform: "exact_range"
      multiplier: 1
    priority: 10
    merge_to_llm: true

  - name: "期交保费-精确值-万"
    patterns:
      # 精确值匹配（万）："期交保费2万的客户"
      - '{SEARCH}(?:期交?保费|每期(?:交|缴)(?:保费)?)(?:等于|＝|是|为)?(\d+)万(?:的客户|客户|的)?'
    field: "polNoInfo.totmodalpremsum"
    operator: "RANGE"
    value_type: "exact_range"
    value:
      group: 1
      transform: "exact_range"
      multiplier: 10000
    priority: 10
    merge_to_llm: true

  - name: "期交保费-精确值-千"
    patterns:
      # 精确值匹配（千）："期交保费5千的客户"
      - '{SEARCH}(?:期交?保费|每期(?:交|缴)(?:保费)?)(?:等于|＝|是|为)?(\d+)千(?:的客户|客户|的)?'
    field: "polNoInfo.totmodalpremsum"
    operator: "RANGE"
    value_type: "exact_range"
    value:
      group: 1
      transform: "exact_range"
      multiplier: 1000
    priority: 10
    merge_to_llm: true

