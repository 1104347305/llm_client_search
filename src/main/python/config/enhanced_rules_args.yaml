      - '{SEARCH}(?:生存金)?利息还有(\d+)千(?:没领|未领)?(?:的客户|客户)?'
      - '{SEARCH}利息未领取总额(\d+)千(?:的客户|客户)?'
      - '{SEARCH}(?:未|未领取|未领)生存金利息(?:总额?|总金额|总额度){CW}{0,2}(\d+)千(?:的客户|客户)?'
    field: "polNoInfo.survivalinterestunpaidamt"
