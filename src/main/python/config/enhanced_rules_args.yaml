      - '{SEARCH}(?:明天|明日)(?:有)?(?:哪些|哪几位|多少)?客户(?:会|要|将要|过)?生日(?:吗|么|嘛|的客户|客户)?'
      - '{SEARCH}(?:明天|明日)(?:过生日|生日)的?(?:客户|人)(?:有哪些|有谁|名单)?'
      - '{SEARCH}生日{CW}{0,2}在明天(?:的客户|客户|的人)?'
      - '{SEARCH}生日{CW}{0,2}是明天(?:的客户|客户|的人)?'
