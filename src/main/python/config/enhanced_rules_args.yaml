  # ==================== 客户号 (clientNo) ====================

  # 理赔案件号（LC前缀，优先于客户号匹配，避免C被误提取）
  - name: "客户号-匹配"
    patterns:
      - '{SEARCH}?(?:客户号|客户编号|客户代码|客户ID|客户id){CW}{0,2}[为是：:]\s*(?<![A-Za-z])([Cc]\d{1,11})'
      - '{SEARCH}?(?:客户号|客户编号|客户代码|客户ID|客户id)(?:匹配|等于|包含|含有|带有)?(?<![A-Za-z])([Cc]\d{1,11})(?:的客户|客户|的)?'
      - '{SEARCH}?(?<![A-Za-z])([Cc]\d{1,11}){CW}{0,2}'   # 无关键词但有强制 C 前缀，负向回溯避免误匹配 LC...
      - '{SEARCH}?(?:客户号|客户编号|客户代码|客户ID|客户id){CW}{0,2}[为是：:]\s*(00\d{3,10})'
      - '{SEARCH}?(?:客户号|客户编号|客户代码|客户ID|客户id)(?:匹配|等于|包含|含有|带有)?(?<![A-Za-z])(00\d{3,10})(?:的客户|客户|的)?'
      - '{SEARCH}?(?<![A-Za-z])(00\d{3,10}){CW}{0,2}'   # 无关键词但有强制 C 前缀，负向回溯避免误匹配 LC...
      - '{SEARCH}?(?:客户号|客户编号|客户代码|客户ID|客户id)(?:前缀|开头|以)(?:为|是)?[：:\s]?([A-Za-z0-9]{1,11})(?:开头)?(?:的客户|客户|的)?'
      - '{SEARCH}?(?:客户号|客户编号|客户代码|客户ID|客户id)([A-Za-z0-9]{1,11})(?:开头|前缀)(?:的客户|客户)?'
      - '{SEARCH}?(?:客户号|客户编号|客户代码|客户ID|客户id){CW}{0,2}(?:尾号|尾数|末尾|后四位|后几位|结尾)(?:为|是)?[：:\s]?([A-Za-z0-9]{1,11})(?:的客户|客户|的)?'
      - '{SEARCH}?(?:客户号|客户编号|客户代码|客户ID|客户id)([A-Za-z0-9]{1,11})(?:尾号|尾数|末尾|后四位|后几位|结尾)(?:的客户|客户|的)?'
      - '{SEARCH}(?:尾号|尾数|末尾|后四位|后几位)(?:为|是)?[：:\s]?([A-Za-z0-9]{1,11})(?:的)?(?:客户号|客户编号|客户代码|客户ID|客户id)(?:的客户|客户|的)?'
      - '{SEARCH}([A-Za-z0-9]{1,11})(?:尾号|尾数|末尾|后四位|后几位)(?:的)?(?:客户号|客户编号|客户代码|客户ID|客户id)(?:的客户|客户|的)?'
      - '{SEARCH}([A-Za-z0-9]{1,11})(?:开头|前缀)(?:的)?(?:客户号|客户编号|客户代码|客户ID|客户id)(?:的客户|客户|的)?'
