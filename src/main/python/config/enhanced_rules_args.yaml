      - '{SEARCH}(?:已配置|已投保|购买了|购买|配置了|配置|配置有|配有|投保了|投保过|购买过|投保|买过|买了|已有|有了|有过|持有|有)?(?:百万医疗|百万医疗产品|百万医疗保险)(?:的客户|客户|名单|的人|人)?'
