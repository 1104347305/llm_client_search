      - '{SEARCH}【寿险VIP】(?:[的、，, ]{0,3})?【客户温度】(?:的客户|客户|名单)?'
      - '{SEARCH}【客户温度】(?:[的、，, ]{0,3})?【寿险VIP】(?:的客户|客户|名单)?'
    priority: 20

  - name: "客户价值+客户温度+寿险产品"
