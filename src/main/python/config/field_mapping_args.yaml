query_fields:
  customer_name: searchClientName
  customer_mobile: clientMobile
  customer_sex: clientSex
  customer_age: clientAge
  customer_birthday: clientBirthday
  customer_id_no: idNo
  customer_no: clientNo
  policy_no: polNo
  family_mobile: familyInfo.familyclientmobile
  family_sex: familyInfo.familyclientsex
  family_age: familyInfo.familyclientage
  family_birthday: familyInfo.familyclientbirthday

field_context_groups:
  client:
    - clientSex
    - clientAge
    - clientBirthday
  family:
    - familyInfo.familyclientsex
    - familyInfo.familyclientage
    - familyInfo.familyclientbirthday

sensitive_field_groups:
  name:
    - searchClientName
    - name
  mobile:
    - clientMobile
    - familyInfo.familyclientmobile
    - mobile
    - mobile_phone
    - phone
  id:
    - idNo
    - id_number
  policy:
    - polNo
    - policy_id
  customer:
    - clientNo
    - customer_id

# 单个客户不可能同时拥有多个值的字段。
# 当最终解析结果只有这一类字段，且出现多个候选值时，将外层 query_logic 修正为 OR。
single_value_or_fields:
  - searchClientName
  - clientTemperature
  - newValueLabel

negation_words:
  - 没
  - 未
  - 无
  - 不
  - 缺
  - 没有
  - 未配置
  - 没买
  - 没购买

position_words:
  - 已配置
  - 已投保
  - 购买了
  - 购买
  - 配置了
  - 配置
  - 配置有
  - 投保了
  - 投保
  - 购买过
  - 买过
  - 买了
  - 已有
  - 有了
  - 有过
  - 持有
  - 有

