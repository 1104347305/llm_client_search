acceptance:
  min_exact_match_rate: 0.95
  max_empty_rate: 0.05
  max_false_positive_rate: 0.02
  max_avg_latency_ms: 3000
codex_enhancement:
  field_enhancements:
  - field: clientTemperature
    examples:
    - query: 客户温度是高温的客户
      output:
        field: clientTemperature
        operator: MATCH
        value: 高温
    - query: 客户温度为中温的客户
      output:
        field: clientTemperature
        operator: MATCH
        value: 中温
    - query: 客户温度属于低温的客户
      output:
        field: clientTemperature
        operator: MATCH
        value: 低温
    - query: 客户温度是冷却的客户
      output:
        field: clientTemperature
        operator: MATCH
        value: 冷却
    - query: 客户温度包含高温和中温的客户
      output:
        field: clientTemperature
        operator: CONTAINS
        value:
        - 高温
        - 中温
    - query: 客户温度不包含冷却的客户
      output:
        field: clientTemperature
        operator: NOT_CONTAINS
        value:
        - 冷却
    - query: 客户温度不包含低温和中温的客户
      output:
        field: clientTemperature
        operator: NOT_CONTAINS
        value:
        - 低温
        - 中温
    negative_examples:
    - query: 客户温度很高
      reason: ‘很高’是自然语言描述，非标准枚举值‘高温’
    - query: 客户温度偏低
      reason: ‘偏低’是模糊描述，非标准枚举值‘低温’或‘冷却’
    - query: 客户温度不是特别高
      reason: 否定性模糊描述，无法映射到标准枚举值
  - field: policies_insure_date
    examples:
    - query: 投保日期在2026年7月1日之后的客户
      output:
        field: policies_insure_date
        operator: GT
        value: '2026-07-01 00:00:00'
    - query: 投保日期在2026年7月1日当天或之后的客户
      output:
        field: policies_insure_date
        operator: GTE
        value: '2026-07-01 00:00:00'
    - query: 投保日期在2026年5月1日之前的客户
      output:
        field: policies_insure_date
        operator: LT
        value: '2026-05-01 00:00:00'
    - query: 投保日期在2026年5月1日当天或之前的客户
      output:
        field: policies_insure_date
        operator: LTE
        value: '2026-05-01 00:00:00'
    - query: 投保日期在2026年1月到2026年6月之间的客户
      output:
        field: policies_insure_date
        operator: RANGE
        value:
          min: '2026-01-01 00:00:00'
          max: '2026-06-30 23:59:59'
    negative_examples:
    - query: 客户最近投了保
      reason: ‘最近’无明确时间边界，无法映射到具体日期
    - query: 客户投保时间比较早
      reason: ‘比较早’是主观描述，无精确日期对应
  - field: clientAge
    examples:
    - query: 客户年龄大于35岁的客户
      output:
        field: clientAge
        operator: GT
        value: 35
    - query: 客户年龄不小于35岁的客户
      output:
        field: clientAge
        operator: GTE
        value: 35
    - query: 客户年龄小于25岁的客户
      output:
        field: clientAge
        operator: LT
        value: 25
    - query: 客户年龄不超过25岁的客户
      output:
        field: clientAge
        operator: LTE
        value: 25
    - query: 客户年龄在20到40岁之间的客户
      output:
        field: clientAge
        operator: RANGE
        value:
          min: 20
          max: 40
    negative_examples:
    - query: 客户年龄偏大
      reason: ‘偏大’是模糊描述，无具体数值对应
    - query: 客户年纪不小了
      reason: 口语化表达，无法映射到精确年龄数值
