rules:
- name: 保单犹豫期截止时间-GT
  patterns:
  - '{SEARCH}保单犹豫期截止时间(?:晚于|在.*之后|大于|超过)(\d{4})年(?:的客户|客户|名单|的人|人)?'
  - '{SEARCH}(\d{4})年(?:晚于|在.*之后|大于|超过)保单犹豫期截止时间(?:的客户|客户|名单|的人|人)?'
  field: policies_cooling_off
  operator: GT
  value_type: capture
  value:
    group: 1
    transform: year_start_datetime
  priority: 8
  merge_to_llm: false
- name: 保单犹豫期截止时间-GTE
  patterns:
  - '{SEARCH}保单犹豫期截止时间(?:不早于|不小于|大于等于|从)(\d{4})年(?:的客户|客户|名单|的人|人)?'
  - '{SEARCH}(\d{4})年(?:不早于|不小于|大于等于|从)保单犹豫期截止时间(?:的客户|客户|名单|的人|人)?'
  field: policies_cooling_off
  operator: GTE
  value_type: capture
  value:
    group: 1
    transform: year_start_datetime
  priority: 8
  merge_to_llm: false
- name: 保单犹豫期截止时间-LT
  patterns:
  - '{SEARCH}保单犹豫期截止时间(?:早于|在.*之前|小于)(\d{4})年(?:的客户|客户|名单|的人|人)?'
  - '{SEARCH}(\d{4})年(?:早于|在.*之前|小于)保单犹豫期截止时间(?:的客户|客户|名单|的人|人)?'
  field: policies_cooling_off
  operator: LT
  value_type: capture
  value:
    group: 1
    transform: year_end_datetime
  priority: 8
  merge_to_llm: false
- name: 保单犹豫期截止时间-LTE
  patterns:
  - '{SEARCH}保单犹豫期截止时间(?:不晚于|不大于|小于等于|截止到|截至)(\d{4})年(?:的客户|客户|名单|的人|人)?'
  - '{SEARCH}(\d{4})年(?:不晚于|不大于|小于等于|截止到|截至)保单犹豫期截止时间(?:的客户|客户|名单|的人|人)?'
  field: policies_cooling_off
  operator: LTE
  value_type: capture
  value:
    group: 1
    transform: year_end_datetime
  priority: 8
  merge_to_llm: false
- name: 保单犹豫期截止时间-今年
  field: policies_cooling_off
  operator: RANGE
  value_type: date_range_dynamic
  value:
    date_range: current_year
    format: yyyy-MM-dd
  patterns:
  - '{SEARCH}(?:今年){CW}{0,2}保单犹豫期截止时间(?:的客户|客户)?'
  - '{SEARCH}保单犹豫期截止时间{CW}{0,2}(?:在)?今年(?:的客户|客户)?'
  priority: 9
- name: 保单犹豫期截止时间-去年
  field: policies_cooling_off
  operator: RANGE
  value_type: date_range_dynamic
  value:
    date_range: last_year
    format: yyyy-MM-dd
  patterns:
  - '{SEARCH}(?:去年){CW}{0,2}保单犹豫期截止时间(?:的客户|客户)?'
  - '{SEARCH}保单犹豫期截止时间{CW}{0,2}(?:在)?去年(?:的客户|客户)?'
  priority: 9
- name: 保单犹豫期截止时间-本月
  field: policies_cooling_off
  operator: RANGE
  value_type: date_range_dynamic
  value:
    date_range: current_month
    format: yyyy-MM-dd
  patterns:
  - '{SEARCH}(?:本月){CW}{0,2}保单犹豫期截止时间(?:的客户|客户)?'
  - '{SEARCH}保单犹豫期截止时间{CW}{0,2}(?:在)?本月(?:的客户|客户)?'
  priority: 9
- name: 保单犹豫期截止时间-存在
  patterns:
  - '{SEARCH}(?:有|存在|已维护)保单犹豫期截止时间(?:信息|字段)?(?:的客户|客户|名单|的人|人)?'
  - '{SEARCH}保单犹豫期截止时间(?:不为空|非空|有值)(?:的客户|客户|名单|的人|人)?'
  field: policies_cooling_off
  operator: EXISTS
  value_type: static
  priority: 8
  merge_to_llm: false
- name: 保单犹豫期截止时间-不存在
  patterns:
  - '{SEARCH}(?:没有|无|未维护)保单犹豫期截止时间(?:信息|字段)?(?:的客户|客户|名单|的人|人)?'
  - '{SEARCH}保单犹豫期截止时间(?:为空|空白|没值|无值)(?:的客户|客户|名单|的人|人)?'
  field: policies_cooling_off
  operator: NOT_EXISTS
  value_type: static
  priority: 9
  merge_to_llm: false
