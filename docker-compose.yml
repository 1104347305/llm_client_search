version: "3.8"

services:
  elasticsearch:
    image: elasticsearch:8.17.1
    container_name: es_field_registry
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false        # 开发环境关闭认证
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # IK 中文分词插件安装（首次需要）
  es-setup:
    image: elasticsearch:8.17.1
    container_name: es_ik_setup
    depends_on:
      elasticsearch:
        condition: service_healthy
    entrypoint: >
      bash -c "
        elasticsearch-plugin install --batch
          https://get.infini.cloud/elasticsearch/analysis-ik/8.17.1
        echo 'IK plugin installed, please restart elasticsearch'
      "
    profiles:
      - setup   # 仅 docker-compose --profile setup up 时运行

  kibana:
    image: kibana:8.17.1
    container_name: kibana_field_registry
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    profiles:
      - kibana  # 仅需要 Kibana 时启动

volumes:
  es_data:
