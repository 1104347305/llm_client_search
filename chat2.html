<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>客户搜索助手</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #f4f6fb;
  --sidebar:   #181e2c;
  --sidebar2:  #232c3d;
  --line:      #2a3348;
  --accent:    #3b7cf4;
  --accent2:   #2563eb;
  --green:     #22c55e;
  --text:      #1a2236;
  --muted:     #64748b;
  --bubble-u:  #3b7cf4;
  --bubble-b:  #ffffff;
  --border:    #e5eaf3;
  --tool-bg:   #f0f7ff;
  --tool-border: #bfdbfe;
  --r:         14px;
}

body { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",sans-serif;
  background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; font-size: 14px; }

/* ──────────── SIDEBAR ──────────── */
.sidebar { width: 256px; background: var(--sidebar); display: flex; flex-direction: column; flex-shrink: 0; }

.sb-logo { padding: 18px 16px 14px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--line); }
.sb-logo .logo-icon { width: 34px; height: 34px; background: var(--accent); border-radius: 9px;
  display: flex; align-items: center; justify-content: center; color: #fff; font-size: 17px; font-weight: 700; flex-shrink: 0; }
.sb-logo .logo-text { color: #f1f5f9; font-size: 14px; font-weight: 600; line-height: 1.3; }
.sb-logo .logo-sub  { color: #64748b; font-size: 11px; margin-top: 1px; }

.sb-btn { margin: 12px 12px 6px; padding: 9px 14px; background: transparent; border: 1px solid var(--line);
  border-radius: 9px; color: #94a3b8; cursor: pointer; font-size: 13px; display: flex; align-items: center;
  gap: 8px; transition: all .15s; }
.sb-btn:hover { background: var(--sidebar2); border-color: #3b4e6a; color: #e2e8f0; }
.sb-btn svg { flex-shrink: 0; }

.sb-section { padding: 10px 16px 4px; font-size: 10.5px; color: #475569; text-transform: uppercase; letter-spacing: .07em; }

.sb-agents { padding: 0 8px 6px; }
.agent-item { padding: 8px 10px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 10px;
  transition: background .12s; }
.agent-item:hover { background: var(--sidebar2); }
.agent-item.active { background: rgba(59,124,244,.18); }
.agent-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
.agent-dot.offline { background: #475569; }
.agent-name { color: #cbd5e1; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.agent-desc { color: #475569; font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.sb-divider { height: 1px; background: var(--line); margin: 8px 12px; }

.sessions-list { flex: 1; overflow-y: auto; padding: 0 8px 4px; }
.sess-item { padding: 8px 10px; border-radius: 8px; cursor: pointer; color: #94a3b8;
  font-size: 12.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  display: flex; align-items: center; gap: 7px; transition: background .12s; }
.sess-item:hover { background: var(--sidebar2); color: #e2e8f0; }
.sess-item.active { background: var(--sidebar2); color: #e2e8f0; }
.sess-icon { flex-shrink: 0; opacity: .5; }

.sb-settings { border-top: 1px solid var(--line); padding: 12px; }
.setting-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; gap: 8px; }
.setting-row label { color: #64748b; font-size: 11.5px; white-space: nowrap; }
.setting-row input, .setting-row select {
  background: #0f172a; border: 1px solid var(--line); border-radius: 6px;
  color: #e2e8f0; padding: 4px 8px; font-size: 12px; width: 120px; outline: none; }
.setting-row input:focus, .setting-row select:focus { border-color: var(--accent); }
.setting-row input[type="text"] { font-family: monospace; }

/* ──────────── MAIN ──────────── */
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

.topbar { height: 52px; background: #fff; border-bottom: 1px solid var(--border);
  padding: 0 24px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.topbar-title { font-size: 14px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 8px; }
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); }
.status-dot.err { background: #ef4444; }
.topbar-right { display: flex; align-items: center; gap: 12px; }
.api-url-label { font-size: 12px; color: var(--muted); font-family: monospace; padding: 4px 10px;
  background: #f8fafc; border: 1px solid var(--border); border-radius: 6px; cursor: pointer; }
.api-url-input { font-size: 12px; color: var(--text); font-family: monospace; padding: 4px 10px;
  background: #f8fafc; border: 1px solid var(--accent); border-radius: 6px; outline: none; width: 220px; }

/* ──────────── CHAT ──────────── */
.chat-area { flex: 1; overflow-y: auto; padding: 24px 32px; display: flex; flex-direction: column; gap: 22px; }

/* Welcome */
.welcome { margin: auto; text-align: center; max-width: 520px; padding: 32px 20px; }
.welcome .w-icon { width: 64px; height: 64px; background: linear-gradient(135deg,#3b7cf4,#7c3aed);
  border-radius: 18px; margin: 0 auto 18px; display: flex; align-items: center; justify-content: center; font-size: 28px; }
.welcome h2 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
.welcome p { color: var(--muted); line-height: 1.65; font-size: 13.5px; margin-bottom: 20px; }
.prompts { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.prompt-card { background: #fff; border: 1px solid var(--border); border-radius: 10px; padding: 11px 13px;
  cursor: pointer; font-size: 12.5px; text-align: left; color: var(--text); line-height: 1.4;
  transition: all .15s; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
.prompt-card:hover { border-color: var(--accent); color: var(--accent); background: #f0f7ff; }

/* Messages */
.msg { display: flex; gap: 10px; animation: fadeIn .2s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
.msg.user { flex-direction: row-reverse; }
.avatar { width: 32px; height: 32px; border-radius: 9px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; }
.avatar.a-bot  { background: linear-gradient(135deg,#3b7cf4,#7c3aed); color: #fff; }
.avatar.a-user { background: #e2e8f0; color: var(--muted); font-size: 11px; }
.bubble { max-width: 680px; min-width: 0; overflow: hidden; }
.bubble-inner { background: var(--bubble-b); border: 1px solid var(--border); border-radius: var(--r); overflow-x: auto;
  padding: 12px 16px; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
.msg.user .bubble-inner { background: var(--bubble-u); color: #fff; border-color: var(--accent2); }
.bubble-name { font-size: 11px; color: var(--muted); margin-bottom: 5px; }
.msg.user .bubble-name { text-align: right; }

/* Tool call */
.tool-call { background: var(--tool-bg); border: 1px solid var(--tool-border); border-radius: 8px;
  padding: 8px 12px; margin-bottom: 8px; font-size: 12px; display: flex; align-items: center; gap: 8px; }
.tool-call .tc-icon { font-size: 14px; }
.tool-call .tc-text { color: #1d4ed8; }
.tool-call .tc-text b { font-weight: 600; }

/* Markdown content */
.md-content { line-height: 1.65; font-size: 13.5px; }
.md-content p { margin-bottom: 8px; }
.md-content p:last-child { margin-bottom: 0; }
.md-content strong { font-weight: 600; }
.md-content em { font-style: italic; }
.md-content code { background: #f1f5f9; padding: 1px 5px; border-radius: 4px; font-family: monospace; font-size: 12.5px; }
.md-content pre { background: #1e293b; color: #e2e8f0; border-radius: 8px; padding: 12px 14px;
  overflow-x: auto; margin: 8px 0; }
.md-content pre code { background: transparent; color: inherit; padding: 0; font-size: 12.5px; }
.md-content ul, .md-content ol { padding-left: 20px; margin: 6px 0; }
.md-content li { margin-bottom: 3px; }
.md-content h1,.md-content h2,.md-content h3 { font-weight: 600; margin: 10px 0 5px; }
.md-content h1 { font-size: 17px; } .md-content h2 { font-size: 15px; } .md-content h3 { font-size: 14px; }
.md-content table { border-collapse: collapse; width: max-content; min-width: 100%; margin: 8px 0; font-size: 13px; }
.md-content th { background: #f8fafc; padding: 7px 10px; border: 1px solid var(--border);
  text-align: left; font-weight: 500; color: var(--muted); white-space: nowrap; }
.md-content td { padding: 7px 10px; border: 1px solid var(--border); vertical-align: top; }
.md-content tr:nth-child(even) td { background: #fafbfd; }
.md-content blockquote { border-left: 3px solid var(--accent); padding-left: 12px; color: var(--muted); margin: 6px 0; }
.md-content hr { border: none; border-top: 1px solid var(--border); margin: 10px 0; }

/* Loading dots */
.typing { display: flex; gap: 5px; align-items: center; padding: 3px 0; height: 22px; }
.typing span { width: 7px; height: 7px; background: var(--accent); border-radius: 50%;
  animation: dot .9s infinite; }
.typing span:nth-child(2){animation-delay:.18s} .typing span:nth-child(3){animation-delay:.36s}
@keyframes dot { 0%,60%,100%{transform:translateY(0);opacity:.6} 30%{transform:translateY(-8px);opacity:1} }

/* ──────────── INPUT ──────────── */
.input-area { background: #fff; border-top: 1px solid var(--border); padding: 14px 32px 18px; flex-shrink: 0; }
.input-box { display: flex; align-items: flex-end; gap: 10px; background: #fff;
  border: 1.5px solid var(--border); border-radius: var(--r); padding: 10px 12px 10px 16px;
  transition: border-color .15s; box-shadow: 0 1px 4px rgba(0,0,0,.05); }
.input-box:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,124,244,.1); }
#msgInput { flex: 1; border: none; outline: none; font-size: 14px; resize: none;
  max-height: 140px; line-height: 1.55; background: transparent; font-family: inherit; color: var(--text); }
#msgInput::placeholder { color: #94a3b8; }
.send-btn { width: 36px; height: 36px; border-radius: 9px; border: none; background: var(--accent);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background .15s; flex-shrink: 0; }
.send-btn:hover:not(:disabled) { background: var(--accent2); }
.send-btn:disabled { background: #cbd5e1; cursor: not-allowed; }
.send-btn svg { color: #fff; }
.input-hint { font-size: 11.5px; color: #94a3b8; text-align: center; margin-top: 7px; }

/* Scrollbar */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 99px; }

/* Toast */
.toast { position: fixed; bottom: 24px; right: 24px; background: #1e293b; color: #f1f5f9;
  padding: 10px 16px; border-radius: 9px; font-size: 13px; z-index: 999;
  animation: slideUp .3s ease; box-shadow: 0 4px 12px rgba(0,0,0,.2); }
@keyframes slideUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <div class="sb-logo">
    <div class="logo-icon">S</div>
    <div>
      <div class="logo-text">客户搜索助手</div>
      <div class="logo-sub">AgentOS Interface</div>
    </div>
  </div>

  <button class="sb-btn" onclick="newConversation()">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
    新对话
  </button>

  <div class="sb-section">可用 Agent</div>
  <div class="sb-agents" id="agentList">
    <div class="agent-item active">
      <div class="agent-dot offline"></div>
      <div><div class="agent-name">加载中...</div></div>
    </div>
  </div>

  <div class="sb-divider"></div>
  <div class="sb-section">历史对话</div>
  <div class="sessions-list" id="sessionList"></div>

  <div class="sb-settings">
    <div class="setting-row">
      <label>AgentOS 地址</label>
      <input type="text" id="agentUrl" value="/agent" onchange="reconnect()">
    </div>
    <div class="setting-row">
      <label>用户 ID</label>
      <input type="text" id="userId" value="A000000">
    </div>
  </div>
</div>

<!-- Main -->
<div class="main">
  <div class="topbar">
    <div class="topbar-title">
      <span class="status-dot" id="statusDot"></span>
      <span id="topbarTitle">连接中...</span>
    </div>
    <div class="topbar-right">
      <span class="api-url-label" id="apiLabel" onclick="copyUrl()">/agent</span>
    </div>
  </div>

  <div class="chat-area" id="chatArea">
    <div class="welcome" id="welcome">
      <div class="w-icon">🔍</div>
      <h2>智能客户搜索</h2>
      <p>用自然语言描述你想找的客户，Agent 会自动解析条件并返回搜索结果</p>
      <div class="prompts">
        <div class="prompt-card" onclick="usePrompt(this)">查找姓王的客户</div>
        <div class="prompt-card" onclick="usePrompt(this)">本月生日的客户</div>
        <div class="prompt-card" onclick="usePrompt(this)">有车有房但没有配置重疾险的客户</div>
        <div class="prompt-card" onclick="usePrompt(this)">子女在上初中或高中的客户</div>
        <div class="prompt-card" onclick="usePrompt(this)">未配置百万医疗保险的客户</div>
        <div class="prompt-card" onclick="usePrompt(this)">寿险VIP黄金级别的客户</div>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-box">
      <textarea id="msgInput" rows="1" placeholder="输入查询，如：45岁以上已婚的客户…"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMsg()" title="发送 (Enter)">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <div class="input-hint">Enter 发送 · Shift+Enter 换行</div>
  </div>
</div>

<script>
/* ─── State ─── */
let agents = [];
let currentAgent = null;
let sessionId = newSessionId();
let sessions = [];    // [{id, title, agentId}]
let isBusy = false;

function newSessionId() { return 'sess_' + Math.random().toString(36).slice(2,10); }

/* ─── Init ─── */
window.addEventListener('DOMContentLoaded', () => { fetchAgents(); });

async function fetchAgents() {
  const base = document.getElementById('agentUrl').value.replace(/\/$/, '');
  try {
    const res = await fetch(`${base}/agents`, { signal: AbortSignal.timeout(15000) });
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();
    // agno returns array or {agents:[...]}
    agents = Array.isArray(data) ? data : (data.agents || data.data || []);
    if (agents.length === 0) throw new Error('no agents');
    renderAgents();
    setAgent(agents[0]);
    setStatus(true);
  } catch (e) {
    setStatus(false);
    document.getElementById('agentList').innerHTML = `
      <div class="agent-item">
        <div class="agent-dot offline"></div>
        <div><div class="agent-name" style="color:#ef4444">连接失败</div>
        <div class="agent-desc">${escH(e.message)}</div></div>
      </div>`;
    // Still allow manual send with fallback
    currentAgent = { agent_id: 'customer-search-assistant', name: '客户搜索助手' };
    document.getElementById('topbarTitle').textContent = '客户搜索助手（离线）';
  }
}

function reconnect() {
  document.getElementById('apiLabel').textContent = document.getElementById('agentUrl').value.replace(/https?:\/\//, '');
  fetchAgents();
}

function renderAgents() {
  document.getElementById('agentList').innerHTML = agents.map((a, i) => `
    <div class="agent-item${i===0?' active':''}" onclick="setAgent(agents[${i}])" data-i="${i}">
      <div class="agent-dot"></div>
      <div>
        <div class="agent-name">${escH(a.name || a.agent_id)}</div>
        ${a.description ? `<div class="agent-desc">${escH(a.description)}</div>` : ''}
      </div>
    </div>`).join('');
}

function setAgent(agent) {
  currentAgent = agent;
  document.getElementById('topbarTitle').textContent = agent.name || agent.agent_id;
  document.querySelectorAll('.agent-item').forEach((el, i) =>
    el.classList.toggle('active', agents[i] === agent));
}

function setStatus(ok) {
  document.getElementById('statusDot').className = 'status-dot' + (ok ? '' : ' err');
}

/* ─── Conversation ─── */
function newConversation() {
  if (document.querySelectorAll('.msg').length > 0) {
    const firstMsg = document.querySelector('.msg.user .bubble-inner');
    sessions.unshift({ id: sessionId, title: firstMsg?.textContent?.slice(0,30) || '对话', agentId: currentAgent?.agent_id });
    renderSessions();
  }
  sessionId = newSessionId();
  document.getElementById('chatArea').innerHTML = document.getElementById('welcome')?.outerHTML || '';
  if (!document.getElementById('welcome')) {
    document.getElementById('chatArea').innerHTML = `
      <div class="welcome" id="welcome">
        <div class="w-icon">🔍</div><h2>智能客户搜索</h2>
        <p>用自然语言描述你想找的客户，Agent 会自动解析条件并返回搜索结果</p>
        <div class="prompts">
          <div class="prompt-card" onclick="usePrompt(this)">45岁以上已婚的高净值客户</div>
          <div class="prompt-card" onclick="usePrompt(this)">本月生日的客户</div>
          <div class="prompt-card" onclick="usePrompt(this)">有车有房但没有配置重疾险的客户</div>
          <div class="prompt-card" onclick="usePrompt(this)">子女在上初中或高中的客户</div>
          <div class="prompt-card" onclick="usePrompt(this)">未配置百万医疗保险的客户</div>
          <div class="prompt-card" onclick="usePrompt(this)">寿险VIP黄金级别的客户</div>
        </div>
      </div>`;
  }
}

function renderSessions() {
  document.getElementById('sessionList').innerHTML = sessions.slice(0,15).map((s,i) => `
    <div class="sess-item${i===0?' active':''}" onclick="highlightSession(${i})">
      <svg class="sess-icon" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      ${escH(s.title)}
    </div>`).join('');
}

function highlightSession(i) {
  document.querySelectorAll('.sess-item').forEach((el,j) => el.classList.toggle('active', i===j));
}

/* ─── Input ─── */
function usePrompt(el) {
  document.getElementById('msgInput').value = el.textContent;
  sendMsg();
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 140) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
}

/* ─── Send & Stream ─── */
async function sendMsg() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || isBusy) return;
  if (!currentAgent) { toast('请先等待 Agent 加载完成'); return; }

  input.value = ''; input.style.height = 'auto';
  hideWelcome();
  appendUserMsg(text);

  const botId = 'bot_' + Date.now();
  appendBotLoading(botId);

  document.getElementById('sendBtn').disabled = true;
  isBusy = true;

  const base = document.getElementById('agentUrl').value.replace(/\/$/, '');
  const agentId = currentAgent.agent_id || currentAgent.name;
  const userId = document.getElementById('userId').value || 'user_001';

  try {
    const form = new FormData();
    form.append('message', text);
    form.append('stream', 'true');
    form.append('user_id', userId);
    form.append('session_id', sessionId);

    const res = await fetch(`${base}/agents/${encodeURIComponent(agentId)}/runs`, {
      method: 'POST', body: form
    });

    if (!res.ok) {
      const err = await res.text();
      throw new Error(`HTTP ${res.status}: ${err.slice(0,200)}`);
    }

    await readStream(res, botId);

  } catch (e) {
    setBotError(botId, e.message);
  } finally {
    document.getElementById('sendBtn').disabled = false;
    isBusy = false;
    scrollBottom();
  }
}

async function readStream(res, botId) {
  const reader = res.body.getReader();
  const dec = new TextDecoder();
  let buf = '';
  let contentEl = null;
  let fullText = '';

  // SSE fields for current event block
  let evtType = '';
  let evtData = '';

  function dispatchEvent() {
    if (!evtData) { evtType = ''; evtData = ''; return; }
    if (evtData === '[DONE]') { evtType = ''; evtData = ''; return; }
    try {
      const obj = JSON.parse(evtData);
      // merge event type from SSE field if obj doesn't have it
      if (!obj.event && evtType) obj.event = evtType;
      contentEl = handleEvent(obj, botId, contentEl, fullText);
      const chunk = obj.content || obj.delta?.content || obj.text || '';
      if (chunk) fullText += chunk;
    } catch (_) { /* malformed data, ignore */ }
    evtType = ''; evtData = '';
  }

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += dec.decode(value, { stream: true });

    // Process complete lines
    let nlIdx;
    while ((nlIdx = buf.indexOf('\n')) !== -1) {
      const line = buf.slice(0, nlIdx).replace(/\r$/, '');
      buf = buf.slice(nlIdx + 1);

      if (line === '') {
        // Blank line → dispatch accumulated SSE event
        dispatchEvent();
      } else if (line.startsWith('data:')) {
        evtData = line.slice(5).trimStart();
      } else if (line.startsWith('event:')) {
        evtType = line.slice(6).trim();
      }
      // ignore id:, retry:, comment lines (:...)
    }
  }
  // Flush any remaining
  dispatchEvent();

  if (!contentEl) setBotError(botId, '未收到响应');
}

function handleEvent(evt, botId, contentEl, fullText) {
  const type = evt.event || evt.type || '';

  // Tool call events
  if (type.includes('ToolCallStarted') || type === 'tool_call') {
    const name = evt.tool?.name || evt.function?.name || evt.name || '搜索中';
    addToolCall(botId, name);
    return contentEl;
  }

  // Content events — fullText is accumulated by caller before handleEvent
  const chunk = evt.content || evt.delta?.content || evt.text || '';
  if (chunk) {
    contentEl = ensureContentEl(botId, contentEl);
    // fullText already includes this chunk (added by caller after handleEvent)
    renderMd(contentEl, fullText + chunk);
    scrollBottom();
  }

  // Completed — re-render with final fullText
  if (type.includes('Completed') || type === 'done' || evt.done) {
    if (contentEl) renderMd(contentEl, fullText);
    scrollBottom();
  }

  return contentEl;
}

function ensureContentEl(botId, existing) {
  if (existing) return existing;
  const bot = document.getElementById(botId);
  if (!bot) return null;
  const inner = bot.querySelector('.bubble-inner');
  if (!inner) return null;
  // Remove loading dots
  const typing = inner.querySelector('.typing');
  if (typing) typing.remove();
  const div = document.createElement('div');
  div.className = 'md-content';
  inner.appendChild(div);
  return div;
}

function addToolCall(botId, toolName) {
  const bot = document.getElementById(botId);
  if (!bot) return;
  const inner = bot.querySelector('.bubble-inner');
  if (!inner) return;
  const typing = inner.querySelector('.typing');
  if (typing) typing.remove();
  const tc = document.createElement('div');
  tc.className = 'tool-call';
  tc.innerHTML = `<span class="tc-icon">🔧</span><span class="tc-text"><b>调用工具：</b>${escH(toolName)}</span>
    <div class="typing" style="margin-left:auto"><span></span><span></span><span></span></div>`;
  inner.appendChild(tc);
  scrollBottom();
}

function setBotError(botId, msg) {
  const bot = document.getElementById(botId);
  if (!bot) return;
  const inner = bot.querySelector('.bubble-inner');
  if (inner) inner.innerHTML = `<div style="color:#ef4444;font-size:13px">❌ ${escH(msg)}</div>`;
}

/* ─── DOM helpers ─── */
function hideWelcome() {
  document.getElementById('welcome')?.remove();
}

function appendUserMsg(text) {
  const area = document.getElementById('chatArea');
  const d = document.createElement('div');
  d.className = 'msg user';
  d.innerHTML = `<div class="avatar a-user">你</div>
    <div class="bubble">
      <div class="bubble-name">你</div>
      <div class="bubble-inner">${escH(text)}</div>
    </div>`;
  area.appendChild(d);
  scrollBottom();
}

function appendBotLoading(id) {
  const area = document.getElementById('chatArea');
  const d = document.createElement('div');
  d.className = 'msg bot'; d.id = id;
  const name = currentAgent?.name || 'Agent';
  d.innerHTML = `<div class="avatar a-bot">AI</div>
    <div class="bubble">
      <div class="bubble-name">${escH(name)}</div>
      <div class="bubble-inner"><div class="typing"><span></span><span></span><span></span></div></div>
    </div>`;
  area.appendChild(d);
  scrollBottom();
}

function scrollBottom() {
  const a = document.getElementById('chatArea');
  a.scrollTop = a.scrollHeight;
}

function copyUrl() {
  const url = document.getElementById('agentUrl').value;
  navigator.clipboard?.writeText(url).then(() => toast('已复制'));
}

function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

/* ─── Markdown renderer ─── */
function renderMd(el, text) {
  el.innerHTML = parseMd(text);
}

function parseMd(text) {
  if (!text) return '';
  let s = text
    // code blocks
    .replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
      `<pre><code>${escH(code.trim())}</code></pre>`)
    // inline code
    .replace(/`([^`]+)`/g, (_, c) => `<code>${escH(c)}</code>`)
    // headers
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    // bold
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    // italic
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    // hr
    .replace(/^---$/gm, '<hr>')
    // blockquote
    .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
    // unordered list
    .replace(/^[-*] (.+)$/gm, '<li>$1</li>')
    // ordered list
    .replace(/^\d+\. (.+)$/gm, '<li>$1</li>');

  // wrap consecutive <li> in <ul>
  s = s.replace(/(<li>.*<\/li>\n?)+/g, m => `<ul>${m}</ul>`);

  // tables (simple)
  s = s.replace(/(\|.+\|\n)+/g, tbl => {
    const rows = tbl.trim().split('\n').filter(r => !r.match(/^\|[-| :]+\|$/));
    if (rows.length < 1) return tbl;
    const [head, ...body] = rows;
    const ths = head.split('|').filter((_,i,a)=>i>0&&i<a.length-1).map(c=>`<th>${c.trim()}</th>`).join('');
    const trs = body.map(r => '<tr>' + r.split('|').filter((_,i,a)=>i>0&&i<a.length-1)
      .map(c=>`<td>${c.trim()}</td>`).join('') + '</tr>').join('');
    return `<table><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table>`;
  });

  // paragraphs: split by double newline
  s = s.split(/\n\n+/).map(p => {
    p = p.trim();
    if (!p) return '';
    if (/^<(h[1-3]|ul|ol|pre|table|blockquote|hr)/.test(p)) return p;
    return `<p>${p.replace(/\n/g, '<br>')}</p>`;
  }).join('');

  return s;
}

function escH(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
