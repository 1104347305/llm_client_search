schema: spec-driven

context: |
  Tech stack: Python 3.10+, FastAPI, Pydantic, Loguru, Redis, Elasticsearch, Agno, DashScope-compatible OpenAI API.
  Project type: 智能客户搜索系统，采用四层分流漏斗架构（L1/L2/L3/L4）。
  Domain: 中文自然语言客户查询解析，将自然语言转换为结构化搜索条件。
  关键配置存储在 `config/` 目录下的 YAML 文件中，具体包括 `field_definitions.yaml`、`enhanced_rules.yaml`、`enums/` 目录，以及针对特定环境的 `*_client_search_args.yaml` 文件。
  运行时支持配置热重载及字段重索引功能。
  Current conventions:
  - 所有文档与示例优先使用中文。
  - 规则、字段定义、提示词必须保持语义一致，尤其是 operator、边界条件、时间语义。
  - 对于年龄、日期、枚举范围等高不确定性语义，优先使用规则或统一后处理计算，不依赖 LLM 自由推断。
  - LLM 是兜底层，优先通过 L2 规则、字段召回和配置化约束提升稳定性。
  - 修改配置时要考虑热更新、启动自动重载、字段索引重建和提示词一致性。
  Testing conventions:
  - Use pytest.
  - 任何涉及规则、字段定义、时间计算、prompt 生成的修改，都要补回归测试。
  - 优先添加小而明确的定向测试，不做大范围无关重构。

rules:
  proposal:
    - 使用中文。
    - 先写清楚问题、目标、范围，不要空泛描述。
    - 涉及查询语义时，必须明确 field、operator、value 以及边界口径。
    - 涉及时间语义时，必须写明自然周、自然月、未来 N 天等计算规则。
    - 如有兼容性影响，单独说明对 L2、L4、RAG、热更新的影响范围。
  tasks:
    - 使用中文。
    - 任务拆分要可直接执行，粒度控制在单项可独立验证。
    - 每个任务优先对应一个明确的代码区域或配置文件。
    - 任务中必须包含验证步骤，优先写明具体 pytest 文件。
    - 若涉及配置变更，额外包含热更新或重启验证。
  spec:
    - 使用中文。
    - 需求描述必须落到实际行为，不写抽象目标。
    - 对查询解析类需求，必须给出至少 1 个正例，必要时给出反例。
    - 对 operator、枚举、多值、EXISTS/NOT_EXISTS、RANGE 等语义必须显式说明。
    - 对时间需求必须避免“由模型自行计算日期”这类不稳定描述，改为统一占位符或统一计算层。
