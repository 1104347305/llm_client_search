  # ==================== 保单周年日 ====================

  - id: policy_anniversary
    retrieval_text: >
      保单周年日 保单周年 保单纪念日 周年日 保单生效周年
    field: effAnniversaryDate
    operator: RANGE
    value_type: date
    format: "MM-dd"
    description: "表示保单周年日，不表示投保时间、投保日期、签单日期"
    notes: "该字段表示保单周年日的月日信息，按每年循环语义处理；若查询明确要求投保时间/投保日期，而系统无对应字段，不应映射到此字段"
    examples:
      - query: "保单周年日在2024-01-01的客户"
        output: {field: effAnniversaryDate, operator: RANGE, value: {min: "01-01", max: "01-01"}}
      - query: "2018年7月保单周年日的客户"
        output: {field: effAnniversaryDate, operator: RANGE, value: {min: "07-01", max: "07-31"}}
    negative_examples:
      - query: "2018年7月投保的客户"
        reason: "投保时间与保单周年日不是同一语义，不能映射到 effAnniversaryDate"
      - query: "查找2018年7月投保的客户"
        reason: "投保时间与保单周年日不是同一语义，不能映射到 effAnniversaryDate"
      - query: "最近投保的人"
        reason: "最近投保是投保时间语义，当前不能映射到保单周年日"
      - query: "最近投保保费5000以上有哪些人"
        reason: "其中的最近投保是投保时间语义，不能映射到保单周年日"
      - query: "2020年签单的客户"
        reason: "签单日期不是保单周年日"

