# ============================================================
# RAG 知识库 - 字段查询意图定义
# ============================================================
# 结构说明：
#   id            : 唯一标识
#   retrieval_text: 用于向量检索的自然语言表达（覆盖用户的各种说法）
#   field         : 目标字段名（使用Excel英文名）
#   operator      : 操作符 MATCH/GTE/LTE/RANGE/CONTAINS/NOT_CONTAINS/EXISTS/NOT_EXISTS/NESTED_MATCH
#   value_type    :
#     extract     - 从查询文本直接提取（产品名、姓名、地址等开放域）
#     enum        - 从枚举列表中选取（枚举值在 enum 字段中）
#     numeric     - 数值提取，需按 unit 换算
#     date        - 日期提取，需按 format 格式化
#     static      - 固定值（在 value 字段中）
#     infer       - 需要 LLM 根据 enum 推断（口语→标准值）
#     exists      - 无需值，仅判断字段是否存在
#   enum          : 枚举值列表（value_type=enum/infer 时使用）
#   unit          : 数值换算规则
#   show_enum_in_prompt           : 是否展开全量枚举值（false 时不展开全量枚举值）
#   enum_candidate_limit_in_prompt: 当不展开全量枚举时，最多展示多少个候选枚举
#   format        : 日期格式
#   examples      : 示例查询及输出（用于 few-shot）
#   description   : 字段语义定义（明确是什么）
#   negative_examples: 禁止映射的反例（明确不是什么）
#   notes         : 补充说明
# ============================================================

intents:

  # ==================== 姓名 ====================

  - id: name_exact
    retrieval_text: >
      叫 名字是 姓名 名叫 叫做 名字叫 全名 客户叫
    field: searchClientNameNew
    operator: MATCH
    value_type: extract
    description: "表示客户本人完整姓名，不表示家庭成员、被保人、投保人姓名"
    notes: '当查询直接出现完整中文姓名时，必须保留全名原样输出；如"陈成""李保""张无""金美"应输出完整姓名，不能截断为"陈""李""张""金"，也不能因为名字较少见而省略、跳过或判定为无效。只有明确出现"姓张""姓李"这类姓氏表达时，才可只取姓。'
    examples:
      - query: "叫张三的客户"
        output: {field: searchClientNameNew, operator: MATCH, value: "张三"}
      - query: "名字是李四的客户"
        output: {field: searchClientNameNew, operator: MATCH, value: "李四"}
      - query: "陈成的客户"
        output: {field: searchClientNameNew, operator: MATCH, value: "陈成"}
      - query: "李保本人"
        output: {field: searchClientNameNew, operator: MATCH, value: "李保"}
      - query: "张无的客户"
        output: {field: searchClientNameNew, operator: MATCH, value: "张无"}
      - query: "金美本人"
        output: {field: searchClientNameNew, operator: MATCH, value: "金美"}
    negative_examples:
      - query: "子女叫张三的客户"
        reason: "这是家庭成员姓名，应映射到 familyClientName 并组合 familyRelation"

  - id: name_surname
    retrieval_text: >
      姓 姓氏 百家姓 姓什么 姓张 姓李 姓王 姓陈
    field: searchClientNameNew
    operator: MATCH
    value_type: extract
    notes: '姓氏查询只在问句中明确出现"姓/姓氏"时成立，如"姓张" → value="张"；若查询只是完整姓名（如"陈成""李保""张无""金美"），不能按姓氏查询处理，也不能因为名字较少见就退化成单姓。'
    examples:
      - query: "姓张的客户"
        output: {field: searchClientNameNew, operator: MATCH, value: "张"}
      - query: "姓李的客户"
        output: {field: searchClientNameNew, operator: MATCH, value: "李"}
    negative_examples:
      - query: "陈成的客户"
        reason: "这是完整姓名查询，应输出 value='陈成'，不能截断为姓氏'陈'"
      - query: "李保本人"
        reason: "这是完整姓名查询，应输出 value='李保'，不能截断为姓氏'李'"
      - query: "张无的客户"
        reason: "这是完整姓名查询，应输出 value='张无'，不能截断为姓氏'张'，也不能省略不解析"
      - query: "金美本人"
        reason: "这是完整姓名查询，应输出 value='金美'，不能截断为姓氏'金'，也不能省略不解析"

  - id: name_contains
    retrieval_text: >
      名字带 名字含 名字包含 名字里有 名字中有
    field: searchClientNameNew
    operator: MATCH
    value_type: extract
    notes: '提取关键字，如"名字带伟" → value="伟"'
    examples:
      - query: "名字带伟的客户"
        output: {field: searchClientNameNew, operator: MATCH, value: "伟"}

  # ==================== 手机号 ====================

  - id: mobile_phone
    retrieval_text: >
      客户手机号 客户手机 客户电话 客户联系方式 手机号 手机 电话 联系方式 号码 手机尾号 手机开头 11位手机号 直接输入手机号 1234567890
    field: clientMobile
    operator: MATCH
    value_type: extract
    description: "仅表示客户本人手机号，不表示被保人、投保人、联系人、家庭成员手机号"
    notes: "手机号字段名必须是 clientMobile；只有查询对象明确是客户本人，或未指明对象仅说手机号/电话时，才可映射到该字段"
    examples:
      - query: "客户手机号为133"
        output: {field: clientMobile, operator: MATCH, value: "133"}
      - query: "手机号138开头的客户"
        output: {field: clientMobile, operator: MATCH, value: "138"}
      - query: "手机尾号8888的客户"
        output: {field: clientMobile, operator: MATCH, value: "8888"}
      - query: "15817760299"
        output: {field: clientMobile, operator: MATCH, value: "15817760299"}
    negative_examples:
      - query: "被保人手机号为133XXXXXXxxx"
        reason: "当前没有被保人手机号字段，不能映射到 clientMobile"
      - query: "投保人手机号为133XXXXXXxxx"
        reason: "投保人不是客户本人，语义不一致，不能映射到 clientMobile"
      - query: "联系人手机号为133XXXXXXxxx"
        reason: "联系人手机号与客户手机号不是同一字段，不能误映射"

  # ==================== 性别 ====================

  - id: gender
    retrieval_text: >
      性别 男 女 男性 女性 男客户 女客户 男的 女的 先生 女士
    field: clientSex
    operator: MATCH
    value_type: enum
    enum_ref: clientSex
    description: "表示客户本人性别，不表示家庭成员、被保人、投保人性别"
    examples:
      - query: "男性客户"
        output: {field: clientSex, operator: MATCH, value: "男"}
      - query: "女客户"
        output: {field: clientSex, operator: MATCH, value: "女"}
    negative_examples:
      - query: "子女是男性的客户"
        reason: "这是家庭成员性别，应映射到 familyClientSex 并组合 familyRelation"

  # ==================== 年龄 ====================

  - id: age_gte
    retrieval_text: >
      年龄 岁以上 岁及以上 多少岁以上 年纪大 老年 中老年
      40岁以上 50岁以上 60岁以上 年龄大于 年龄超过
    field: clientAge
    operator: GTE
    value_type: numeric
    unit: "岁，直接取数字，无需换算"
    description: "表示客户本人年龄，不表示家庭成员年龄"
    examples:
      - query: "45岁以上的客户"
        output: {field: clientAge, operator: GTE, value: 45}
      - query: "60岁及以上的客户"
        output: {field: clientAge, operator: GTE, value: 60}
    negative_examples:
      - query: "子女10岁以上的客户"
        reason: "这是家庭成员年龄，应映射到 familyClientAge 并组合 familyRelation"

  - id: age_lte
    retrieval_text: >
      年龄 岁以下 岁及以下 年龄小于 年龄不超过 年轻 年轻客户 未满x岁 小于x岁
    field: clientAge
    operator: LTE
    value_type: numeric
    unit: "岁，直接取数字"
    description: "表示客户本人年龄，不表示家庭成员年龄"
    examples:
      - query: "35岁以下的客户"
        output: {field: clientAge, operator: LTE, value: 35}
    negative_examples:
      - query: "未成年子女的客户"
        reason: "这是家庭成员年龄语义，应映射到 familyClientAge 并组合 familyRelation"

  - id: age_range
    retrieval_text: >
      年龄 年龄范围 到岁之间 岁到岁 年龄区间 x岁到x岁
      30到40岁 中年 青年 老年 年龄段 x岁 30岁
    field: clientAge
    operator: RANGE
    value_type: numeric
    unit: "岁，直接取数字"
    description: "表示客户本人年龄范围，不表示家庭成员年龄范围"
    notes: "语义年龄：青年18-35，中年36-55，老年56-100，未成年0-18；精确年龄（如'35岁'）用 RANGE {min:x,max:x}"
    examples:
      - query: "30到40岁的客户"
        output: {field: clientAge, operator: RANGE, value: {min: 30, max: 40}}
      - query: "中年客户"
        output: {field: clientAge, operator: RANGE, value: {min: 36, max: 55}}
      - query: "35岁的客户"
        output: {field: clientAge, operator: RANGE, value: {min: 35, max: 35}}
    negative_examples:
      - query: "配偶30到40岁的客户"
        reason: "这是家庭成员年龄范围，应映射到 familyClientAge 并组合 familyRelation"

  # ==================== 生日 ====================

  - id: birthday_exact
    retrieval_text: >
      生日 出生日期 出生年月日 生日是 出生于 哪年哪月出生
    field: clientBirthday
    operator: RANGE
    value_type: date
    format: "yyyy-MM-dd HH:mm:ss"
    description: "表示客户本人出生日期，不表示家庭成员出生日期"
    examples:
      - query: "1990年出生的客户"
        output: {field: clientBirthday, operator: RANGE, value: {min: "1990-01-01 00:00:00", max: "1990-12-31 00:00:00"}}
      - query: "1985年5月出生的客户"
        output: {field: clientBirthday, operator: RANGE, value: {min: "1985-05-01 00:00:00", max: "1985-05-31 00:00:00"}}
      - query: "90后客户"
        output: {field: clientBirthday, operator: RANGE, value: {min: "1990-00-01 00:00:00", max: "1999-12-31 00:00:00"}}
    negative_examples:
      - query: "父母1956年出生的客户"
        reason: "这是家庭成员出生日期，应映射到 familyClientBirthday 并组合 familyRelation"

  - id: birthday_gte
    retrieval_text: >
      生日 出生日期 出生年月日 出生于 哪年之后出生 某年之后出生
    field: clientBirthday
    operator: GTE
    value_type: date
    format: "yyyy-MM-dd HH:mm:ss"
    description: "表示客户本人出生日期晚于或等于某个日期"
    examples:
      - query: "1990年之后出生的客户"
        output: {field: clientBirthday, operator: GTE, value: "1990-01-01 00:00:00"}
    negative_examples:
      - query: "父母1956年之后出生的客户"
        reason: "这是家庭成员出生日期，应映射到 familyClientBirthday 并组合 familyRelation"

  - id: birthday_lte
    retrieval_text: >
      生日 出生日期 出生年月日 出生于 哪年之前出生 某年之前出生
    field: clientBirthday
    operator: LTE
    value_type: date
    format: "yyyy-MM-dd HH:mm:ss"
    description: "表示客户本人出生日期早于或等于某个日期"
    examples:
      - query: "1990年之前出生的客户"
        output: {field: clientBirthday, operator: LTE, value: "1990-12-31 23:59:59"}
    negative_examples:
      - query: "父母1956年之前出生的客户"
        reason: "这是家庭成员出生日期，应映射到 familyClientBirthday 并组合 familyRelation"

  - id: birthday_month_day
    retrieval_text: >
      生日月日 月日生日 几月几号生日 生日月份 本月生日 下月生日 生日快到了
    field: birthdayMd
    operator: RANGE
    value_type: date
    format: "MM-dd"
    notes: "只含月日（不含年），格式MM-dd；本月生日取当月1日至月末；下月生日取下月1日至月末；下周生日取下周一至周天；未来一周生日取明天至往后顺延7天；未来一个月生日取明天至往后延顺30天"
    examples:
      - query: "3月15日生日的客户"
        output: {field: birthdayMd, operator: RANGE, value: {min: "03-15", max: "03-15"}}
      - query: "本月生日的客户（当前2026年3月）"
        output: {field: birthdayMd, operator: RANGE, value: {min: "03-01", max: "03-31"}}
      - query: "下个月生日的客户（当前2026年3月）"
        output: {field: birthdayMd, operator: RANGE, value: {min: "04-01", max: "04-30"}}
      - query: "下周生日的客户（当前2026年3月25号）"
        output: { field: birthdayMd, operator: RANGE, value: { min: "03-30", max: "04-05" }}
      - query: "未来一周的客户（当前2026年3月25号）"
        output: { field: birthdayMd, operator: RANGE, value:  { min: "03-26", max: "04-01" }}
      - query: "未来一个月的客户（当前2026年3月25号）"
        output: { field: birthdayMd, operator: RANGE, value: { min: "03-26", max: "04-25" }}

  # ==================== 客户号 ====================

  - id: customer_id
    retrieval_text: >
      客户号 客户编号 客户ID 客户代码
    field: clientNo
    operator: MATCH
    value_type: extract
    examples:
      - query: "客户号C123456的客户"
        output: {field: clientNo, operator: MATCH, value: "C123456"}

  # ==================== 客户价值 ====================

  - id: customer_value_exact
    retrieval_text: >
      客户价值 A类客户 B类客户 C类客户 D类客户 AB类客户
      A1 A2 A3 A4 高价值客户 优质客户 价值等级
    field: newValueLabel
    operator: MATCH
    value_type: enum
    enum_ref: newValueLabel
    description: "表示单个客户价值标签；A类、AB类、客户高价值等分组语义应优先映射到集合查询。排序：F<E<D<C<B<A4<A3<A2<A1。"
    examples:
      - query: "A1类客户"
        output: {field: newValueLabel, operator: MATCH, value: "A1"}
    negative_examples:
      - query: "年缴保费10万以上的客户"
        reason: "这是金额筛选，应映射到 annPremSeg，不是客户价值标签"
      - query: "黄金VIP客户"
        reason: "这是 VIP 等级语义，应优先映射到 vipType，不是客户价值标签"
      - query: "铂金会员客户"
        reason: "这是 VIP 会员语义，不应直接映射到客户价值标签"

  - id: customer_value_group
    retrieval_text: >
      A类客户 B类客户 C类客户 AB类客户 A和B类客户 A类和B类客户
      高价值客户 客户高价值
    field: newValueLabel
    operator: CONTAINS
    value_type: enum
    enum_ref: newValueLabel
    description: "表示客户价值分组集合，如A类= A1/A2/A3/A4，AB类= A1/A2/A3/A4/B；客户高价值= A1/A2/A3/A4/B/C。"
    examples:
      - query: "A类客户"
        output: { field: newValueLabel, operator: CONTAINS, value: ["A1", "A2", "A3", "A4"] }
      - query: "AB类客户"
        output: { field: newValueLabel, operator: CONTAINS, value: ["A1", "A2", "A3", "A4", "B"] }
      - query: "客户高价值的客户"
        output: { field: newValueLabel, operator: CONTAINS, value: ["A1", "A2", "A3", "A4", "B", "C"] }
      - query: "客户价值A3以上的客户"
        output: { field: newValueLabel, operator: CONTAINS, value: [ "A2", "A1" ] }

  - id: customer_value_gte
    retrieval_text: >
      客户价值以上 客户价值及以上 A类以上 A类及以上 B类以上 B类及以上 高价值及以上
    field: newValueLabel
    operator: CONTAINS
    value_type: enum
    enum_ref: newValueLabel
    description: "表示客户价值等级范围，不表示金额区间；“以上”不含边界，“及以上”含边界"
    notes: "价值从高到低：A1>A2>A3>A4>B>C>D>E>F；“B以上”返回 A4/A3/A2/A1，“B及以上”返回 B/A4/A3/A2/A1"
    examples:
      - query: "B类以上客户"
        output:
          query_logic: CONTAINS
          conditions:
            - {field: newValueLabel, operator: CONTAINS, value: ["A4", "A3", "A2", "A1"]}
      - query: "B类及以上客户"
        output:
          query_logic: CONTAINS
          conditions:
            - {field: newValueLabel, operator: CONTAINS, value: ["B", "A4", "A3", "A2", "A1"]}
    negative_examples:
      - query: "保额50万以上的客户"
        reason: "这是保额筛选，应映射到 insnoSumInsSeq，不是客户价值等级"

  # ==================== 客户温度 ====================

  - id: customer_temperature_exact
    retrieval_text: >
      客户温度 高温客户 中温客户 低温客户 冷却客户
      温度 活跃度 客户活跃 意向度 没有联系 联系频繁
    field: clientTemperature
    operator: MATCH
    value_type: enum
    enum_ref: clientTemperature
    description: "表示客户活跃度分层标签，不表示最近联系时间、最后联系日期、联系次数等具体联系记录"
    notes: "根据客户活跃度分类，温度从低到高：冷却<低温<中温<高温；联系频次低、没有联系---》低温；联系频繁、最近有联系--》高温。该字段表示活跃度分层，不是最近联系时间/最后联系日期；若查询明确要求联系时间而系统无对应字段，不应映射到此字段"
    examples:
      - query: "高温客户"
        output: {field: clientTemperature, operator: MATCH, value: "高温"}
      - query: "最近没联系的客户"
        output: {field: clientTemperature, operator: MATCH, value: "低温"}
      - query: "最近联系频繁的客户"
        output: { field: clientTemperature, operator: MATCH, value: "高温" }
    negative_examples:
      - query: "最近30天联系过的客户"
        reason: "这是联系时间范围，不是活跃度标签；当前无明确联系时间字段时不能映射到 clientTemperature"
      - query: "最后联系时间是上周的客户"
        reason: "这是最后联系日期，不是客户温度"

  - id: customer_temperature_group
    retrieval_text: >
      中高温客户 中温和高温客户 中高温人群
    field: clientTemperature
    operator: CONTAINS
    value_type: enum
    enum_ref: clientTemperature
    description: "表示客户温度分组集合，如中高温=中温+高温"
    examples:
      - query: "中高温客户"
        output: { field: clientTemperature, operator: CONTAINS, value: ["中温", "高温"] }

  - id: customer_temperature_gte
    retrieval_text: >
      温度以上 温度及以上 中温以上 中温及以上 低温以上 低温及以上 高温及以上
    field: clientTemperature
    operator: CONTAINS
    value_type: enum
    enum_ref: clientTemperature
    description: "表示客户温度等级范围，不表示联系时间范围；“以上”不含边界，“及以上”含边界"
    notes: "根据客户活跃度分类，温度从低到高：冷却<低温<中温<高温；“中温以上”仅高温，“中温及以上”包含中温和高温"
    examples:
      - query: "中温以上客户"
        output:
          query_logic: CONTAINS
          conditions:
            - {field: clientTemperature, operator: CONTAINS, value: ["高温"]}
      - query: "中温及以上客户"
        output:
          query_logic: CONTAINS
          conditions:
            - {field: clientTemperature, operator: CONTAINS, value: ["中温", "高温"]}
    negative_examples:
      - query: "最近一个月联系频繁的客户"
        reason: "这是最近联系时间范围，不是客户温度等级范围"

  # ==================== 客群标签 ====================

  - id: customer_segment_tag
    retrieval_text: >
      客群标签 客群 人群标签 客户画像 人群分类
      奋斗青年 都市白领 新晋父母 社会中坚 邻退天命 慈爱祖辈 创业新贵 创富一代 荣耀高堂 承富二代 已退小康
