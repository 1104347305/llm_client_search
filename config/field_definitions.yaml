# ============================================================
# RAG 知识库 - 字段查询意图定义
# ============================================================
# 结构说明：
#   id            : 唯一标识
#   retrieval_text: 用于向量检索的自然语言表达（覆盖用户的各种说法）
#   field         : 目标字段名
#   operator      : 操作符 MATCH/GTE/LTE/RANGE/CONTAINS/NOT_CONTAINS/EXISTS/NOT_EXISTS/NESTED_MATCH
#   value_type    :
#     extract     - 从查询文本直接提取（产品名、姓名、地址等开放域）
#     enum        - 从枚举列表中选取（枚举值在 enum 字段中）
#     numeric     - 数值提取，需按 unit 换算
#     date        - 日期提取，需按 format 格式化
#     static      - 固定值（在 value 字段中）
#     infer       - 需要 LLM 根据 enum 推断（口语→标准值）
#     exists      - 无需值，仅判断字段是否存在
#   enum          : 枚举值列表（value_type=enum/infer 时使用）
#   unit          : 数值换算规则
#   format        : 日期格式
#   examples      : 示例查询及输出（用于 few-shot）
#   notes         : 补充说明
# ============================================================

intents:

  # ==================== 姓名 ====================

  - id: name_exact
    retrieval_text: >
      叫 名字是 姓名 名叫 叫做 名字叫 全名 客户叫
    field: name
    operator: MATCH
    value_type: extract
    examples:
      - query: "叫张三的客户"
        output: {field: name, operator: MATCH, value: "张三"}
      - query: "名字是李四的客户"
        output: {field: name, operator: MATCH, value: "李四"}

  - id: name_surname
    retrieval_text: >
      姓 姓氏 百家姓 姓什么 姓张 姓李 姓王 姓陈
    field: name
    operator: MATCH
    value_type: extract
    notes: '姓氏查询只取姓，如"姓张" → value="张"'
    examples:
      - query: "姓张的客户"
        output: {field: name, operator: MATCH, value: "张"}
      - query: "姓李的客户"
        output: {field: name, operator: MATCH, value: "李"}

  - id: name_contains
    retrieval_text: >
      名字带 名字含 名字包含 名字里有 名字中有
    field: name
    operator: MATCH
    value_type: extract
    notes: '提取关键字，如"名字带伟" → value="伟"'
    examples:
      - query: "名字带伟的客户"
        output: {field: name, operator: MATCH, value: "伟"}

  # ==================== 手机号 ====================

  - id: mobile_phone
    retrieval_text: >
      手机号 手机 电话 联系方式 号码 手机尾号 手机开头 11位手机号 直接输入手机号 1234567890
    field: mobile_phone
    operator: MATCH
    value_type: extract
    notes: "手机号字段名必须是 mobile_phone，禁止使用 phone"
    examples:
      - query: "手机号138开头的客户"
        output: {field: mobile_phone, operator: MATCH, value: "138"}
      - query: "手机尾号8888的客户"
        output: {field: mobile_phone, operator: MATCH, value: "8888"}
      - query: "15817760299"
        output: {field: mobile_phone, operator: MATCH, value: "15817760299"}

  # ==================== 性别 ====================

  - id: gender
    retrieval_text: >
      性别 男 女 男性 女性 男客户 女客户 男的 女的 先生 女士
    field: gender
    operator: MATCH
    value_type: enum
    enum: ["男", "女", "未知"]
    examples:
      - query: "男性客户"
        output: {field: gender, operator: MATCH, value: "男"}
      - query: "女客户"
        output: {field: gender, operator: MATCH, value: "女"}

  # ==================== 年龄 ====================

  - id: age_gte
    retrieval_text: >
      年龄 岁以上 岁及以上 多少岁以上 年纪大 老年 中老年
      40岁以上 50岁以上 60岁以上 年龄大于 年龄超过
    field: age
    operator: GTE
    value_type: numeric
    unit: "岁，直接取数字，无需换算"
    examples:
      - query: "45岁以上的客户"
        output: {field: age, operator: GTE, value: 45}
      - query: "60岁及以上的客户"
        output: {field: age, operator: GTE, value: 60}

  - id: age_lte
    retrieval_text: >
      年龄 岁以下 岁及以下 年龄小于 年龄不超过 年轻 年轻客户 未满x岁 小于x岁
    field: age
    operator: LTE
    value_type: numeric
    unit: "岁，直接取数字"
    examples:
      - query: "35岁以下的客户"
        output: {field: age, operator: LTE, value: 35}

  - id: age_range
    retrieval_text: >
      年龄 年龄范围 到岁之间 岁到岁 年龄区间 x岁到x岁
      30到40岁 中年 青年 老年 年龄段 x岁 30岁
    field: age
    operator: RANGE
    value_type: numeric
    unit: "岁，直接取数字"
    notes: "语义年龄：青年18-35，中年36-55，老年56-100，未成年0-18；精确年龄（如'35岁'）用 RANGE {min:x,max:x}，禁止对数值字段使用 MATCH"
    examples:
      - query: "30到40岁的客户"
        output: {field: age, operator: RANGE, value: {min: 30, max: 40}}
      - query: "中年客户"
        output: {field: age, operator: RANGE, value: {min: 36, max: 55}}
      - query: "35岁的客户"
        output: {field: age, operator: RANGE, value: {min: 35, max: 35}}

  # ==================== 学历 ====================

  - id: education_exact
    retrieval_text: >
      学历 毕业 学历是 学历为 什么学历 教育程度 文化程度
      大专 本科 硕士 博士 研究生 高中 中专
    field: education
    operator: MATCH
    value_type: enum
    enum: ["高中", "中专", "大学专科", "大学本科", "硕士研究生", "博士研究生", "博士后"]
    notes: "口语映射：大专→大学专科，本科→大学本科，硕士→硕士研究生，博士→博士研究生"
    examples:
      - query: "本科学历的客户"
        output: {field: education, operator: MATCH, value: "大学本科"}
      - query: "大专学历客户"
        output: {field: education, operator: MATCH, value: "大学专科"}

  - id: education_gte
    retrieval_text: >
      学历以上 学历及以上 本科以上 研究生以上 高学历
    field: education
    operator: CONTAINS
    value_type: enum
    enum: ["高中", "中专", "大学专科", "大学本科", "硕士研究生", "博士研究生", "博士后"]
    notes: "以上查询：列出该学历及更高的所有值，用OR逻辑"
    examples:
      - query: "本科以上学历的客户"
        output:
          query_logic: CONTAINS
          conditions:
            - {field: education, operator: CONTAINS, value: ["大学本科", "硕士研究生", "博士研究生", "博士后"]}

  # ==================== 婚姻状况 ====================

  - id: marital_status
    retrieval_text: >
      婚姻 结婚 已婚 未婚 离婚 离异 丧偶 单身 有配偶
      婚姻状况 结婚了 没结婚 结婚没有
    field: marital_status
    operator: MATCH
    value_type: enum
    enum: ["未婚", "已婚", "离婚", "丧偶", "未知"]
    notes: "口语映射：结婚/新婚/刚结婚→已婚，单身/没结婚→未婚，离异→离婚"
    examples:
      - query: "已婚客户"
        output: {field: marital_status, operator: MATCH, value: "已婚"}
      - query: "离异客户"
        output: {field: marital_status, operator: MATCH, value: "离婚"}

  # ==================== 出生日期 ====================

  - id: client_birth
    retrieval_text: >
      出生 出生年份 出生年月 几几年出生 生于 出生日期
      属什么 生肖 星座
    field: client_birth
    operator: RANGE
    value_type: date
    format: "YYYYMMDD，年份范围：如1980年→{min:19800101, max:19801231}"
    examples:
      - query: "1980年出生的客户"
        output: {field: client_birth, operator: RANGE, value: {min: 19800101, max: 19801231}}

  - id: client_birthday
    retrieval_text: >
      生日 过生日 生日快到 即将过生日 本月生日 下月生日
      生日在 几月几日生日
    field: client_birth_month_and_day
    operator: MATCH
    value_type: date
    format: "MM-DD，需工具获取当前日期计算"
    notes: "时间相关查询需调用工具获取当前日期"
    examples:
      - query: "本月过生日的客户"
        output: {field: client_birth_month_and_day, operator: RANGE, value: {min: "当前月-01", max: "当前月-31"}}

  # ==================== 客户号 ====================

  - id: customer_id
    retrieval_text: >
      客户号 客户编号 客户ID 客户代码
    field: customer_id
    operator: MATCH
    value_type: extract
    examples:
      - query: "客户号C123456的客户"
        output: {field: customer_id, operator: MATCH, value: "C123456"}

  # ==================== 客户添加日 ====================

  - id: customer_added_date
    retrieval_text: >
      添加日期 添加时间 成为客户 加入时间 客户添加 录入时间
      什么时候添加 添加的客户 新加入
    field: customer_added_date
    operator: RANGE
    value_type: date
    format: "YYYYMMDD"
    examples:
      - query: "2024年添加的客户"
        output: {field: customer_added_date, operator: RANGE, value: {min: 20240101, max: 20241231}}

  # ==================== 客户价值 ====================

  - id: customer_value_exact
    retrieval_text: >
      客户价值 A类客户 B类客户 C类客户 D类客户
      A1 A2 A3 A4 高价值客户 优质客户 价值等级
    field: customer_value
    operator: MATCH
    value_type: enum
    enum: ["A1类客户", "A2类客户", "A3类客户", "A4类客户", "B类客户", "C类客户", "D类客户"]
    notes: "高价值→A1类客户，排序：D类客户<C类客户<B类客户<A4类客户<A3类客户<A2类客户<A1类客户"
    examples:
      - query: "A1类客户"
        output: {field: customer_value, operator: MATCH, value: "A1类客户"}
      - query: "高价值客户"
        output: {field: customer_value, operator: MATCH, value: "A1类客户"}

  - id: customer_value_gte
    retrieval_text: >
      客户价值以上 A类以上 B类以上 高价值及以上
    field: customer_value
    operator: CONTAINS
    value_type: enum
    enum: ["A1类客户", "A2类客户", "A3类客户", "A4类客户", "B类客户", "C类客户", "D类客户"]
    notes: "价值从高到低：A1>A2>A3>A4>B>C>D，以上查询列出该级别及更高"
    examples:
      - query: "B类以上客户"
        output:
          query_logic: CONTAINS
          conditions:
            - {field: customer_value, operator: CONTAINS, value: ["A1类客户", "A2类客户", "A3类客户", "A4类客户", "B类客户"]}

  # ==================== 客户温度 ====================

  - id: customer_temperature_exact
    retrieval_text: >
      客户温度 高温客户 中温客户 低温客户 冷却客户
      温度 活跃度 客户活跃 意向度 没有联系 联系频繁
    field: customer_temperature
    operator: MATCH
    value_type: enum
    enum: ["高温", "中温", "低温", "冷却"]
    notes: "根据客户活跃度分类，温度从低到高：冷却<低温<中温<高温；联系频次低、没有联系---》低温；联系频繁、最近有联系--》高温"
    examples:
      - query: "高温客户"
        output: {field: customer_temperature, operator: MATCH, value: "高温"}

  - id: customer_temperature_gte
    retrieval_text: >
      温度以上 中温以上 低温以上 高温及以上 中温及以上
    field: customer_temperature
    operator: CONTAINS
    value_type: enum
    enum: ["高温", "中温", "低温", "冷却"]
    notes: "根据客户活跃度分类，温度从低到高：冷却<低温<中温<高温"
    examples:
      - query: "中温及以上客户"
        output:
          query_logic: CONTAINS
          conditions:
            - {field: customer_temperature, operator: CONTAINS, value: ["中温", "高温"]}

  # ==================== 客群标签 ====================

  - id: customer_segment_tag
    retrieval_text: >
      客群标签 客群 人群标签 客户画像 人群分类
      焦圈中年 鸡娃精英 临退富裕 富裕祖辈 邻退小康
    field: customer_segment_tag
    operator: MATCH
    value_type: enum
    enum: ["焦圈中年", "鸡娃精英", "临退富裕", "富裕祖辈", "邻退小康"]
    examples:
      - query: "鸡娃精英客户"
        output: {field: customer_segment_tag, operator: MATCH, value: "鸡娃精英"}

  # ==================== 经营阶段 ====================

  - id: operation_stage
    retrieval_text: >
      经营阶段 客户阶段 忠诚客户 准客户 潜在客户 新用户
      经营状态 客户关系阶段 是否是客户
    field: operation_stage
    operator: MATCH
    value_type: enum
    enum: ["忠诚客户", "客户", "准客户", "用户", "新用户", "其他"]
    examples:
      - query: "准客户"
        output: {field: operation_stage, operator: MATCH, value: "准客户"}
      - query: "忠诚客户"
        output: {field: operation_stage, operator: MATCH, value: "忠诚客户"}

  # ==================== 寿险VIP ====================

  - id: life_insurance_vip_exact
    retrieval_text: >
      寿险VIP 黄金会员 铂金会员 VIP等级 黄金V1 黄金V2 黄金V3
      铂金V1 原黄金VIP 原铂金VIP 会员等级 VIP客户
    field: life_insurance_vip
    operator: MATCH
    value_type: enum
    enum: ["黄金V1", "黄金V2", "黄金V3", "铂金V1", "原黄金VIP", "原铂金VIP", "全部"]
    notes: "口语映射：黄金→黄金V1，铂金→铂金V1；排序：黄金V1<黄金V2<黄金V3<原黄金VIP<铂金V1<原铂金VIP"
    examples:
      - query: "铂金V1会员"
        output: {field: life_insurance_vip, operator: MATCH, value: "铂金V1"}
      - query: "原黄金VIP客户"
        output: {field: life_insurance_vip, operator: MATCH, value: "原黄金VIP"}

  - id: life_insurance_vip_gte
    retrieval_text: >
      VIP以上 黄金以上 铂金以上 黄金V1以上 黄金V2以上
      VIP等级以上 高VIP 高级会员
    field: life_insurance_vip
    operator: CONTAINS
    value_type: enum
    enum: ["黄金V1", "黄金V2", "黄金V3", "铂金V1", "原黄金VIP", "原铂金VIP"]
    notes: "等级从低到高：黄金V1<黄金V2<黄金V3<铂金V1，以上查询列出该级别及更高"
    examples:
      - query: "铂金以上会员"
        output:
          query_logic: CONTAINS
          conditions:
            - {field: life_insurance_vip, operator: CONTAINS, value: ["铂金V1", "原铂金VIP"]}

  # ==================== 平安VIP ====================

  - id: pingan_vip
    retrieval_text: >
      平安VIP 平安VIP客户 是否平安VIP
    field: pingan_vip
    operator: MATCH
    value_type: enum
    enum: ["是", "否"]
    examples:
      - query: "平安VIP客户"
        output: {field: pingan_vip, operator: MATCH, value: "是"}

  # ==================== 存量客户类型 ====================

  - id: stock_customer_type
    retrieval_text: >
      存量客户 在职有效客户 孤儿单 存续单 纯存续单
      非纯存续单 客户类型 存量类型
    field: stock_customer_type
    operator: MATCH
    value_type: enum
    enum: ["在职有效客户", "纯存续单客户", "非纯存续单客户"]
    notes: "孤儿单/存续单→纯存续单客户"
    examples:
      - query: "孤儿单客户"
        output: {field: stock_customer_type, operator: MATCH, value: "纯存续单客户"}
      - query: "在职有效客户"
        output: {field: stock_customer_type, operator: MATCH, value: "在职有效客户"}

  # ==================== 准客来源 ====================

  - id: prospect_source
    retrieval_text: >
      准客来源 准客 综拓准客 O2O准客 意健险准客
      来源渠道 准客渠道 客户来源
    field: prospect_source
    operator: MATCH
    value_type: enum
    enum: ["综拓准客", "O2O准客", "意健险准客"]
    examples:
      - query: "综拓准客"
        output: {field: prospect_source, operator: MATCH, value: "综拓准客"}

  # ==================== 寿险产品（持有） ====================

  - id: life_insurance_product_has
    retrieval_text: >
      持有产品 买了 有 投保 持有保单 持有寿险 买过
      持有哪款产品 有什么保险 买了什么险 持有某款产品
      平安福 e生保 守护重疾 金尊分红 颐享世家 安佑福
      天年 金越 守护百分百 盛世金越 合家欢
    field: life_insurance_product
    operator: CONTAINS
    value_type: extract
    notes: "值从查询文本中直接提取产品名"
    examples:
      - query: "持有平安福的客户"
        output: {field: life_insurance_product, operator: CONTAINS, value: "平安福"}
      - query: "有e生保的客户"
        output: {field: life_insurance_product, operator: CONTAINS, value: "e生保"}

  - id: life_insurance_product_not
    retrieval_text: >
      没有 未持有 没买 未买 缺少 未配置 不持有某产品
      缺口产品 没有买某款产品
    field: life_insurance_product
    operator: NOT_CONTAINS
    value_type: extract
    examples:
      - query: "没有平安福的客户"
        output: {field: life_insurance_product, operator: NOT_CONTAINS, value: "平安福"}

  # ==================== 持有产品类型 ====================

  - id: held_product_type_has
    retrieval_text: >
      持有产品类型 分红险 投连险 万能险 普通险 产品类型
      分红型 投资连结型 万能型 普通型
    field: held_product_type
    operator: CONTAINS
    value_type: enum
    enum: ["普通型", "分红型", "投资连结型", "万能型"]
    notes: "口语：分红险→分红型，投连险→投资连结型，万能险→万能型"
    examples:
      - query: "持有分红险的客户"
        output: {field: held_product_type, operator: CONTAINS, value: "分红型"}

  - id: held_product_type_not
    retrieval_text: >
      没有分红险 未配置万能险 缺少投连险 没有普通险
    field: held_product_type
    operator: NOT_CONTAINS
    value_type: enum
    enum: ["普通型", "分红型", "投资连结型", "万能型"]
    examples:
      - query: "未配置分红险的客户"
        output: {field: held_product_type, operator: NOT_CONTAINS, value: "分红型"}

  # ==================== 持有产品类别（险种） ====================

  - id: held_product_category_has
    retrieval_text: >
      险种 持有险种 医疗险 意外险 定期险 年金险 养老险
      终身寿险 两全险 重疾 保障类型 持有哪类保险
      医疗保险 意外伤害保险 定期寿险 两全保险 年金保险 终身寿险
      有医疗险 有养老险 有意外险 持有寿险 两全产品
    field: held_product_category
    operator: CONTAINS
    value_type: enum
    enum: ["意外伤害保险", "医疗保险", "定期寿险", "两全保险", "年金保险", "终身寿险"]
    notes: "口语映射：医疗险→医疗保险，意外险→意外伤害保险，年金险/养老险→年金保险，寿险→终身寿险，定期险→定期寿险"
    examples:
      - query: "有医疗险的客户"
        output: {field: held_product_category, operator: CONTAINS, value: "医疗保险"}
