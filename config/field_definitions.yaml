  # ==================== 成员关系 ====================

  - id: family_relation
    retrieval_text: >
      成员关系 家庭关系 家庭成员关系 配偶 父母 子女 兄弟姐妹
      祖父母 孙子女 法定关系 家庭成员
    field: familyRelation
    operator: CONTAINS
    value_type: enum
    enum_ref: familyRelation
    notes: "涉及家庭成员属性时，familyRelation可与年龄、出生日期、性别、姓名等条件组合输出"
    examples:
      - query: "有子女的客户"
        output: {field: familyRelation, operator: CONTAINS, value: "子女"}
      - query: "有配偶的客户"
        output: {field: familyRelation, operator: CONTAINS, value: "配偶"}
      - query: "家里有未成年子女的客户"
        output:
          query_logic: AND
          conditions:
            - {field: familyRelation, operator: CONTAINS, value: "子女"}
            - {field: familyClientAge, operator: RANGE, value: {min: 0, max: 18}}
      - query: "家里有爸妈的客户"
        output: {field: familyRelation, operator: CONTAINS, value: "父母"}

  # ==================== 家庭成员姓名 ====================

  - id: family_client_name
    retrieval_text: >
      家庭成员姓名 成员叫 家属叫 家庭成员名字 成员名字
    field: familyClientName
    operator: NESTED_MATCH
    value_type: extract
    description: "表示家庭成员姓名，不表示客户本人姓名；出现关系词时应与 familyRelation 组合"
    notes: "出现子女/父母/配偶等关系词时应同时输出familyRelation条件"
    examples:
      - query: "家庭成员叫张三的客户"
        output: {field: familyClientName, operator: NESTED_MATCH, value: "张三"}
      - query: "子女叫张三的客户"
        output:
          query_logic: AND
          conditions:
            - {field: familyRelation, operator: CONTAINS, value: "子女"}
            - {field: familyClientName, operator: NESTED_MATCH, value: "张三"}
      - query: "爱人叫李四的客户"
        output:
          query_logic: AND
          conditions:
            - {field: familyRelation, operator: CONTAINS, value: "配偶"}
            - {field: familyClientName, operator: NESTED_MATCH, value: "李四"}
    negative_examples:
      - query: "叫张三的客户"
        reason: "这是客户本人姓名，应映射到 clientName，不是 familyClientName"

