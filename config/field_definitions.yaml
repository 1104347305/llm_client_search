    description: "表示寿险保单到期时间，不表示缴费期满时间、证件有效期"
    examples:
      - query: "2025年寿险到期的客户"
        output: {field: validSinsMatuDate, operator: RANGE, value: {min: "2025-01-01 00:00:00", max: "2025-12-31 00:00:00"}}
    negative_examples:
      - query: "本月缴费期满的客户"
        reason: "这是缴费期满时间，应映射到 effAppEndDate，不是 validSinsMatuDate"
      - query: "证件即将到期的客户"
        reason: "这是证件有效期，应映射到 idValidDate，不是 validSinsMatuDate"

  - id: policy_expiry_date_lte
    retrieval_text: >
      保单即将到期 即将到期 保单快到期 续保提醒 到期前
      3天内到期 10天内到期 30天内到期 60天内到期 近期到期
    field: validSinsMatuDate
    operator: LTE
    value_type: date
    format: "yyyy-MM-dd HH:mm:ss"
    description: "表示寿险保单即将到期时间，不表示缴费期满、证件到期"
    notes: "相对时间按当前日期展开为具体日期时间，不输出占位符"
    examples:
      - query: "30天内寿险到期的客户（当前2026-03-23）"
        output: {field: validSinsMatuDate, operator: LTE, value: "2026-04-22 00:00:00"}
    negative_examples:
      - query: "近30天需要缴费的客户"
        reason: "这是缴费期满时间，应映射到 effAppEndDate，不是保单到期时间"

  - id: policy_expiry_date_range_relative
    retrieval_text: >
      未来一个月即将到期 未来30天即将到期 下个月即将到期
      一个⽉内到期 未来一个月到期 未来30天到期
    field: validSinsMatuDate
    operator: RANGE
    value_type: date
    format: "yyyy-MM-dd HH:mm:ss"
    description: "表示从当前时间起未来一段时间内的寿险保单到期区间，不使用单边 LTE 代替完整区间"
    examples:
      - query: "未来一个月即将到期的客户（当前2026-03-25）"
        output: {field: validSinsMatuDate, operator: RANGE, value: {min: "2026-03-25 00:00:00", max: "2026-04-25 00:00:00"}}

  # ==================== 有效短险保单 ====================

