    field: insnoSumInsSeq
    operator: GTE
    value_type: numeric
    unit: "元，万=×10000"
    description: "表示产品总保额，不表示总保费、年缴保费"
    examples:
      - query: "总保额50万以上的客户"
        output: {field: insnoSumInsSeq, operator: GTE, value: 500000}
    negative_examples:
      - query: "总保费90万以上"
        reason: "这是总保费语义，不是产品总保额，不能映射到 insnoSumInsSeq"

  - id: total_coverage_lte
    retrieval_text: >
      保额不足 保额低 保额较低 保额以下 保额小于
    field: insnoSumInsSeq
    operator: LTE
    value_type: numeric
    unit: "元，万=×10000"
    description: "表示产品总保额上限，不表示总保费上限"
    examples:
      - query: "保额不足50万的客户"
        output: {field: insnoSumInsSeq, operator: LTE, value: 500000}

  # ==================== 保单周年日 ====================

  - id: policy_anniversary
    retrieval_text: >
      保单周年日 保单周年 保单纪念日 周年日 保单生效周年
    field: effAnniversaryDate
    operator: RANGE
    value_type: date
    format: "yyyy-MM-dd HH:mm:ss"
    description: "表示保单周年日，不表示投保时间、投保日期、签单日期"
    notes: "该字段表示保单周年日，不等于投保时间；若查询明确要求投保时间/投保日期，而系统无对应字段，不应映射到此字段"
    examples:
      - query: "保单周年日在2024-01-01的客户"
        output: {field: effAnniversaryDate, operator: RANGE, value: {min: "2024-01-01 00:00:00", max: "2024-01-01 00:00:00"}}
      - query: "2018年7月保单周年日的客户"
        output: {field: effAnniversaryDate, operator: RANGE, value: {min: "2018-07-01 00:00:00", max: "2018-07-31 00:00:00"}}
      - query: "2020年保单周年日的客户"
        output: {field: effAnniversaryDate, operator: RANGE, value: {min: "2020-01-01 00:00:00", max: "2020-12-31 00:00:00"}}
    negative_examples:
      - query: "2018年7月投保的客户"
        reason: "投保时间与保单周年日不是同一语义，不能映射到 effAnniversaryDate"
      - query: "查找2018年7月投保的客户"
        reason: "投保时间与保单周年日不是同一语义，不能映射到 effAnniversaryDate"
      - query: "最近投保的人"
        reason: "最近投保是投保时间语义，当前不能映射到保单周年日"
      - query: "最近投保保费5000以上有哪些人"
        reason: "其中的最近投保是投保时间语义，不能映射到保单周年日"
      - query: "2020年签单的客户"
        reason: "签单日期不是保单周年日"

