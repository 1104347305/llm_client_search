  # ==================== 年缴保费 ====================

  - id: annual_premium_gte
    retrieval_text: >
      年缴保费 保费 年缴 缴费 年保费 保费以上 保费超过
      保费大于 高保费 缴费多少 保费金额
    field: annPremSeg
    operator: GTE
    value_type: numeric
    unit: "元，万=×10000，千=×1000"
    description: "表示年缴保费金额，不表示总保费、产品总保额"
    examples:
      - query: "年缴保费1万以上的客户"
        output: {field: annPremSeg, operator: GTE, value: 10000}
      - query: "保费超过5万的客户"
        output: {field: annPremSeg, operator: GTE, value: 50000}
    negative_examples:
      - query: "总保费为50万的客户"
        reason: "这是总保费语义，不是年缴保费；当前不能映射到 annPremSeg"
      - query: "总保费90万以上"
        reason: "这是总保费语义，不是年缴保费；当前不能映射到 annPremSeg"

  - id: annual_premium_range
    retrieval_text: >
      保费在 保费区间 保费范围 年缴保费在多少到多少之间
    field: annPremSeg
    operator: RANGE
    value_type: numeric
    unit: "元，万=×10000"
    description: "表示年缴保费区间，不表示总保费区间"
    examples:
      - query: "年缴保费1万到5万的客户"
        output: {field: annPremSeg, operator: RANGE, value: {min: 10000, max: 50000}}

  # ==================== 产品总保额 ====================

  - id: total_coverage_gte
    retrieval_text: >
