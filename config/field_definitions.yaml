  # ==================== 保单状态 ====================

  - id: policy_status
    retrieval_text: >
      保单状态 有效保单 失效保单 退保 停效 等待续保
      保单是否有效 缴费有效 自垫有效 展期
      保单在保 保单续保 保单到期 保单失效 保单退保
      生效中 有效中 保单生效 在效期内 保单有效 正在生效
    field: policies.status
    operator: NESTED_MATCH
    value_type: infer
    enum: ["缴费有效", "停效", "失效", "拒保", "犹豫期退保", "取消", "展期", "退保",
           "减额交情", "免交", "自垫有效", "自垫失效", "自垫停效", "自垫交清",
           "贷款超失", "贷款超停", "转换终止", "等待续保", "人为停效", "到期终止",
           "效力终止", "死亡有效", "死亡理赔", "迁出", "终止效率", "交清", "预收"]
    notes: "状态值较多，需要LLM从枚举列表中推断最匹配的值"
    examples:
      - query: "有等待续保保单的客户"
        output: {field: policies.status, operator: NESTED_MATCH, value: "等待续保"}
      - query: "有有效保单的客户"
        output: {field: policies.status, operator: NESTED_MATCH, value: "缴费有效"}

