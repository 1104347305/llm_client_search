  # ==================== 缴费期满 ====================

  - id: eff_app_end_date
    retrieval_text: >
      缴费期满 保费缴清 缴费结束 缴费到期 保单缴费期满
      本月缴费期满 下月缴费期满 今年缴费期满 即将缴费期满
    field: effAppEndDate
    operator: RANGE
    value_type: date
    format: "yyyy-MM-dd HH:mm:ss"
    description: "表示缴费期满时间，不表示保单到期时间、证件有效期"
    notes: "该字段表示缴费期满时间，不等于应缴日/应缴时间；若查询明确要求应缴日、缴费日而系统无对应字段，不应映射到此字段。无具体年份时默认当年；时间部分默认00:00:00；本月/下月按月初到月末展开，近30天按当前日期到未来30天展开"
    examples:
      - query: "本月缴费期满的客户（当前2026年3月）"
        output: {field: effAppEndDate, operator: RANGE, value: {min: "2026-03-01 00:00:00", max: "2026-03-31 00:00:00"}}
      - query: "下个月缴费期满的客户（当前2026年3月）"
        output: {field: effAppEndDate, operator: RANGE, value: {min: "2026-04-01 00:00:00", max: "2026-04-30 00:00:00"}}
      - query: "近30天需要缴费的客户（当前2026-03-23）"
        output: {field: effAppEndDate, operator: RANGE, value: {min: "2026-03-23 00:00:00", max: "2026-04-22 00:00:00"}}
      - query: "今年缴费期满的客户（当前2026年）"
        output: {field: effAppEndDate, operator: RANGE, value: {min: "2026-01-01 00:00:00", max: "2026-12-31 00:00:00"}}
    negative_examples:
      - query: "30天内寿险到期的客户"
        reason: "这是保单到期时间，应映射到 validSinsMatuDate，不是 effAppEndDate"
      - query: "证件即将到期的客户"
        reason: "这是证件有效期，应映射到 idValidDate，不是 effAppEndDate"

  - id: eff_app_end_date_lte
    retrieval_text: >
      缴费期已满 已缴清 缴费已经结束 缴费期结束
      缴费期满了 保费已缴清
    field: effAppEndDate
    operator: LTE
    value_type: date
    format: "yyyy-MM-dd HH:mm:ss"
    description: "表示缴费期满时间早于或等于当前日期，不表示今天当天的精确日期匹配"
    examples:
      - query: "客户缴费期已满（当前2026-03-25）"
        output: {field: effAppEndDate, operator: LTE, value: "2026-03-25 23:59:59"}

  # ==================== 成员出生日期 ====================

  - id: family_client_birthday
    retrieval_text: >
      成员出生日期 家庭成员生日 家属出生日期 成员出生年份
      家庭成员出生 成员生日
    field: familyClientBirthday
    operator: NESTED_MATCH
    value_type: date
    format: "yyyy-MM-dd HH:mm:ss"
    description: "表示家庭成员出生日期，不表示客户本人出生日期；出现关系词时应与 familyRelation 组合"
    notes: "无具体年份时默认当年；时间部分、默认 00:00:00"
    examples:
      - query: "子女1990年出生的客户"
        output:
          query_logic: AND
          conditions:
            - {field: familyRelation, operator: CONTAINS, value: "子女"}
            - {field: familyClientBirthday, operator: RANGE, value: {min: "1990-01-01 00:00:00", max: "1990-12-31 00:00:00"}}
      - query: "父母1956年出生的客户"
        output:
          query_logic: AND
          conditions:
            - {field: familyRelation, operator: CONTAINS, value: "父母"}
            - {field: familyClientBirthday, operator: RANGE, value: {min: "1956-01-01 00:00:00", max: "1956-12-31 00:00:00"}}
      - query: "爱人1988年出生的客户"
        output:
          query_logic: AND
          conditions:
            - {field: familyRelation, operator: CONTAINS, value: "配偶"}
            - {field: familyClientBirthday, operator: RANGE, value: {min: "1988-01-01 00:00:00", max: "1988-12-31 00:00:00"}}
    negative_examples:
      - query: "1990年出生的客户"
        reason: "这是客户本人出生日期，应映射到 clientBirthday，不是 familyClientBirthday"

  - id: family_client_age
    retrieval_text: >
      家庭成员年龄 成员年龄 子女年龄 子女几岁 孩子几岁 儿子年龄 女儿年龄
      父母年龄 配偶年龄 成员多少岁 子女多大 孩子多大
      子女5岁 孩子10岁 成员年龄范围 未成年子女 成年子女
    field: familyClientAge
    operator: RANGE
    value_type: numeric
    unit: "岁，直接取数字；系统会自动将年龄转换为 familyClientBirthday 日期范围"
    description: "表示家庭成员年龄，不表示客户本人年龄；出现关系词时应与 familyRelation 组合"
    notes: "年龄会自动转换为出生日期范围（familyClientBirthday），语义年龄：未成年0-18，青年18-35；出现子女/父母/配偶等关系词时应同时输出familyRelation条件"
    examples:
      - query: "子女5到10岁的客户"
        output:
          query_logic: AND
          conditions:
            - {field: familyRelation, operator: CONTAINS, value: "子女"}
            - {field: familyClientAge, operator: RANGE, value: {min: 5, max: 10}}
      - query: "子女未成年的客户"
        output:
          query_logic: AND
          conditions:
            - {field: familyRelation, operator: CONTAINS, value: "子女"}
            - {field: familyClientAge, operator: RANGE, value: {min: 0, max: 18}}
      - query: "孩子10岁以上的客户"
        output:
          query_logic: AND
          conditions:
            - {field: familyRelation, operator: CONTAINS, value: "子女"}
            - {field: familyClientAge, operator: GTE, value: 10}
      - query: "父母70岁以上的客户"
        output:
          query_logic: AND
          conditions:
            - {field: familyRelation, operator: CONTAINS, value: "父母"}
            - {field: familyClientAge, operator: GTE, value: 70}
      - query: "配偶30到40岁的客户"
        output:
          query_logic: AND
          conditions:
            - {field: familyRelation, operator: CONTAINS, value: "配偶"}
            - {field: familyClientAge, operator: RANGE, value: {min: 30, max: 40}}
      - query: "家里有孩子10岁以上的客户"
        output:
          query_logic: AND
          conditions:
            - {field: familyRelation, operator: CONTAINS, value: "子女"}
            - {field: familyClientAge, operator: GTE, value: 10}
    negative_examples:
      - query: "45岁以上的客户"
        reason: "这是客户本人年龄，应映射到 clientAge，不是 familyClientAge"

