    field: searchJujiaClientGrade
    operator: CONTAINS
    value_type: enum
    enum_ref: searchJujiaClientGrade
    description: "表示居家等级范围；“以上/以下”不含边界，“及以上/及以下”含边界"
    notes: "居家潜客不属于居家会员客户；等级排序：居家潜客<v0.5<v1<v1.5<v2<v2.5<v3"
    examples:
      - query: "居家会员客户"
        output: { field: searchJujiaClientGrade, operator: CONTAINS, value: ["v0.5", "v1", "v1.5", "v2", "v2.5", "v3"] }
      - query: "居家v2以上的客户"
        output: { field: searchJujiaClientGrade, operator: CONTAINS, value: ["v2.5", "v3"] }
      - query: "居家v2及以上的客户"
        output: { field: searchJujiaClientGrade, operator: CONTAINS, value: ["v2", "v2.5", "v3"] }
    negative_examples:
