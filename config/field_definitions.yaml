# ============================================================
# RAG 知识库 - 字段查询意图定义
# ============================================================
# 结构说明：
#   id            : 唯一标识
#   retrieval_text: 用于向量检索的自然语言表达（覆盖用户的各种说法）
#   field         : 目标字段名（使用Excel英文名）
#   operator      : 操作符 MATCH/GTE/LTE/RANGE/CONTAINS/NOT_CONTAINS/EXISTS/NOT_EXISTS/NESTED_MATCH
#   value_type    :
#     extract     - 从查询文本直接提取（产品名、姓名、地址等开放域）
#     enum        - 从枚举列表中选取（枚举值在 enum 字段中）
#     numeric     - 数值提取，需按 unit 换算
#     date        - 日期提取，需按 format 格式化
#     static      - 固定值（在 value 字段中）
#     infer       - 需要 LLM 根据 enum 推断（口语→标准值）
#     exists      - 无需值，仅判断字段是否存在
#   enum          : 枚举值列表（value_type=enum/infer 时使用）
#   unit          : 数值换算规则
#   format        : 日期格式
#   examples      : 示例查询及输出（用于 few-shot）
#   notes         : 补充说明
# ============================================================

intents:

  # ==================== 姓名 ====================

  - id: name_exact
    retrieval_text: >
      叫 名字是 姓名 名叫 叫做 名字叫 全名 客户叫
    field: clientName
    operator: MATCH
    value_type: extract
    examples:
      - query: "叫张三的客户"
        output: {field: clientName, operator: MATCH, value: "张三"}
      - query: "名字是李四的客户"
        output: {field: clientName, operator: MATCH, value: "李四"}

  - id: name_surname
    retrieval_text: >
      姓 姓氏 百家姓 姓什么 姓张 姓李 姓王 姓陈
    field: clientName
    operator: MATCH
    value_type: extract
    notes: '姓氏查询只取姓，如"姓张" → value="张"'
    examples:
      - query: "姓张的客户"
        output: {field: clientName, operator: MATCH, value: "张"}
      - query: "姓李的客户"
        output: {field: clientName, operator: MATCH, value: "李"}

  - id: name_contains
    retrieval_text: >
      名字带 名字含 名字包含 名字里有 名字中有
    field: clientName
    operator: MATCH
    value_type: extract
    notes: '提取关键字，如"名字带伟" → value="伟"'
    examples:
      - query: "名字带伟的客户"
        output: {field: clientName, operator: MATCH, value: "伟"}

  # ==================== 手机号 ====================

  - id: mobile_phone
    retrieval_text: >
      手机号 手机 电话 联系方式 号码 手机尾号 手机开头 11位手机号 直接输入手机号 1234567890
    field: clientMobile
    operator: MATCH
    value_type: extract
    notes: "手机号字段名必须是 clientMobile"
    examples:
      - query: "手机号138开头的客户"
        output: {field: clientMobile, operator: MATCH, value: "138"}
      - query: "手机尾号8888的客户"
        output: {field: clientMobile, operator: MATCH, value: "8888"}
      - query: "15817760299"
        output: {field: clientMobile, operator: MATCH, value: "15817760299"}

  # ==================== 性别 ====================

  - id: gender
    retrieval_text: >
      性别 男 女 男性 女性 男客户 女客户 男的 女的 先生 女士
    field: clientSex
    operator: MATCH
    value_type: enum
    enum: ["男", "女"]
    examples:
      - query: "男性客户"
        output: {field: clientSex, operator: MATCH, value: "男"}
      - query: "女客户"
        output: {field: clientSex, operator: MATCH, value: "女"}

  # ==================== 年龄 ====================

  - id: age_gte
    retrieval_text: >
      年龄 岁以上 岁及以上 多少岁以上 年纪大 老年 中老年
      40岁以上 50岁以上 60岁以上 年龄大于 年龄超过
    field: clientAge
    operator: GTE
    value_type: numeric
    unit: "岁，直接取数字，无需换算"
    examples:
      - query: "45岁以上的客户"
        output: {field: clientAge, operator: GTE, value: 45}
      - query: "60岁及以上的客户"
        output: {field: clientAge, operator: GTE, value: 60}

  - id: age_lte
    retrieval_text: >
      年龄 岁以下 岁及以下 年龄小于 年龄不超过 年轻 年轻客户 未满x岁 小于x岁
    field: clientAge
    operator: LTE
    value_type: numeric
    unit: "岁，直接取数字"
    examples:
      - query: "35岁以下的客户"
        output: {field: clientAge, operator: LTE, value: 35}

  - id: age_range
    retrieval_text: >
      年龄 年龄范围 到岁之间 岁到岁 年龄区间 x岁到x岁
      30到40岁 中年 青年 老年 年龄段 x岁 30岁
    field: clientAge
    operator: RANGE
    value_type: numeric
    unit: "岁，直接取数字"
    notes: "语义年龄：青年18-35，中年36-55，老年56-100，未成年0-18；精确年龄（如'35岁'）用 RANGE {min:x,max:x}"
    examples:
      - query: "30到40岁的客户"
        output: {field: clientAge, operator: RANGE, value: {min: 30, max: 40}}
      - query: "中年客户"
        output: {field: clientAge, operator: RANGE, value: {min: 36, max: 55}}
      - query: "35岁的客户"
        output: {field: clientAge, operator: RANGE, value: {min: 35, max: 35}}

  # ==================== 生日 ====================

  - id: birthday_exact
    retrieval_text: >
      生日 出生日期 出生年月日 生日是 出生于 哪年哪月出生
    field: clientBirthday
    operator: RANGE
    value_type: date
    format: "yyyy-MM-dd"
    examples:
      - query: "1990年出生的客户"
        output: {field: clientBirthday, operator: RANGE, value: {min: "1990-01-01", max: "1990-12-31"}}
      - query: "1985年5月出生的客户"
        output: {field: clientBirthday, operator: RANGE, value: {min: "1985-05-01", max: "1985-05-31"}}

  - id: birthday_month_day
    retrieval_text: >
      生日月日 月日生日 几月几号生日 生日月份 本月生日 下月生日 生日快到了
    field: birthdayMd
    operator: RANGE
    value_type: date
    format: "MM-dd"
    notes: "只含月日（不含年），格式MM-dd；本月生日 → 当前月01到当前月-31"
    examples:
      - query: "3月15日生日的客户"
        output: {field: birthdayMd, operator: MATCH, value: "03-15"}
      - query: "本月生日的客户"
        output: {field: birthdayMd, operator: RANGE, value: {min: "当前月-01", max: "当前月-31"}}

  # ==================== 客户号 ====================

  - id: customer_id
    retrieval_text: >
      客户号 客户编号 客户ID 客户代码
    field: clientNo
    operator: MATCH
    value_type: extract
    examples:
      - query: "客户号C123456的客户"
        output: {field: clientNo, operator: MATCH, value: "C123456"}

  # ==================== 客户价值 ====================

  - id: customer_value_exact
    retrieval_text: >
      客户价值 A类客户 B类客户 C类客户 D类客户
      A1 A2 A3 A4 高价值客户 优质客户 价值等级
    field: newValueLabel
    operator: MATCH
    value_type: enum
    enum: ["A1", "A2", "A3", "A4", "B", "C", "D", "E", "F"]
    notes: "高价值→A1，排序：F<E<D<C<B<A4<A3<A2<A1"
    examples:
      - query: "A1类客户"
        output: {field: newValueLabel, operator: MATCH, value: "A1"}
      - query: "高价值客户"
        output: {field: newValueLabel, operator: MATCH, value: "A1"}

  - id: customer_value_gte
    retrieval_text: >
      客户价值以上 A类以上 B类以上 高价值及以上
    field: newValueLabel
    operator: CONTAINS
    value_type: enum
    enum: ["A1", "A2", "A3", "A4", "B", "C", "D", "E", "F"]
    notes: "价值从高到低：A1>A2>A3>A4>B>C>D>E>F，以上查询列出该级别及更高"
    examples:
      - query: "B类以上客户"
        output:
          query_logic: CONTAINS
          conditions:
            - {field: newValueLabel, operator: CONTAINS, value: ["A1", "A2", "A3", "A4", "B"]}

  # ==================== 客户温度 ====================

  - id: customer_temperature_exact
    retrieval_text: >
      客户温度 高温客户 中温客户 低温客户 冷却客户
      温度 活跃度 客户活跃 意向度 没有联系 联系频繁
    field: clientTemperature
    operator: MATCH
    value_type: enum
    enum: ["高温", "中温", "低温", "冷却"]
    notes: "根据客户活跃度分类，温度从低到高：冷却<低温<中温<高温；联系频次低、没有联系---》低温；联系频繁、最近有联系--》高温"
    examples:
      - query: "高温客户"
        output: {field: clientTemperature, operator: MATCH, value: "高温"}

  - id: customer_temperature_gte
    retrieval_text: >
      温度以上 中温以上 低温以上 高温及以上 中温及以上
    field: clientTemperature
    operator: CONTAINS
    value_type: enum
    enum: ["高温", "中温", "低温", "冷却"]
    notes: "根据客户活跃度分类，温度从低到高：冷却<低温<中温<高温"
    examples:
      - query: "中温及以上客户"
        output:
          query_logic: CONTAINS
          conditions:
            - {field: clientTemperature, operator: CONTAINS, value: ["中温", "高温"]}

  # ==================== 客群标签 ====================

  - id: customer_segment_tag
    retrieval_text: >
      客群标签 客群 人群标签 客户画像 人群分类
      奋斗青年 都市白领 新晋父母 社会中坚 邻退天命 慈爱祖辈 创业新贵 创富一代 荣耀高堂 承富二代 已退小康
    field: clientGroupLabel
    operator: MATCH
    value_type: enum
    enum: ["奋斗青年", "都市白领", "新晋父母", "社会中坚", "邻退天命", "慈爱祖辈", "创业新贵", "创富一代", "荣耀高堂", "承富二代", "已退小康"]
    examples:
      - query: "都市白领客户"
        output: {field: clientGroupLabel, operator: MATCH, value: "都市白领"}

  # ==================== 寿险VIP ====================

  - id: life_insurance_vip_exact
    retrieval_text: >
      寿险VIP 黄金会员 铂金会员 VIP等级 黄金V1 黄金V2 黄金V3
      铂金V1 铂金V2 原黄金VIP 原铂金VIP 会员等级 VIP客户
      钻石VIP 金钻VIP 黑钻VIP
    field: vipType
    operator: MATCH
    value_type: enum
    enum: ["原黄金VIP", "原铂金VIP", "黄金V1", "黄金V2", "黄金V3", "铂金V1", "铂金V2", "钻石VIP", "金钻VIP", "黑钻VIP"]
    notes: "口语映射：黄金→黄金V1，铂金→铂金V1"
    examples:
      - query: "铂金V1会员"
        output: {field: vipType, operator: MATCH, value: "铂金V1"}
      - query: "原黄金VIP客户"
        output: {field: vipType, operator: MATCH, value: "原黄金VIP"}

  - id: life_insurance_vip_gte
    retrieval_text: >
      VIP以上 黄金以上 铂金以上 黄金V1以上 黄金V2以上
      VIP等级以上 高VIP 高级会员
    field: vipType
    operator: CONTAINS
    value_type: enum
    enum: ["原黄金VIP", "原铂金VIP", "黄金V1", "黄金V2", "黄金V3", "铂金V1", "铂金V2", "钻石VIP", "金钻VIP", "黑钻VIP"]
    notes: "以上查询列出该级别及更高"
    examples:
      - query: "铂金以上会员"
        output:
          conditions:
            - {field: vipType, operator: CONTAINS, value: ["铂金V1", "铂金V2", "钻石VIP", "金钻VIP", "黑钻VIP"]}

  # ==================== 孤儿单类型 ====================

  - id: stock_customer_type
    retrieval_text: >
      孤儿单 存续单 在职客户 存续单客户 孤儿客户
    field: orphanType
    operator: MATCH
    value_type: enum
    enum: ["在职有效客户", "纯存续单客户"]
    examples:
      - query: "孤儿单客户"
        output: {field: orphanType, operator: MATCH, value: "纯存续单客户"}
      - query: "在职有效客户"
        output: {field: orphanType, operator: MATCH, value: "在职有效客户"}

  # ==================== 保单托管 ====================

  - id: trusteeship_flag
    retrieval_text: >
      保单托管 是否托管 已托管 未托管 托管客户
    field: trusteeshipFlag
    operator: MATCH
    value_type: enum
    enum: ["是", "否"]
    examples:
      - query: "有保单托管的客户"
        output: {field: trusteeshipFlag, operator: MATCH, value: "是"}
      - query: "未托管的客户"
        output: {field: trusteeshipFlag, operator: MATCH, value: "否"}

  # ==================== 婚姻状况 ====================

  - id: marital_status
    retrieval_text: >
      婚姻状况 婚姻 已婚 未婚 离婚 丧偶 单身 结婚
    field: marriSts
    operator: MATCH
    value_type: enum
    enum: ["离婚", "未婚", "丧偶", "已婚", "未知"]
    notes: "单身→未婚，结婚/已结婚→已婚"
    examples:
      - query: "已婚客户"
        output: {field: marriSts, operator: MATCH, value: "已婚"}
      - query: "单身客户"
        output: {field: marriSts, operator: MATCH, value: "未婚"}

  # ==================== 职业 ====================

  - id: occupation
    retrieval_text: >
      职业 从事 做什么工作 工作性质 行业 干什么的
      老师 医生 护士 律师 程序员 企业家 工程师
      公务员 个体户 会计 销售 教授 金融 自由职业
      做生意 上班族 体制内 医疗行业 教育行业
    field: profName
    operator: MATCH
    value_type: infer
    enum: ["老师", "医生", "护士", "律师", "程序员", "企业家", "工程师",
           "公务员", "个体户", "会计", "销售", "教授", "金融从业者", "自由职业者"]
    notes: "口语推断：做生意→个体户，体制内→公务员，金融→金融从业者，自由职业→自由职业者"
    examples:
      - query: "做生意的客户"
        output: {field: profName, operator: MATCH, value: "个体户"}
      - query: "医生客户"
        output: {field: profName, operator: MATCH, value: "医生"}
      - query: "体制内客户"
        output: {field: profName, operator: MATCH, value: "公务员"}

  # ==================== 证件信息 ====================

  - id: id_type
    retrieval_text: >
      证件类型 身份证 护照 军人证 户口本 出生证 港澳台证 外国人居留证
    field: idType
    operator: MATCH
    value_type: enum
    enum: ["出生证", "身份证", "户口本", "港澳台居住证", "军人证", "港澳台证", "护照", "外国人居留证"]
    examples:
      - query: "持有护照的客户"
        output: {field: idType, operator: MATCH, value: "护照"}

  - id: id_number
    retrieval_text: >
      证件号 身份证号 证件号码 身份证号码
    field: idNo
    operator: MATCH
    value_type: extract
    examples:
      - query: "身份证号以320开头的客户"
        output: {field: idNo, operator: MATCH, value: "320"}

  - id: id_valid_date_range
    retrieval_text: >
      证件到期 证件有效期 证件即将到期 证件到期时间 身份证到期
    field: idValidDate
    operator: RANGE
    value_type: date
    format: "yyyy-MM-dd HH:mm:ss"
    examples:
      - query: "证件2025年到期的客户"
        output: {field: idValidDate, operator: RANGE, value: {min: "2025-01-01 00:00:00", max: "2025-12-31 00:00:00"}}

  - id: id_valid_date_gte
    retrieval_text: >
      证件到期日在某日之后 证件有效期大于 证件有效期晚于
    field: idValidDate
    operator: GTE
    value_type: date
    format: "yyyy-MM-dd HH:mm:ss"
    examples:
      - query: "证件有效期在2026年之后的客户"
        output: {field: idValidDate, operator: GTE, value: "2026-01-01 00:00:00"}

  - id: id_valid_date_lte
    retrieval_text: >
      证件到期日在某日之前 证件有效期小于 证件有效期早于
    field: idValidDate
    operator: LTE
    value_type: date
    format: "yyyy-MM-dd HH:mm:ss"
    examples:
      - query: "证件在2025年底前到期的客户"
        output: {field: idValidDate, operator: LTE, value: "2025-12-31 00:00:00"}

  # ==================== 车辆信息 ====================

  - id: vehicle_model
    retrieval_text: >
      车辆品牌 车型 开什么车 车的品牌 汽车品牌 车品牌
    field: carBrand
    operator: MATCH
    value_type: extract
    examples:
      - query: "开宝马的客户"
        output: {field: carBrand, operator: MATCH, value: "宝马"}

  - id: vehicle_plate_number
    retrieval_text: >
      车牌号 车辆号码 车牌 车牌号码 车辆车牌
    field: carNumber
    operator: MATCH
    value_type: extract
    examples:
      - query: "车牌号为粤A12345的客户"
        output: {field: carNumber, operator: MATCH, value: "粤A12345"}

  - id: real_vehicle_status
    retrieval_text: >
      车子情况 有没有车 有车 没车 是否有车 车辆情况
    field: assetsCondition
    operator: MATCH
    value_type: enum
    enum: ["有车", "没车"]
    examples:
      - query: "有车的客户"
        output: {field: assetsCondition, operator: MATCH, value: "有车"}
      - query: "没有车的客户"
        output: {field: assetsCondition, operator: MATCH, value: "没车"}

  # ==================== 寿险产品 ====================

  - id: life_insurance_product
    retrieval_text: >
      寿险产品 持有寿险 寿险产品代码 生财宝 智能星 金利多 平安永福 平安康泰 盛世金越
    field: productCode
    operator: CONTAINS
    value_type: enum
    enum: ["生财宝", "智能星", "金利多", "平安永福", "平安康泰", "盛世金越"]
    examples:
      - query: "持有平安永福的客户"
        output: {field: productCode, operator: CONTAINS, value: "平安永福"}

  # ==================== 持有险种类型 ====================

  - id: held_product_type
    retrieval_text: >
      险种类型 分红型 普通型 投连型 万能型 持有险种
      投资连结 投资型保险
    field: pType
    operator: MATCH
    value_type: enum
    enum: ["分红型", "普通型", "投资连结型", "万能型", "其他"]
    examples:
      - query: "持有分红型保险的客户"
        output: {field: pType, operator: MATCH, value: "分红型"}

  # ==================== 持有险种大类 ====================

  - id: held_product_category
    retrieval_text: >
      险种大类 保险大类 定期寿险 护理保险 疾病保险 两全保险
      年金保险 医疗保险 意外伤害保险 终身寿险
    field: pcCategory
    operator: MATCH
    value_type: enum
    enum: ["定期寿险", "护理保险", "疾病保险", "两全保险", "年金保险", "医疗保险", "意外伤害保险", "终身寿险"]
    examples:
      - query: "持有年金保险的客户"
        output: {field: pcCategory, operator: MATCH, value: "年金保险"}

  # ==================== 年缴保费 ====================

  - id: annual_premium_gte
    retrieval_text: >
      年缴保费 保费 年缴 缴费 年保费 保费以上 保费超过
      保费大于 高保费 缴费多少 保费金额
    field: amPremSeg
    operator: GTE
    value_type: numeric
    unit: "元，万=×10000，千=×1000"
    examples:
      - query: "年缴保费1万以上的客户"
        output: {field: amPremSeg, operator: GTE, value: 10000}
      - query: "保费超过5万的客户"
