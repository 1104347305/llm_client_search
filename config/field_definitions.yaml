      居家v1 居家v2 居家v3 居家V1优享 居家V2优享 居家意向客户
      居家V1.5 居家V2.5 居家v1.5 居家v2.5 居家等级
    field: searchJujiaClientGrade
    operator: MATCH
    value_type: enum
    enum_ref: searchJujiaClientGrade
    description: "表示居家客户的单个等级标签，不表示会员范围，也不表示开通时间"
    notes: "居家潜客不属于居家会员客户；居家客户包括v0.5、v1、v1.5、v2、v2.5、v3；等级排序：居家潜客<v0.5<v1<v1.5<v2<v2.5<v3。预达标/已达标属于泛状态词，不能脱离居家语境单独映射到本字段。"
    examples:
      - query: "居家v1等级的客户"
        output: {field: searchJujiaClientGrade, operator: MATCH, value: "v1"}
      - query: "居家潜客"
        output: {field: searchJujiaClientGrade, operator: MATCH, value: "居家潜客"}
      - query: "居家V1优享客户"
        output: {field: searchJujiaClientGrade, operator: MATCH, value: "v1.5"}
      - query: "居家意向客户"
        output: {field: searchJujiaClientGrade, operator: MATCH, value: "居家意向"}
