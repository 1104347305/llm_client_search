  # ==================== 持有险种大类 ====================

  - id: held_product_category
    retrieval_text: >
      险种大类 保险大类 定期寿险 护理保险 疾病保险 两全保险
      年金保险 医疗保险 意外伤害保险 终身寿险
      年金险 医疗险 重疾险 意外险 医疗产品
      买过年金险 未购买意外险 买了车险但没买意外险 车险但没有购买意外险
    field: pcCategory
    operator: CONTAINS
    value_type: enum
    enum_ref: pcCategory
    examples:
      - query: "持有年金保险的客户"
        output: {field: pcCategory, operator: CONTAINS, value: ["年金保险"]}
      - query: "买过终身寿险的客户"
