    is_supported: false
    retrieval_text: >
      理赔时间 理赔日期 何时理赔 理赔过 有理赔记录 本月理赔 今年理赔 近期理赔
    field: policies_claim_records_time
    operator: NESTED_MATCH
    value_type: date
    format: "yyyy-MM-dd HH:mm:ss"
    description: "理赔记录中的理赔时间，嵌套字段；若仅判断是否有理赔记录，用 EXISTS"
    examples:
      - query: "今年有理赔的客户"
        output: {field: policies_claim_records_time, operator: NESTED_MATCH, value: {min: "<current_year_start>", max: "<current_year_end>"}}
      - query: "有理赔记录的客户"
        output: {field: policies_claim_records_time, operator: EXISTS}
      - query: "近30天理赔的客户"
        output: {field: policies_claim_records_time, operator: NESTED_MATCH, value: {min: "<today_minus_30_days>", max: "<today>"}}

  # ==================== 理赔案件号 ====================

  - id: policies_claim_case_id
    is_supported: false
    retrieval_text: >
      理赔案件号 理赔案号 理赔编号 案件号
    field: policies_claim_records_case_id
    operator: NESTED_MATCH
    value_type: extract
    description: "理赔案件号，嵌套字段"
    examples:
      - query: "理赔案件号为CL20240001的客户"
        output: {field: policies_claim_records_case_id, operator: NESTED_MATCH, value: "CL20240001"}

  # ==================== 理赔金额 ====================

  - id: policies_claim_amount
    is_supported: false
    retrieval_text: >
      理赔金额 理赔了多少钱 理赔超过 理赔大于 获赔金额
    field: policies_claim_records_amount
    operator: NESTED_MATCH
    value_type: numeric
    unit: "元，万=×10000，千=×1000"
    description: "理赔金额，嵌套字段"
    examples:
      - query: "理赔金额超过10万的客户"
        output: {field: policies_claim_records_amount, operator: NESTED_MATCH, value: 100000}
      - query: "理赔5万以下的客户"
        output: {field: policies_claim_records_amount, operator: NESTED_MATCH, value: 50000}

  # ==================== 理赔险种 ====================

  - id: policies_claim_coverage
    is_supported: false
    retrieval_text: >
      理赔险种 理赔了什么险 理赔险种是 获赔险种
    field: policies_claim_records_coverage
    operator: NESTED_MATCH
    value_type: extract
    description: "理赔险种名称，嵌套字段，开放域文本"
    examples:
      - query: "理赔险种为医疗险的客户"
        output: {field: policies_claim_records_coverage, operator: NESTED_MATCH, value: "医疗险"}
      - query: "意外险理赔过的客户"
        output: {field: policies_claim_records_coverage, operator: NESTED_MATCH, value: "意外险"}

  # ==================== 是否买了保险 ====================

  - id: has_insurance
    retrieval_text: >
      买了保险 买过保险 有保险 配置了保险 有投保 已买保险 持有保险 有保单 持有保单
    field: productCode
    operator: EXISTS
    value_type: exists
    description: >
      判断客户是否持有任意保险。客户只要在 productCode（寿险产品）、
      gProductCode（养老险/意外险产品）、hProductCode（健康险产品）
      三个字段中任意一个有值，即认为"买了保险"。
      需要使用 OR 逻辑：query_logic=OR，三个 EXISTS 条件。
    notes: >
      必须生成 query_logic=OR 的三个条件：
        - {field: productCode, operator: EXISTS}
        - {field: gProductCode, operator: EXISTS}
        - {field: hProductCode, operator: EXISTS}
    examples:
      - query: "买了保险的客户"
        output:
          query_logic: OR
          conditions:
            - {field: productCode, operator: EXISTS}
            - {field: gProductCode, operator: EXISTS}
            - {field: hProductCode, operator: EXISTS}
      - query: "有保险的客户"
        output:
          query_logic: OR
          conditions:
            - {field: productCode, operator: EXISTS}
            - {field: gProductCode, operator: EXISTS}
            - {field: hProductCode, operator: EXISTS}
      - query: "配置了保险的客户"
        output:
          query_logic: OR
          conditions:
            - {field: productCode, operator: EXISTS}
            - {field: gProductCode, operator: EXISTS}
            - {field: hProductCode, operator: EXISTS}
