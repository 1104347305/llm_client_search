  # ==================== 保单日期/状态类 ====================

  - id: policy_anniversary
    retrieval_text: >
      保单周年日 保单周年 保单纪念日 周年日 保单生效周年 投保时间 投保日期
      X年投保 X年X月投保 2018年投保 2020年投保 某年某月投保 具体投保年月
    field: policy_anniversary
    operator: RANGE
    value_type: date_range
    format: "YYYY-MM-DD"
    notes: "具体年份/年月投保查询使用 RANGE；'2018年7月投保' → RANGE {min:'2018-07-01', max:'2018-07-31'}；'2018年投保' → RANGE {min:'2018-01-01', max:'2018-12-31'}"
    examples:
      - query: "保单周年日在2024-01-01的客户"
        output: {field: policy_anniversary, operator: MATCH, value: "2024-01-01"}
      - query: "2018年7月投保的客户"
        output: {field: policy_anniversary, operator: RANGE, value: {min: "2018-07-01", max: "2018-07-31"}}
      - query: "2020年投保的客户"
        output: {field: policy_anniversary, operator: RANGE, value: {min: "2020-01-01", max: "2020-12-31"}}

  - id: policies_effective_date
    retrieval_text: >
      保单生效日 生效日期 保单生效时间 何时生效 什么时候生效
    field: policies.effective_date
    operator: MATCH
    value_type: date
    format: "YYYY-MM-DD"
    examples:
      - query: "保单生效日为2023-06-01的客户"
        output: {field: policies.effective_date, operator: MATCH, value: "2023-06-01"}

  - id: policies_due_date
    retrieval_text: >
      应缴日 缴费日 缴费截止日 应缴时间 缴费日期 需要缴费 下个月缴费 本月缴费
      下月缴费 即将缴费 快要缴费 缴费到期 应缴 缴费
    field: policies.due_date
    operator: RANGE
    value_type: date_range
    format: "YYYY-MM-DD"
    notes: "下个月缴费 → RANGE 覆盖下月1日至月末；日期格式统一 YYYY-MM-DD"
    examples:
      - query: "应缴日为2024-03-01的客户"
        output: {field: policies.due_date, operator: MATCH, value: "2024-03-01"}
      - query: "下个月需要缴费的客户（当前2026年3月）"
        output: {field: policies.due_date, operator: RANGE, value: {min: "2026-04-01", max: "2026-04-30"}}
      - query: "本月需要缴费的客户（当前2026年3月）"
        output: {field: policies.due_date, operator: RANGE, value: {min: "2026-03-01", max: "2026-03-31"}}

  - id: policies_period_premium
