      有车有房 无车无房 有车无房 无车有房
    field: assetsCondition
    operator: CONTAINS
    value_type: enum
    enum_ref: assetsCondition
    description: "表示客户资产状况标签，不再只是是否有车。"
    notes: "统一枚举为：有房、有车、有房有车、无房无车。口语归一：有车=有车/有房有车；有房=有房/有房有车；有车有房=有房有车；无车无房=无房无车；有车无房=有车；无车有房=有房。"
    examples:
      - query: "有车的客户"
        output: {field: assetsCondition, operator: CONTAINS, value: ["有车", "有房有车"]}
      - query: "有房的客户"
        output: {field: assetsCondition, operator: CONTAINS, value: ["有房", "有房有车"]}
      - query: "有车有房的客户"
        output: {field: assetsCondition, operator: CONTAINS, value: ["有房有车"]}
      - query: "无车无房的客户"
        output: {field: assetsCondition, operator: CONTAINS, value: ["无房无车"]}
      - query: "有车无房的客户"
        output: {field: assetsCondition, operator: CONTAINS, value: ["有车"]}
      - query: "无车有房的客户"
        output: {field: assetsCondition, operator: CONTAINS, value: ["有房"]}

