      - query: "总保费为50万的客户"
        reason: "这是总保费语义，不是年缴保费；当前不能映射到 annPremSeg"
      - query: "总保费90万以上"
        reason: "这是总保费语义，不是年缴保费；当前不能映射到 annPremSeg"

