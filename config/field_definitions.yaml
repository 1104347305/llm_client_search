      - query: "买了重疾险和医疗险的客户"
        output: {field: pcCategory, operator: CONTAINS, value: ["疾病保险", "医疗保险"]}
      - query: "买了车险，但没有购买意外险的客户"
        output: {field: pcCategory, operator: NOT_CONTAINS, value: ["意外伤害保险"]}

