      - '{SEARCH}生存金{CW}{0,2}账户{CW}{0,2}余额{CW}{0,2}(\d+)万?以上(?:的客户|客户)?'
      - '{SEARCH}生存金{CW}{0,2}余额{CW}{0,2}(\d+)万?以上(?:的客户|客户)?'
