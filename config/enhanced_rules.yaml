  # ==================== investable_assets（可投资产） ====================

  - name: "家庭成员关系-有"
    enum_ref: "familyRelation"
    patterns_template:
      - '{SEARCH}(?<![没无])有?{enum}(?:的客户|客户)?'
      # 支持修饰词在中间：有未成年子女、有年迈父母
      - '{SEARCH}(?<![没无])有?[\u4e00-\u9fa5]{0,2}{enum}(?:的客户|客户)?'
      # 支持"家里有"
      - '{SEARCH}家里(?<![没无])有?[\u4e00-\u9fa5]{0,2}{enum}(?:的客户|客户)?'
    field: "familyRelation"
    operator: "CONTAINS"
    value_type: "capture"
    value:
      group: 1
    priority: 10

  - name: "家庭成员关系-无"
    enum_ref: "familyRelation"
    patterns_template:
      - '{SEARCH}(?:无|没有){enum}(?:的客户|客户)?'
      - '{SEARCH}(?:无|没有)[\u4e00-\u9fa5]{0,2}{enum}(?:的客户|客户)?'
      # 支持"家里没有"
      - '{SEARCH}家里(?:无|没有)[\u4e00-\u9fa5]{0,2}{enum}(?:的客户|客户)?'
    field: "familyRelation"
    operator: "NOT_CONTAINS"
    value_type: "capture"
    value:
      group: 1
    priority: 10

  - name: "子女-关系推断"
    patterns:
      - '{SEARCH}(子女|儿子|女儿|孩子|小孩|小朋友|娃|小娃)\d+[-~到]?\d*周?岁(?:的客户|客户)?'
      - '{SEARCH}(子女|儿子|女儿|孩子|小孩|小朋友|娃|小娃)(?:在[上读]?|上|读)?(?:幼儿园|学前班|小学|初中|高中|大学|本科|专科)(?:的客户|客户)?'
      - '{SEARCH}(子女|儿子|女儿|孩子|小孩|小朋友|娃|小娃)(?:未成年|没成年|已成年|成年)(?:的客户|客户)?'
    field: "familyRelation"
    operator: "CONTAINS"
    value_type: "static"
    value: "子女"
    priority: 9

