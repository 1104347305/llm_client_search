  # ==================== 生存金领取 (is_survival_gold_claimed) ====================

  - name: "生存金-已领取"
    patterns:
      - '{SEARCH}(?:客户)?已领取生存金(?:的客户|客户)?'
      - '{SEARCH}(?:客户)?生存金{CW}{0,2}已领(?:的客户|客户)?'
    field: "is_survival_gold_claimed"
    operator: "MATCH"
    value_type: "static"
    value: "是"
    priority: 6

  - name: "生存金-未领取"
    patterns:
      - '{SEARCH}未领取过?生存金(?:的客户|的人|人)?'
      - '{SEARCH}生存金{CW}{0,2}未领(?:取)?(?:的客户|的人|人)?'
      - '{SEARCH}生存金{CW}{0,2}(?:利息|账户){CW}{0,2}(?:没领|未领|没有领取?)(?:的客户|的人|人)?'
      - '{SEARCH}有生存金{CW}{0,2}(?:没领|未领取)(?:的客户|的人|人)?'
    field: "is_survival_gold_claimed"
    operator: "MATCH"
    value_type: "static"
    value: "否"
    priority: 6

  # ==================== 缴费期满 (is_payment_matured) ====================

  - name: "缴费期满-已满"
    patterns:
      - '{SEARCH}已缴费期满(?:的客户|客户)?'
      - '{SEARCH}缴费{CW}{0,2}期满'
    field: "is_payment_matured"
    operator: "MATCH"
    value_type: "static"
    value: "是"
    priority: 6

  - name: "缴费期满-未满"
    patterns:
      - '{SEARCH}未缴费期满(?:的客户|客户)?'
      - '{SEARCH}缴费{CW}{0,2}未满'
    field: "is_payment_matured"
    operator: "MATCH"
    value_type: "static"
    value: "否"
    priority: 6

  # ==================== 应缴日期 (policies.due_date) ====================

  - name: "缴费日期-下个月"
    patterns:
      - '{SEARCH}下个?月{CW}{0,2}(?:需要|应|要)?缴费(?:的客户|客户)?'
      - '{SEARCH}(?:需要|应|要)?缴费{CW}{0,2}下个?月(?:的客户|客户)?'
      - '{SEARCH}下个?月{CW}{0,2}(?:应缴|缴款|保费到期|保费截止)(?:的客户|客户)?'
      - '{SEARCH}下个?月{CW}{0,2}(?:缴费|续费|续保)(?:的客户|客户)?'
    field: "policies.due_date"
    operator: "RANGE"
    value_type: "date_range_dynamic"
    value:
      date_range: "next_month"
      format: "YYYY-MM-DD"
    priority: 9

  - name: "缴费日期-本月"
    patterns:
      - '{SEARCH}本月{CW}{0,2}(?:需要|应|要)?缴费(?:的客户|客户)?'
      - '{SEARCH}(?:需要|应|要)?缴费{CW}{0,2}本月(?:的客户|客户)?'
      - '{SEARCH}当月{CW}{0,2}(?:应缴|缴款|缴费)(?:的客户|客户)?'
      - '{SEARCH}这个?月{CW}{0,2}(?:应缴|缴费)(?:的客户|客户)?'
    field: "policies.due_date"
    operator: "RANGE"
    value_type: "date_range_dynamic"
    value:
      date_range: "current_month"
      format: "YYYY-MM-DD"
    priority: 9

  - name: "缴费日期-N天内"
    patterns:
      - '{SEARCH}(\d+)天内{CW}{0,2}(?:需要|应|要)?缴费(?:的客户|客户)?'
      - '{SEARCH}(?:需要|应|要)?缴费{CW}{0,2}(\d+)天内(?:的客户|客户)?'
      - '{SEARCH}(\d+)天内{CW}{0,2}应缴(?:的客户|客户)?'
    field: "policies.due_date"
    operator: "RANGE"
    value_type: "date_range_dynamic"
    value:
      date_range: "next_n_days"
      days_group: 1       # 从捕获组1读取天数
      format: "YYYY-MM-DD"
    priority: 9

  - name: "缴费日期-下周"
    patterns:
      - '{SEARCH}下周{CW}{0,2}(?:需要|应|要)?(?:缴费|缴款|应缴)(?:的客户|客户)?'
      - '{SEARCH}(?:需要|应|要)?(?:缴费|缴款|应缴){CW}{0,2}下周(?:的客户|客户)?'
      - '{SEARCH}有?应缴日{CW}{0,2}在下周(?:的客户|客户)?'
      - '{SEARCH}下周{CW}{0,2}(?:应缴日|缴费日|缴款日)(?:的客户|客户)?'
    field: "policies.due_date"
    operator: "RANGE"
    value_type: "date_range_dynamic"
    value:
      date_range: "next_n_days"
      days: 7
      format: "YYYY-MM-DD"
    priority: 10

  # 4.4 policy_anniversary（保单周年日）
  - name: "保单周年日-精确匹配"
    patterns:
      - '{SEARCH}保单周年日[为是：:](\d{4}-\d{2}-\d{2})(?:的客户|客户)?'
      - '{SEARCH}保单周年日期(\d{4}-\d{2}-\d{2})(?:的客户|客户)?'
    field: "policy_anniversary"
    operator: "MATCH"
    value_type: "capture"
    value:
      group: 1
    priority: 8

  - name: "保单周年日-下个月"
    patterns:
      - '{SEARCH}下个?月{CW}{0,2}(?:到)?保单周年日(?:了)?(?:的客户|客户)?'
      - '{SEARCH}保单周年日{CW}{0,2}在下个?月(?:的客户|客户)?'
      - '{SEARCH}下个?月{CW}{0,2}(?:到)?周年日(?:了)?(?:的客户|客户)?'
      - '哪些客户{SEARCH}下个?月{CW}{0,2}(?:到)?保单周年日(?:了)?'
    field: "policy_anniversary"
    operator: "RANGE"
    value_type: "date_range_dynamic"
    value:
      date_range: "next_month"
      format: "YYYY-MM-DD"
    priority: 9

  - name: "保单周年日-本月"
    patterns:
      - '{SEARCH}本月{CW}{0,2}(?:到)?保单周年日(?:的客户|客户)?'
      - '{SEARCH}保单周年日{CW}{0,2}在本月(?:的客户|客户)?'
      - '{SEARCH}这个?月{CW}{0,2}(?:到)?周年日(?:的客户|客户)?'
    field: "policy_anniversary"
    operator: "RANGE"
    value_type: "date_range_dynamic"
    value:
      date_range: "current_month"
      format: "YYYY-MM-DD"
    priority: 9

  # ==================== 准客来源 (prospect_source) ====================

  - name: "准客来源"
    enum_ref: "prospect_source"
    patterns_template:
      - '{SEARCH}{enum}来源?'
      - '{SEARCH}来源{CW}{0,2}{enum}(?:的客户|客户)?'
    field: "prospect_source"
    operator: "MATCH"
    value_type: "capture"
    value:
      group: 1
    priority: 7

  # ==================== 持有综拓产品类别 (held_cross_sell_category) ====================

  - name: "持有综拓产品类别"
    enum_ref: "held_cross_sell_category"
    patterns_template:
      - '{SEARCH}{enum}(?:的客户|客户)?'
      - '{SEARCH}{position}{enum}产品?(?:的客户|客户)?'
      - '{SEARCH}{position}{enum}'
    field: "held_cross_sell_category"
    operator: "CONTAINS"
    value_type: "capture"
    value:
      group: 1
    priority: 7
    negation_support: true

  - name: "持有综拓产品类别-未持有"
    enum_ref: "held_cross_sell_category"
    patterns_template:
      - '{SEARCH}{negation}{enum}产品?(?:的客户|客户)?'
    field: "held_cross_sell_category"
    operator: "NOT_CONTAINS"
    value_type: "capture"
    value:
      group: 1
    priority: 10

  # ==================== 综拓理赔 (is_cross_sell_claim) ====================

  - name: "综拓理赔-报案"
    patterns:
      - '{SEARCH}综拓{CW}{0,2}理赔报案(?:的客户|客户)?'
      - '{SEARCH}综拓理赔报案(?:的客户|客户)?'
      - '{SEARCH}有过?综拓{CW}{0,2}产品?{CW}{0,2}理赔报案(?:的客户|客户)?'
      - '{SEARCH}综拓{CW}{0,2}产品?{CW}{0,2}理赔报案(?:的客户|客户)?'
    field: "is_cross_sell_claim"
    operator: "MATCH"
    value_type: "static"
    value: "综拓理赔报案"
    priority: 12

  - name: "综拓理赔-结案"
    patterns:
      - '{SEARCH}综拓{CW}{0,2}理赔结案(?:的客户|客户)?'
      - '{SEARCH}综拓理赔结案(?:的客户|客户)?'
    field: "is_cross_sell_claim"
    operator: "MATCH"
    value_type: "static"
    value: "综拓理赔结案"
    priority: 12

  # ==================== 保单到期时间 (policy_expiry_date) ====================

  - name: "保单到期时间"
    enum_ref: "policy_expiry_date"
    patterns_template:
      - '{SEARCH}{enum}到期(?:的)?(?:短期?保单|客户|保单)?'
      - '{SEARCH}到期{CW}{0,2}{enum}'
    field: "policy_expiry_date"
    operator: "MATCH"
    value_type: "capture"
    value:
      group: 1
    priority: 7

  # ==================== 有效短险保单 (valid_short_term_policy) ====================

  - name: "有效短险保单-持有"
    enum_ref: "valid_short_term_policy"
    patterns_template:
      - '{SEARCH}{enum}(?:的客户|客户)?'
      - '{SEARCH}{position}{enum}(?:产品)?(?:的客户|客户)?'
    field: "valid_short_term_policy"
    operator: "CONTAINS"
    value_type: "capture"
    value:
      group: 1
    priority: 10
    negation_support: true

  - name: "有效短险保单-未持有"
    enum_ref: "valid_short_term_policy"
    patterns_template:
      - '{SEARCH}{negation}{enum}(?:的客户|客户)?'
    field: "valid_short_term_policy"
    operator: "NOT_CONTAINS"
    value_type: "capture"
    value:
      group: 1
    priority: 11

  # ==================== 居家达标客户等级 (home_care_level) ====================

  - name: "居家达标客户等级"
    enum_ref: "home_care_level"
    patterns_template:
      - '{SEARCH}居家{CW}{0,2}{enum}(?!{CW}{0,2}(?:以上|及以上|以下|及以下))(?:的客户|客户)?'
      - '{SEARCH}{enum}(?!{CW}{0,2}(?:以上|及以上|以下|及以下))(?:的客户|客户)?'
    field: "home_care_level"
    operator: "MATCH"
    value_type: "capture"
    value:
      group: 1
    priority: 7

  - name: "居家达标客户等级-以上"
    enum_ref: "home_care_level"
    patterns_template:
      - '{SEARCH}居家{CW}{0,2}{enum}(?:以上|及以上)(?:的客户|客户)?'
      - '{SEARCH}{enum}居家(?:以上|及以上)(?:的客户|客户)?'
    field: "home_care_level"
    operator: "CONTAINS"
    value_type: "enum_gte"
    value:
      group: 1
    priority: 8

  - name: "居家达标客户等级-以下"
    enum_ref: "home_care_level"
    patterns_template:
      - '{SEARCH}居家{CW}{0,2}{enum}(?:以下|及以下)(?:的客户|客户)?'
    field: "home_care_level"
    operator: "CONTAINS"
    value_type: "enum_lte"
    value:
      group: 1
    priority: 8

  # ==================== 康养达标客户等级 (health_care_level) ====================

  - name: "康养达标客户等级"
    enum_ref: "health_care_level"
    patterns_template:
      - '{SEARCH}康养{CW}{0,2}{enum}(?!{CW}{0,2}(?:以上|及以上|以下|及以下))(?:的客户|客户)?'
      - '{SEARCH}{enum}(?!{CW}{0,2}(?:以上|及以上|以下|及以下))(?:的客户|客户)?'
    field: "health_care_level"
    operator: "MATCH"
    value_type: "capture"
    value:
      group: 1
    priority: 7

  - name: "康养达标客户等级-以上"
    enum_ref: "health_care_level"
    patterns_template:
      - '{SEARCH}康养{CW}{0,2}{enum}(?:以上|及以上)(?:的客户|客户)?'
      - '{SEARCH}{enum}(?:以上|及以上)(?:的客户|客户)?'
    field: "health_care_level"
    operator: "CONTAINS"
    value_type: "enum_gte"
    value:
      group: 1
    priority: 8

  - name: "康养达标客户等级-以下"
    enum_ref: "health_care_level"
    patterns_template:
      - '{SEARCH}康养{CW}{0,2}{enum}(?:以下|及以下)(?:的客户|客户)?'
    field: "health_care_level"
    operator: "CONTAINS"
    value_type: "enum_lte"
    value:
      group: 1
    priority: 8

  # ==================== 安有护等级 (anyouhu_level) ====================

  - name: "安有护等级"
    enum_ref: "anyouhu_level"
    patterns_template:
      - '{SEARCH}安有护{CW}{0,2}{enum}(?:的客户|客户)?'
      - '{SEARCH}{enum}安有护'
    field: "anyouhu_level"
    operator: "MATCH"
    value_type: "capture"
    value:
      group: 1
    priority: 7

  - name: "安有护-持有"
    patterns:
      - '{SEARCH}安有护(?:的客户|客户)?'
    field: "anyouhu_level"
