# 枚举值通过 enum_files 引用外部 yaml 文件（路径相对于项目根目录）
# __all__ 加载统一枚举配置（field_enums.yaml），其余为大量枚举的专项文件

enum_files:
  __all__: "config/enums/field_enums.yaml"
  productCode: "config/enums/productCode.yaml"
  profName: "config/enums/profName.yaml"

# ==================== 否定词列表 ====================

negation_words:
  - "没有配置"
  - "未配置"
  - "没配置"
  - "未购买"
  - "没有"
  - "没买"
  - "未买"
  - "缺少"
