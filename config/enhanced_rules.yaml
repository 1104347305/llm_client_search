  # ==================== 客户号 (customer_id) ====================

  # 理赔案件号（LC前缀，优先于客户号匹配，避免C被误提取）
  - name: "理赔案件号-直接匹配"
    patterns:
      - '{SEARCH}(?:理赔)?案件号[为是：:]\s*(LC\d+)(?:的客户|客户)?'
      - '{SEARCH}(LC\d{6,15})'
    field: "policies.claim_records.case_id"
    operator: "NESTED_MATCH"
    value_type: "capture"
    value:
      group: 1
    priority: 10

  - name: "客户号-匹配"
    patterns:
      - '{SEARCH}客户号{CW}{0,2}[为是：:]\s*([C]?\d{1,15})'
      - '{SEARCH}客户号{CW}{0,2}([C]?\d{1,15})(?:的客户|客户)?'
      - '{SEARCH}(?<![A-Za-z])(C\d{1,15}){CW}{0,2}'   # 无关键词但有强制 C 前缀，负向回溯避免误匹配 LC...
    field: "customer_id"
    operator: "MATCH"
    value_type: "capture"
    value:
      group: 1
    priority: 8

  # 2.1 customer_added_date（客户添加日）
  - name: "客户添加日-精确匹配"
    patterns:
      - '{SEARCH}客户添加日[为是：:](\d{8})'
      - '{SEARCH}添加客户时间(\d{8})'
      - '{SEARCH}录入客户(\d{8})'
    field: "customer_added_date"
    operator: "MATCH"
    value_type: "capture"
    value:
      group: 1
    priority: 8

  - name: "客户添加日-近一个月"
    patterns:
      - '{SEARCH}近{CW}{0,2}一个?月{CW}{0,2}(?:新)?添加(?:的)?(?:客户)?(?:查询出来)?'
      - '{SEARCH}最近{CW}{0,2}一个?月{CW}{0,2}(?:新)?添加(?:的)?(?:客户)?(?:查询出来)?'
      - '{SEARCH}一个?月内{CW}{0,2}(?:新)?添加(?:的)?(?:客户)?(?:查询出来)?'
      - '{SEARCH}近{CW}{0,2}一个?月{CW}{0,2}新增(?:的)?(?:客户)?(?:查询出来)?'
      - '{SEARCH}最近{CW}{0,2}一个?月{CW}{0,2}新增(?:的)?(?:客户)?(?:查询出来)?'
      - '{SEARCH}最近{CW}{0,2}新增(?:的)?(?:客户)?(?:查询出来)?'
      - '{SEARCH}最近{CW}{0,2}新添加(?:的)?(?:客户)?(?:查询出来)?'
      - '把{SEARCH}近{CW}{0,2}一个?月{CW}{0,2}(?:新)?添加(?:的)?(?:客户)?(?:查询出来)?'
    field: "customer_added_date"
    operator: "RANGE"
    value_type: "date_range_dynamic"
    value:
      date_range: "last_n_days"
      days: 30
      format: "YYYYMMDD"
    priority: 9

  - name: "客户添加日-上个月"
    patterns:
      - '{SEARCH}上个?月{CW}{0,2}添加(?:的)?(?:客户)?'
      - '{SEARCH}上个?月{CW}{0,2}新增(?:的)?(?:客户)?'
      - '{SEARCH}上月{CW}{0,2}添加(?:的)?(?:客户)?'
      - '{SEARCH}上月{CW}{0,2}新增(?:的)?(?:客户)?'
    field: "customer_added_date"
    operator: "RANGE"
    value_type: "date_range_dynamic"
    value:
      date_range: "last_month"
      format: "YYYYMMDD"
    priority: 9

  - name: "客户添加日-本月"
    patterns:
      - '{SEARCH}本月{CW}{0,2}添加(?:的)?(?:客户)?'
      - '{SEARCH}本月{CW}{0,2}新增(?:的)?(?:客户)?'
      - '{SEARCH}这个?月{CW}{0,2}添加(?:的)?(?:客户)?'
      - '{SEARCH}这个?月{CW}{0,2}新增(?:的)?(?:客户)?'
    field: "customer_added_date"
    operator: "RANGE"
    value_type: "date_range_dynamic"
    value:
      date_range: "current_month"
      format: "YYYYMMDD"
    priority: 9

