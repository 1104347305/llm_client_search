  # ==================== 证件类型 (idType) ====================
  - name: "证件类型"
    enum_ref: "idType"
    patterns_template:
      - '{SEARCH}{enum}(?:的客户|客户)?'
      - '{SEARCH}证件{CW}{0,2}{enum}(?:的客户|客户)?'
    field: "idType"
    operator: "NESTED_MATCH"
    value_type: "capture"
    value:
      group: 1
    priority: 7
    require_paired_field: "idNo"  # id_type 必须与 id_number 成对使用

  # ==================== 证件号码 (idNo) ====================

  - name: "身份证-匹配"
    patterns:
      - '{SEARCH}(\d{17}[\dXx])(?:的客户|客户)?'
      - '{SEARCH}身份证{CW}{0,2}(\d{1,18})(?:的客户|客户)?'
      - '{SEARCH}身份证{CW}{0,2}尾号(\d{1,18})(?:的客户|客户)?'
      - '{SEARCH}尾号(\d{1,18}){CW}{0,2}身份证(?:的客户|客户)?'
      - '{SEARCH}(\d{1,18})开头{CW}{0,2}身份证(?:的客户|客户)?'
      - '{SEARCH}身份证{CW}{0,2}(\d{1,18})开头(?:的客户|客户)?'
    field: "idNo"
    operator: "NESTED_MATCH"
    value_type: "capture"
    value:
      group: 1
    priority: 9

  - name: "保单到期时间-近期"
    patterns:
      - '{SEARCH}(?:保单|寿险)(?:即将到期|快到期|近期到期)(?:的客户|客户|保单)?'
      - '{SEARCH}(?:保单|寿险){CW}{0,2}(?:即将到期|快到期|近期到期)(?:的客户|客户|保单)?'
      - '{SEARCH}(?:即将到期|快到期|近期到期)的?(?:保单|寿险)(?:的客户|客户|保单)?'
      - '{SEARCH}续保提醒(?:的客户|客户)?'
    field: "validSinsMatuDate"
    operator: "LTE"
    value_type: "date_range_dynamic"
    value:
      date_range: "today_plus_n_days"
      days: 30
      format: "yyyy-MM-dd HH:mm:ss"
    priority: 9

  # ==================== 保单产品名称 (policies.product_name) ====================

  - name: "保单号-匹配"
    patterns:
      - '{SEARCH}(P\d{6,15})(?:的客户|客户)?'
      - '{SEARCH}保单号{CW}{0,2}[为是：:]\s*(P?\d{1,15})(?:的客户|客户)?'
      - '{SEARCH}保单号{CW}{0,2}(P?\d{6,15})(?:的客户|客户)?'
      - '{SEARCH}保单号{CW}{0,2}(\d{1,15})结尾(?:的客户|客户)?'
    field: "policyNo"
    operator: "NESTED_MATCH"
    value_type: "capture"
    value:
      group: 1
    priority: 10

  # ==================== 保单状态 (policies.status) ====================

  - name: "职业"
    enum_ref: "profName"
    patterns_template:
      - '{SEARCH}{enum}职业(?:的客户|客户)?'
      - '{SEARCH}做{enum}(?:的客户|客户|的人|人|名单|有哪些人|有哪些)?'
      - '{SEARCH}{enum}(?:的客户|客户|的人|人|名单|有哪些人|有哪些)?'
    field: "profName"
    operator: "MATCH"
    value_type: "capture"
    value:
      group: 1
    priority: 7

  # ==================== 年收入 (annual_income) ====================

  - name: "车辆状况"
    enum_ref: "assetsCondition"
    patterns_template:
      - '{SEARCH}{enum}(?:的客户|客户)?'
    field: "assetsCondition"
    operator: "MATCH"
    value_type: "capture"
    value:
      group: 1
    priority: 10

  # ==================== 产险产品 (isBuyPregnancyCar) ====================

  - name: "产险产品-车险"
    patterns:
      - '{SEARCH}(?:购买了?|有|持有|配置了?)车险(?:的客户|客户|名单|的人|人)?'
      - '{SEARCH}车险(?:客户|的客户|名单|有哪些人|的人|人)?'
    field: "isBuyPregnancyCar"
    operator: "MATCH"
    value_type: "static"
    value: "车险"
    priority: 10

  - name: "产险产品-非车险"
    patterns:
      - '{SEARCH}(?:购买了?|有|持有|配置了?)非车险(?:的客户|客户)?'
      - '{SEARCH}非车险(?:客户|的客户)?'
    field: "isBuyPregnancyCar"
    operator: "MATCH"
    value_type: "static"
    value: "非车险"
    priority: 10

  # ==================== 保单托管 (trusteeshipFlag) ====================

  - name: "保单托管-是"
    patterns:
      - '{SEARCH}(?:已|有)?托管(?:的客户|客户)?'
      - '{SEARCH}保单托管(?:的客户|客户)?'
    field: "trusteeshipFlag"
    operator: "MATCH"
    value_type: "static"
    value: "是"
    priority: 10

  - name: "保单托管-否"
    patterns:
      - '{SEARCH}(?:哪些客户|哪些人)?没有保单托管'
      - '{SEARCH}(?:未|没有?|不)托管(?:的客户|客户|名单|有哪些人|的人|人)?'
      - '{SEARCH}未托管保单(?:的客户|客户|名单|有哪些人|的人|人)?'
    field: "trusteeshipFlag"
    operator: "MATCH"
    value_type: "static"
    value: "否"
    priority: 10

  # ==================== 养老险/意外险产品 (gProductCode) ====================

  - name: "养老险产品-持有"
    enum_ref: "gProductCode"
    patterns_template:
      - '{SEARCH}{position}{enum}(?:的客户|客户)?'
      - '{SEARCH}{enum}(?:的客户|客户)?'
    field: "gProductCode"
    operator: "CONTAINS"
    value_type: "capture"
    value:
      group: 1
    priority: 9
    negation_support: true

  - name: "养老险产品-未持有"
    enum_ref: "gProductCode"
    patterns_template:
      - '{SEARCH}{negation}{enum}(?:的客户|客户)?'
    field: "gProductCode"
    operator: "NOT_CONTAINS"
    value_type: "capture"
    value:
      group: 1
    priority: 10

  # ==================== 健康险产品 (hProductCode) ====================

  - name: "健康险产品-持有"
    enum_ref: "hProductCode"
    patterns_template:
      - '{SEARCH}{position}{enum}(?:的客户|客户)?'
      - '{SEARCH}{enum}(?:的客户|客户)?'
    field: "hProductCode"
    operator: "CONTAINS"
    value_type: "capture"
    value:
      group: 1
    priority: 9
    negation_support: true

  - name: "健康险产品-未持有"
    enum_ref: "hProductCode"
    patterns_template:
      - '{SEARCH}{negation}{enum}(?:的客户|客户)?'
    field: "hProductCode"
    operator: "NOT_CONTAINS"
    value_type: "capture"
    value:
      group: 1
    priority: 10

  # ==================== 家庭成员性别 (familyClientSex) ====================

  - name: "家庭成员性别"
    enum_ref: "familyClientSex"
    patterns_template:
      - '{SEARCH}(?:家庭成员|家属|成员|子女|父母|儿子|女儿|小孩|娃|小朋友|爸爸|父亲|妈妈|母亲|外祖母|祖母|爷爷|奶奶|外公|外婆){CW}{0,2}性别[为是：:]{0,1}{enum}(?:的客户|客户)?'
      - '{SEARCH}{enum}性?(?:家庭成员|家属|成员|子女|父母|儿子|女儿|小孩|娃|小朋友|爸爸|父亲|妈妈|母亲|外祖母|祖母|爷爷|奶奶|外公|外婆)?(?:的客户|客户)?'
    field: "familyClientSex"
    operator: "NESTED_MATCH"
    value_type: "capture"
    value:
      group: 1
    priority: 10

composite_rules:

  # ==============================
  # 4 条件
  # ==============================

  - name: "年龄GTE+婚姻+有子女+未配置险种"
    # 35岁已婚有小朋友未配置医疗险的客户
    patterns:
      - '{SEARCH}【年龄-以上】(?:[的、，, ]{0,3})?【婚姻状况】(?:[的、，, ]{0,3})?【家庭成员关系-有】(?:[的、，, ]{0,3})?【险种-未配置】(?:[的]{0,2})?(?:的客户|客户)?'
    priority: 35

  # ==============================
  # 3 条件
  # ==============================

  - name: "年龄GTE+婚姻+性别"
    # 45岁以上已婚女性客户
    patterns:
      - '{SEARCH}【年龄-以上】(?:[的、，, ]{0,3})?【婚姻状况】(?:[的、，, ]{0,3})?【性别-枚举】(?:性)?(?:[的]{0,2})?(?:的客户|客户)?'
      - '{SEARCH}【年龄-以上】(?:[的、，, ]{0,3})?【性别-枚举】(?:性)?(?:[的、，, ]{0,3})?【婚姻状况】(?:[的]{0,2})?(?:的客户|客户)?'
    priority: 30

  - name: "年龄GTE+婚姻+未配置险种"
    # 45岁以上已婚未配置医疗险的客户
    patterns:
      - '{SEARCH}【年龄-以上】(?:[的、，, ]{0,3})?【婚姻状况】(?:[的、，, ]{0,3})?【险种-未配置】(?:[的]{0,2})?(?:的客户|客户)?'
    priority: 30

  - name: "年龄GTE+有子女+未配置险种"
    # 35岁有孩子未配置医疗险的客户
    patterns:
      - '{SEARCH}【年龄-以上】(?:[的、，, ]{0,3})?【家庭成员关系-有】(?:[的、，, ]{0,3})?【险种-未配置】(?:[的]{0,2})?(?:的客户|客户)?'
    priority: 30

  - name: "年龄精确+有子女+未配置险种"
    # 35岁有小朋友还没配置医疗险的客户（精确年龄）
    patterns:
      - '{SEARCH}【年龄-精确】(?:[的、，, 还就也]{0,4})?【家庭成员关系-有】(?:[的、，, 还就也]{0,4})?【险种-未配置】(?:[的]{0,2})?(?:的客户|客户)?'
    priority: 30

  - name: "年龄精确+有子女"
    # 35岁有小朋友的客户（无险种条件）
    patterns:
      - '{SEARCH}【年龄-精确】(?:[的、，, 还就也]{0,4})?【家庭成员关系-有】(?:[的]{0,2})?(?:的客户|客户)?'
    priority: 22

  - name: "年龄GTE+有子女"
    # 35岁以上有孩子的客户（无险种条件）
    patterns:
      - '{SEARCH}【年龄-以上】(?:[的、，, ]{0,3})?【家庭成员关系-有】(?:[的]{0,2})?(?:的客户|客户)?'
    priority: 22

  - name: "婚姻+有子女+未配置险种"
    # 已婚有小朋友未配置医疗险的客户
    patterns:
      - '{SEARCH}【婚姻状况】(?:[的、，, ]{0,3})?【家庭成员关系-有】(?:[的、，, ]{0,3})?【险种-未配置】(?:[的]{0,2})?(?:的客户|客户)?'
    priority: 30

  - name: "婚姻+有车+未配置险种"
    # 已婚有车没买百万医疗的客户
    patterns:
      - '{SEARCH}【婚姻状况】(?:[的、，, ]{0,3})?【车辆状况】(?:[的、，, ]{0,3})?【险种-未配置】(?:[的]{0,2})?(?:的客户|客户)?'
    priority: 30

  # ==============================
  # 2 条件
  # ==============================

  # ---------- 家庭成员：关系 + 姓名 ----------
  # 统一引擎：【成员关系词-捕获】动态捕获关系类型（子女/配偶/父母）
  # value_mappings 预处理后"孩子/老婆/妈妈"已归一化为标准值
  # 输出两个条件：familyRelation CONTAINS <关系>
  #              familyClientName NESTED_MATCH <姓名>
  - name: "成员关系+成员姓名"
    patterns:
      # 关系在前：子女叫李辉 / 配偶名叫王芳 / 父母姓名是张明
      - '{SEARCH}【成员关系词-捕获】{CW}{0,3}(?:叫|名叫|叫做|姓名是|名字叫)【成员姓名词-捕获】(?:的客户|客户)?'
      # 名字在前：叫李辉的子女 / 叫王芳的配偶
      - '{SEARCH}(?:叫|名叫|叫做)【成员姓名词-捕获】的【成员关系词-捕获】(?:的客户|客户)?'
    priority: 15

  # ---------- 家庭成员：关系 + 出生日期 ----------
  # 输出两个条件：familyRelation CONTAINS <关系>
  #              familyClientBirthday NESTED_MATCH <日期>
  - name: "成员关系+成员出生日期"
    patterns:
      - '{SEARCH}【成员关系词-捕获】{CW}{0,3}(?:出生日期[为是：:]?|出生[于年月日]?|生日[为是：:]?)【成员出生日期词-捕获】(?:的客户|客户)?'
    priority: 15

  # ---------- 家庭成员：关系 + 年龄 ----------
  - name: "成员关系+成员年龄-范围"
    # 孩子10到15岁 / 子女5~12岁
    # 输出两个条件：familyRelation CONTAINS 子女
    #              family_members.age RANGE <min>~<max>
    patterns:
      - '【子女年龄-范围】'
    extra_conditions:
      - field: "familyRelation"
        operator: "CONTAINS"
        value: "子女"
    priority: 15

  - name: "成员关系+成员年龄-幼儿园"
    patterns:
      - '【子女教育阶段-幼儿园】'
    extra_conditions:
      - field: "familyRelation"
        operator: "CONTAINS"
        value: "子女"
    priority: 14

  - name: "成员关系+成员年龄-小学"
    patterns:
      - '【子女教育阶段-小学】'
    extra_conditions:
      - field: "familyRelation"
        operator: "CONTAINS"
        value: "子女"
    priority: 14

  - name: "成员关系+成员年龄-初中"
    patterns:
      - '【子女教育阶段-初中】'
    extra_conditions:
      - field: "familyRelation"
        operator: "CONTAINS"
        value: "子女"
    priority: 14

  - name: "成员关系+成员年龄-高中"
    patterns:
      - '【子女教育阶段-高中】'
    extra_conditions:
      - field: "familyRelation"
        operator: "CONTAINS"
        value: "子女"
    priority: 14

  - name: "成员关系+成员年龄-初高中"
    # 子女在上初中/高中的客户（年龄 12-18）
    patterns:
      - '【子女教育阶段-初高中】'
    extra_conditions:
      - field: "familyRelation"
        operator: "CONTAINS"
        value: "子女"
    priority: 14

  - name: "成员关系+成员年龄-大学"
    patterns:
      - '【子女教育阶段-大学】'
    extra_conditions:
      - field: "familyRelation"
        operator: "CONTAINS"
        value: "子女"
    priority: 14

  - name: "成员关系+成员年龄-未成年"
    patterns:
      - '【子女年龄-未成年】'
    extra_conditions:
      - field: "familyRelation"
        operator: "CONTAINS"
        value: "子女"
    priority: 14

  - name: "成员关系+成员年龄-青年"
    patterns:
      - '【子女年龄-青年】'
    extra_conditions:
      - field: "familyRelation"
        operator: "CONTAINS"
        value: "子女"
    priority: 14

  - name: "年龄GTE+婚姻"
    # 45岁以上已婚的客户
    patterns:
      - '{SEARCH}【年龄-以上】(?:[的、，, ]{0,3})?【婚姻状况】(?:[的青年家庭]{0,4})?(?:的客户|客户)?'
      - '{SEARCH}【婚姻状况】(?:[的、，, ]{0,3})?【年龄-以上】(?:[的青年]{0,3})?(?:的客户|客户)?'
    priority: 20

  - name: "年龄范围+婚姻"
    # 20-30岁已婚（刚结婚 preprocess→已婚）的客户
    patterns:
      - '{SEARCH}【年龄-范围】(?:[的、，, ]{0,3})?【婚姻状况】(?:[的青年]{0,3})?(?:的客户|客户)?'
    priority: 20

  - name: "年龄多岁+婚姻"
    # 二十多岁已婚的客户
    patterns:
      - '{SEARCH}【年龄-多岁】(?:[的、，, ]{0,3})?【婚姻状况】(?:[的青年]{0,3})?(?:的客户|客户)?'
    priority: 20

  - name: "年龄中文多岁+婚姻"
    # 二十多岁已婚的客户（中文数字）
    patterns:
      - '{SEARCH}【年龄-中文年代几岁】(?:[的、，, ]{0,3})?【婚姻状况】(?:[的青年家庭]{0,5})?(?:的客户|客户)?'
      - '{SEARCH}【婚姻状况】(?:[的、，, ]{0,3})?【年龄-中文年代几岁】(?:[的青年家庭]{0,5})?(?:的客户|客户)?'
    priority: 20

  - name: "年龄GTE+性别"
    # 45岁以上女性客户
    patterns:
      - '{SEARCH}【年龄-以上】(?:[的、，, ]{0,3})?【性别-枚举】(?:性)?(?:的客户|客户)?'
    priority: 20

  - name: "年龄GTE+未配置险种"
    # 45岁以上未配置医疗险的客户
    patterns:
      - '{SEARCH}【年龄-以上】(?:[的、，, ]{0,3})?【险种-未配置】(?:的客户|客户)?'
    priority: 20

  - name: "年龄GTE+无保险"
    patterns:
      - '{SEARCH}【年龄-以上】(?:[的、，, ]{0,4})?【持有产品类型-为空】(?:的客户|客户|名单|有哪些人|有哪些|的)?'
      - '{SEARCH}【持有产品类型-为空】(?:[的、，, ]{0,4})?【年龄-以上】(?:的客户|客户|名单|有哪些人|有哪些|的)?'
    priority: 20

  - name: "婚姻+未配置险种"
    # 已婚未配置医疗险的客户
    patterns:
      - '{SEARCH}【婚姻状况】(?:[的、，, ]{0,3})?【险种-未配置】(?:的客户|客户)?'
    priority: 20

  - name: "有子女+未配置险种"
    # 家里有孩子没买医疗险的客户
    patterns:
      - '{SEARCH}(?:家里)?【家庭成员关系-有】(?:[的、，, 但]{0,3})?【险种-未配置】(?:[的]{0,2})?(?:的客户|客户)?'
    priority: 20

  - name: "年龄LTE+未配置险种"
    # 55岁以下没有配置医疗险的客户
    patterns:
      - '{SEARCH}【年龄-以下】(?:[的、，, ]{0,3})?【险种-未配置】(?:的客户|客户)?'
    priority: 20

  - name: "年龄LTE+婚姻"
    # 55岁以下已婚的客户
    patterns:
      - '{SEARCH}【年龄-以下】(?:[的、，, ]{0,3})?【婚姻状况】(?:的客户|客户)?'
      - '{SEARCH}【婚姻状况】(?:[的、，, ]{0,3})?【年龄-以下】(?:的客户|客户)?'
    priority: 20

  - name: "年龄范围+未配置险种"
    # 30-40岁没有配置医疗险的客户
    patterns:
      - '{SEARCH}【年龄-范围】(?:[的、，, ]{0,3})?【险种-未配置】(?:的客户|客户)?'
    priority: 20

  - name: "年龄多岁+未配置险种"
    # 二十多岁没有配置医疗险的客户
    patterns:
      - '{SEARCH}【年龄-多岁】(?:[的、，, ]{0,3})?【险种-未配置】(?:的客户|客户)?'
    priority: 20

  - name: "年龄精确+未配置险种"
    # 35岁没有配置医疗险的客户
    patterns:
      - '{SEARCH}【年龄-精确】(?:[的、，, ]{0,3})?【险种-未配置】(?:的客户|客户)?'
    priority: 20

  - name: "持有寿险产品+未持有寿险产品"
    # 买了金瑞人生20，但是没有配置盛世金越的客户
    patterns:
      - '{SEARCH}【寿险产品-持有】(?:[的、，, ]{0,4})?(?:但是?|可是)?【寿险产品-未持有】(?:[的]{0,2})?(?:的客户|客户)?'
      - '{SEARCH}{position}【寿险产品-持有】(?:[的、，, ]{0,4})?(?:但是?没有?|未){position}?【寿险产品-未持有】(?:[的]{0,2})?(?:的客户|客户)?'
    priority: 22

  - name: "持有产品类型+未持有产品类型"
    # 买了医疗险，但是没有配置养老险
    patterns:
      - '{SEARCH}【持有产品类型-持有】(?:[的、，, ]{0,4})?(?:但是?|可是)?【持有产品类型-未持有】(?:[的]{0,2})?(?:的客户|客户)?'
      - '{SEARCH}{position}【持有产品类型-持有】(?:[的、，, ]{0,4})?(?:但是?没有?|未){position}?【持有产品类型-未持有】(?:[的]{0,2})?(?:的客户|客户)?'
      - '{SEARCH}有哪些客户【持有产品类型-持有】(?:[的、，, ]{0,4})?(?:但是?没有?|未){position}?【持有产品类型-未持有】(?:[的]{0,2})?(?:的客户|客户)?'
    priority: 22

  - name: "年龄范围+未持有综拓产品"
    # 青年客户没有e生保的客户
    patterns:
      - '{SEARCH}【年龄-青年】(?:[的、，, ]{0,3})?(?:没有?|未持有|没买)【持有综拓产品类别】(?:[的]{0,2})?(?:的客户|客户)?'
      - '{SEARCH}【年龄-青年】(?:[的、，, ]{0,3})?【持有综拓产品类别】(?:[的]{0,2})?(?:的客户|客户)?'
    priority: 22

  - name: "年龄范围+寿险VIP"
    # 40岁左右黄金VIP有哪些人
    patterns:
      - '{SEARCH}【年龄-左右】(?:[的、，, ]{0,4})?【寿险VIP】(?:有哪些人|有哪些|名单|的客户|客户|的人|人|的)?'
      - '{SEARCH}【年龄-精确】(?:[的、，, ]{0,4})?【寿险VIP】(?:有哪些人|有哪些|名单|的客户|客户|的人|人|的)?'
    priority: 20

  - name: "年龄范围+保额-以上"
    # 40岁左右黄金VIP有哪些人
    patterns:
