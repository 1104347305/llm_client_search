    priority: 25

  - name: "年龄+客户价值+客户温度"
    # 40岁左右高价值低温有哪些人
    patterns:
      - '{SEARCH}【年龄-多岁】(?:[的、，, ]{0,3})?【客户价值】(?:[的、，, ]{0,3})?【客户温度】(?:有哪些人|的客户|客户)?'
      - '{SEARCH}【年龄-范围】(?:[的、，, ]{0,3})?【客户价值】(?:[的、，, ]{0,3})?【客户温度】(?:有哪些人|的客户|客户)?'
      - '{SEARCH}【年龄-多岁】(?:[的、，, ]{0,3})?【客户温度】(?:[的、，, ]{0,3})?【客户价值】(?:有哪些人|的客户|客户)?'
      - '{SEARCH}【年龄-范围】(?:[的、，, ]{0,3})?【客户温度】(?:[的、，, ]{0,3})?【客户价值】(?:有哪些人|的客户|客户)?'
    priority: 25

  - name: "年龄+客户温度+寿险产品"
    # 给我看看40岁低温分红险客户 / 查30岁养老险的人
    patterns:
      - '{SEARCH}【年龄-多岁】(?:[的、，, ]{0,3})?【客户温度】(?:[的、，, ]{0,3})?【寿险产品-持有】(?:的客户|客户|的人)?'
      - '{SEARCH}【年龄-多岁】(?:[的、，, ]{0,3})?【寿险产品-持有】(?:的客户|客户|的人)?'
      - '{SEARCH}【年龄-精确】(?:[的、，, ]{0,3})?【寿险产品-持有】(?:的客户|客户|的人)?'
      - '{SEARCH}【年龄-范围】(?:[的、，, ]{0,3})?【寿险产品-持有】(?:的客户|客户|的人)?'
      - '{SEARCH}【年龄-多岁】(?:[的、，, ]{0,3})?【寿险责任类型-持有】(?:的客户|客户|的人)?'
      - '{SEARCH}【年龄-精确】(?:[的、，, ]{0,3})?【寿险责任类型-持有】(?:的客户|客户|的人)?'
      - '{SEARCH}【年龄-范围】(?:[的、，, ]{0,3})?【寿险责任类型-持有】(?:的客户|客户|的人)?'
    priority: 22

  - name: "年龄+产险产品"
    # 帮我查40岁左右车险客户
    patterns:
      - '{SEARCH}【年龄-多岁】(?:[的、，, ]{0,3})?【产险产品-持有】(?:的客户|客户)?'
      - '{SEARCH}【年龄-范围】(?:[的、，, ]{0,3})?【产险产品-持有】(?:的客户|客户)?'
    priority: 20

  - name: "年龄+客户温度+寿险责任+年缴保费"
    # 查40岁左右低温寿险保费一万以上客户
    patterns:
      - '{SEARCH}【年龄-多岁】(?:[的、，, ]{0,3})?【客户温度】(?:[的、，, ]{0,3})?【寿险责任类型-持有】(?:[的、，, ]{0,3})?【年缴保费-以上】(?:的客户|客户)?'
      - '{SEARCH}【年龄-范围】(?:[的、，, ]{0,3})?【客户温度】(?:[的、，, ]{0,3})?【寿险责任类型-持有】(?:[的、，, ]{0,3})?【年缴保费-以上】(?:的客户|客户)?'
    priority: 28

  - name: "寿险VIP+寿险责任"
    # 哪些是黄金VIP意外险的人 / A1意外险客户
    patterns:
      - '{SEARCH}【寿险VIP】(?:[的、，, ]{0,3})?【寿险责任类型-持有】(?:的人|的客户|客户)?'
      - '{SEARCH}【客户价值】(?:[的、，, ]{0,3})?【寿险责任类型-持有】(?:的人|的客户|客户)?'
      - '哪些(?:是|客户)?{SEARCH}【寿险VIP】(?:[的、，, ]{0,3})?【寿险责任类型-持有】(?:的人|的客户|客户)?'
      - '哪些(?:是|客户)?{SEARCH}【客户价值】(?:[的、，, ]{0,3})?【寿险责任类型-持有】(?:的人|的客户|客户)?'
    priority: 20

  - name: "寿险VIP+年缴保费"
    # 帮我找VIP保费一万以上名单
    patterns:
      - '{SEARCH}【寿险VIP】(?:[的、，, ]{0,3})?【年缴保费-以上】(?:名单|的客户|客户)?'
    priority: 20

  - name: "年龄+年缴保费"
    # 查30多岁保费超过5000都有谁 / 45岁保费10万以上
    patterns:
      - '{SEARCH}【年龄-多岁】(?:[的、，, ]{0,3})?【年缴保费-以上】(?:都有谁|的客户|客户)?'
      - '{SEARCH}【年龄-范围】(?:[的、，, ]{0,3})?【年缴保费-以上】(?:都有谁|的客户|客户)?'
      - '{SEARCH}【年龄-精确】(?:[的、，, ]{0,3})?【年缴保费-以上】(?:都有谁|的客户|客户)?'
      - '{SEARCH}【年龄-多岁】(?:[的、，, ]{0,3})?【年缴保费-以上-非万】(?:都有谁|的客户|客户)?'
      - '{SEARCH}【年龄-范围】(?:[的、，, ]{0,3})?【年缴保费-以上-非万】(?:都有谁|的客户|客户)?'
      - '{SEARCH}【年龄-精确】(?:[的、，, ]{0,3})?【年缴保费-以上-非万】(?:都有谁|的客户|客户)?'
    priority: 20

  - name: "年龄+性别+年缴保费"
    # 45岁女性投保保费在30万以上的客户 / 45岁女性保费10万以上
    patterns:
      - '{SEARCH}【年龄-精确】(?:[的、，, ]{0,3})?【性别-简单】(?:性)?(?:[的、，, ]{0,3})?(?:投保)?【年缴保费-以上】(?:的客户|客户)?'
      - '{SEARCH}【年龄-多岁】(?:[的、，, ]{0,3})?【性别-简单】(?:性)?(?:[的、，, ]{0,3})?(?:投保)?【年缴保费-以上】(?:的客户|客户)?'
      - '{SEARCH}【年龄-范围】(?:[的、，, ]{0,3})?【性别-简单】(?:性)?(?:[的、，, ]{0,3})?(?:投保)?【年缴保费-以上】(?:的客户|客户)?'
      - '{SEARCH}【年龄-精确】(?:[的、，, ]{0,3})?【性别-简单】(?:性)?(?:[的、，, ]{0,3})?(?:投保)?【年缴保费-以上-非万】(?:的客户|客户)?'
      - '{SEARCH}【年龄-多岁】(?:[的、，, ]{0,3})?【性别-简单】(?:性)?(?:[的、，, ]{0,3})?(?:投保)?【年缴保费-以上-非万】(?:的客户|客户)?'
      - '{SEARCH}【年龄-范围】(?:[的、，, ]{0,3})?【性别-简单】(?:性)?(?:[的、，, ]{0,3})?(?:投保)?【年缴保费-以上-非万】(?:的客户|客户)?'
    priority: 25

  - name: "客户温度+客户价值组合"
    # 中高温A类客户
    patterns:
      - '{SEARCH}(?:中高温|中温及以上|高温)(?:[的、，, ]{0,3})?【客户价值】(?:的客户|客户)?'
      - '{SEARCH}【客户价值】(?:[的、，, ]{0,3})?(?:中高温|中温及以上|高温)(?:的客户|客户)?'
    priority: 20

