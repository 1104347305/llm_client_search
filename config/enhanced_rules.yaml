  # ==============================
  # 2 条件
  # ==============================

  # ---------- 家庭成员：关系 + 姓名 ----------
  # 统一引擎：【成员关系词-捕获】动态捕获关系类型（子女/配偶/父母）
  # value_mappings 预处理后"孩子/老婆/妈妈"已归一化为标准值
  # 输出两个条件：family_members.relationship CONTAINS <关系>
  #              family_members.name NESTED_MATCH <姓名>
  - name: "成员关系+成员姓名"
    patterns:
      # 关系在前：子女叫李辉 / 配偶名叫王芳 / 父母姓名是张明
      - '{SEARCH}【成员关系词-捕获】{CW}{0,3}(?:叫|名叫|叫做|姓名是|名字叫)【成员姓名词-捕获】(?:的客户|客户)?'
      # 名字在前：叫李辉的子女 / 叫王芳的配偶
      - '{SEARCH}(?:叫|名叫|叫做)【成员姓名词-捕获】的【成员关系词-捕获】(?:的客户|客户)?'
    priority: 15

  # ---------- 家庭成员：关系 + 手机号 ----------
  # 输出两个条件：family_members.relationship CONTAINS <关系>
  #              family_members.mobile NESTED_MATCH <手机号>
  - name: "成员关系+成员手机号"
    patterns:
      - '{SEARCH}【成员关系词-捕获】{CW}{0,3}手机号?[为是：:]?\s*【成员手机号词-捕获】(?:的客户|客户)?'
    priority: 15

  # ---------- 家庭成员：关系 + 出生日期 ----------
  # 输出两个条件：family_members.relationship CONTAINS <关系>
  #              family_members.birth_date NESTED_MATCH <日期>
  - name: "成员关系+成员出生日期"
    patterns:
      - '{SEARCH}【成员关系词-捕获】{CW}{0,3}(?:出生日期[为是：:]?|出生[于年月日]?|生日[为是：:]?)【成员出生日期词-捕获】(?:的客户|客户)?'
    priority: 15

