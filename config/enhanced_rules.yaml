    priority: 6

  # ==================== 臻享家族等级 (zhenxiang_family_level) ====================

  - name: "臻享家族等级"
    enum_ref: "zhenxiang_family_level"
    patterns_template:
      - '{SEARCH}臻享家医?{CW}{0,2}{enum}(?:的客户|客户)?'
      - '{SEARCH}{enum}臻享家医?(?:客户)?'
    field: "zhenxiang_family_level"
    operator: "MATCH"
    value_type: "capture"
    value:
      group: 1
    priority: 7

  # ==================== investable_assets（可投资产） ====================

  - name: "可投资产-匹配"
    enum_ref: "investable_assets"
    patterns_template:
      - '{SEARCH}可投资产[为是：:]{enum}(?:的客户|客户)?'
      - '{SEARCH}{enum}资产客户'
      - '{SEARCH}客户资产类型{enum}'
      - '{SEARCH}{enum}(?:客户|的客户|人群)?'
    field: "investable_assets"
    operator: "MATCH"
    value_type: "capture"
    value:
      group: 1
    priority: 7

  # ==================== 家庭成员关系 (family_members.relationship) ====================
  # value_mappings 预归一化同义词（孩子/小孩/小朋友/儿子/女儿→子女，伴侣→配偶，父亲/母亲/爸爸/妈妈→父母）
  # 规则只匹配标准值：子女/配偶/父母/其他

  - name: "家庭成员关系-有"
    enum_ref: "family_members.relationship"
    patterns_template:
      - '{SEARCH}(?<![没无])有?{enum}(?:的客户|客户)?'
      # 支持修饰词在中间：有未成年子女、有年迈父母
      - '{SEARCH}(?<![没无])有?[\u4e00-\u9fa5]{0,2}{enum}(?:的客户|客户)?'
      # 支持"家里有"
      - '{SEARCH}家里(?<![没无])有?[\u4e00-\u9fa5]{0,2}{enum}(?:的客户|客户)?'
    field: "family_members.relationship"
    operator: "CONTAINS"
    value_type: "capture"
    value:
      group: 1
    priority: 10

  - name: "家庭成员关系-无"
    enum_ref: "family_members.relationship"
    patterns_template:
      - '{SEARCH}(?:无|没有){enum}(?:的客户|客户)?'
      - '{SEARCH}(?:无|没有)[\u4e00-\u9fa5]{0,2}{enum}(?:的客户|客户)?'
      # 支持"家里没有"
      - '{SEARCH}家里(?:无|没有)[\u4e00-\u9fa5]{0,2}{enum}(?:的客户|客户)?'
    field: "family_members.relationship"
    operator: "NOT_CONTAINS"
    value_type: "capture"
    value:
      group: 1
    priority: 10

  - name: "子女年龄-未成年"
    patterns:
      # 未成年在子女前：有未成年子女 —— 用前瞻不消费子女词，使其仍可被关系规则捕获（位置相邻不重叠）
      - '{SEARCH}(未成年|没成年|未成年人)(?=(?:的)?(?:子女|孩子|小孩|小朋友|儿子|女儿))(?:的客户|客户)?'
      # 子女在前，未成年在后：子女未成年/孩子还没成年
      - '{SEARCH}(?:子女|孩子|小孩|小朋友|儿子|女儿){CW}{0,2}(未成年|没成年|未成年人)(?:的客户|客户)?'
    field: "family_members.age"
    operator: "RANGE"
    value_type: "static"
    value:
      min: 0
      max: 18
    priority: 9

  # ==================== 子女年龄 (family_members.age) ====================

  - name: "子女年龄-青年"
    patterns:
      - '{SEARCH}(?:子女|孩子|小孩|小朋友|儿子|女儿|家庭成员){CW}{0,2}(青年)(?:的客户|客户)?'
      - '{SEARCH}(青年){CW}{0,2}(?:子女|孩子|小孩|小朋友|儿子|女儿|家庭成员)'
    field: "family_members.age"
    operator: "RANGE"
    value_type: "static"
    value:
      min: 18
      max: 35
    priority: 8

  - name: "子女年龄-未成年"
    patterns:
      - '{SEARCH}(?:子女|孩子|小孩|小朋友|儿子|女儿|家庭成员){CW}{0,2}(未成年|没成年)(?:的客户|客户)?'
      - '{SEARCH}(未成年|没成年){CW}{0,2}(?:子女|孩子|小孩|小朋友|儿子|女儿|家庭成员)'
    field: "family_members.age"
    operator: "RANGE"
    value_type: "static"
    value:
      min: 0
      max: 18
    priority: 8

  - name: "子女年龄-范围"
    patterns:
      - '{SEARCH}(?:子女|孩子|小孩|小朋友|儿子|女儿)(\d+)[-~到](\d+)周?岁(?:的客户|客户)?'
    field: "family_members.age"
    operator: "RANGE"
    value_type: "range"
    value:
      min_group: 1
      max_group: 2
      transform: "int"
    priority: 10

  - name: "子女教育阶段-幼儿园"
    patterns:
      - '{SEARCH}(?:子女|孩子|小孩|小朋友|儿子|女儿)(?:在[上读]?|上|读)?(幼儿园|学前班)(?:的客户|客户)?'
      - '{SEARCH}有(?:子女|孩子|小孩|小朋友)(?:在[上读]?|上|读)?(幼儿园|学前班)(?:的客户|客户)?'
    field: "family_members.age"
    operator: "RANGE"
    value_type: "static"
    value:
      min: 3
      max: 6
    priority: 9

  - name: "子女教育阶段-小学"
    patterns:
      - '{SEARCH}(?:子女|孩子|小孩|小朋友|儿子|女儿)(?:在[上读]?|上|读)?(小学)(?:的客户|客户)?'
      - '{SEARCH}有(?:子女|孩子|小孩|小朋友)(?:在[上读]?|上|读)?(小学)(?:的客户|客户)?'
    field: "family_members.age"
    operator: "RANGE"
    value_type: "static"
    value:
      min: 6
      max: 12
    priority: 9

  - name: "子女教育阶段-初中"
    patterns:
      - '{SEARCH}(?:子女|孩子|小孩|小朋友|儿子|女儿)(?:在[上读]?|上|读)?(初中)(?:的客户|客户)?'
      - '{SEARCH}有(?:子女|孩子|小孩|小朋友)(?:在[上读]?|上|读)?(初中)(?:的客户|客户)?'
    field: "family_members.age"
    operator: "RANGE"
    value_type: "static"
    value:
      min: 12
      max: 15
    priority: 9

  - name: "子女教育阶段-高中"
    patterns:
      - '{SEARCH}(?:子女|孩子|小孩|小朋友|儿子|女儿)(?:在[上读]?|上|读)?(高中)(?:的客户|客户)?'
      - '{SEARCH}有(?:子女|孩子|小孩|小朋友)(?:在[上读]?|上|读)?(高中)(?:的客户|客户)?'
    field: "family_members.age"
    operator: "RANGE"
    value_type: "static"
    value:
      min: 15
      max: 18
    priority: 9

  # 初中或高中：用 / 或 或 分隔，年龄区间合并为 12-18
  - name: "子女教育阶段-初高中"
    patterns:
      - '{SEARCH}(?:子女|孩子|小孩|小朋友|儿子|女儿)(?:在[上读]?|上|读)?(?:初中|高中)[/／或](?:初中|高中)(?:的客户|客户)?'
      - '{SEARCH}有(?:子女|孩子|小孩|小朋友)(?:在[上读]?|上|读)?(?:初中|高中)[/／或](?:初中|高中)(?:的客户|客户)?'
    field: "family_members.age"
    operator: "RANGE"
    value_type: "static"
    value:
      min: 12
      max: 18
    priority: 9

  - name: "子女教育阶段-大学"
    patterns:
      - '{SEARCH}(?:子女|孩子|小孩|小朋友|儿子|女儿)(?:在[上读]?|上|读)?(大学|本科|专科)(?:的客户|客户)?'
      - '{SEARCH}有(?:子女|孩子|小孩|小朋友)(?:在[上读]?|上|读)?(大学|本科|专科)(?:的客户|客户)?'
    field: "family_members.age"
    operator: "RANGE"
    value_type: "static"
    value:
      min: 18
      max: 22
    priority: 9

  # 子女年龄/教育上下文中，附带推断关系条件（子女/儿子/女儿/孩子 → relationship=子女）
  # 利用捕获组将匹配位置限定在孩子词本身，与同一查询中的年龄/教育条件不产生位置冲突
  - name: "子女-关系推断"
    patterns:
      - '{SEARCH}(子女|儿子|女儿|孩子|小孩|小朋友|娃|小娃)\d+[-~到]?\d*周?岁(?:的客户|客户)?'
      - '{SEARCH}(子女|儿子|女儿|孩子|小孩|小朋友|娃|小娃)(?:在[上读]?|上|读)?(?:幼儿园|学前班|小学|初中|高中|大学|本科|专科)(?:的客户|客户)?'
      - '{SEARCH}(子女|儿子|女儿|孩子|小孩|小朋友|娃|小娃)(?:未成年|没成年|已成年|成年)(?:的客户|客户)?'
    field: "family_members.relationship"
    operator: "CONTAINS"
    value_type: "static"
    value: "子女"
    priority: 9

  # ==================== 父母年龄 (family_members.age) ====================

  - name: "父母年龄-精确"
    patterns:
      - '{SEARCH}(?:父母|爸妈|父亲|母亲|爸爸|妈妈){CW}{0,2}(\d+)周?岁(?:的客户|客户)?'
      - '{SEARCH}(\d+)周?岁{CW}{0,2}(?:父母|爸妈)(?:的客户|客户)?'
    field: "family_members.age"
    operator: "RANGE"
    value_type: "capture"
    value:
      group: 1
      transform: "exact_range"
    priority: 10

  - name: "父母年龄-以上"
    patterns:
      - '{SEARCH}(?:父母|爸妈|父亲|母亲|爸爸|妈妈){CW}{0,2}(\d+)岁?以上(?:的客户|客户)?'
      - '{SEARCH}(?:父母|爸妈|父亲|母亲){CW}{0,2}(?:大于|超过)(\d+)岁(?:的客户|客户)?'
      - '{SEARCH}(\d+)岁?以上{CW}{0,2}(?:父母|爸妈)(?:的客户|客户)?'
    field: "family_members.age"
    operator: "GTE"
    value_type: "capture"
    value:
      group: 1
      transform: "int"
    priority: 10

  - name: "父母年龄-以下"
    patterns:
      - '{SEARCH}(?:父母|爸妈|父亲|母亲|爸爸|妈妈){CW}{0,2}(\d+)岁?以下(?:的客户|客户)?'
      - '{SEARCH}(?:父母|爸妈|父亲|母亲){CW}{0,2}(?:小于|不超过)(\d+)岁(?:的客户|客户)?'
      - '{SEARCH}(\d+)岁?以下{CW}{0,2}(?:父母|爸妈)(?:的客户|客户)?'
    field: "family_members.age"
    operator: "LTE"
    value_type: "capture"
    value:
      group: 1
      transform: "int"
    priority: 10

  - name: "父母年龄-范围"
    patterns:
      - '{SEARCH}(?:父母|爸妈|父亲|母亲)(\d+)[-~到至](\d+)周?岁(?:的客户|客户)?'
      - '{SEARCH}(\d+)[-~到至](\d+)周?岁{CW}{0,2}(?:父母|爸妈)(?:的客户|客户)?'
    field: "family_members.age"
    operator: "RANGE"
    value_type: "range"
    value:
      min_group: 1
      max_group: 2
      transform: "int"
    priority: 10

  # 父母年龄上下文中，附带推断关系条件（父母/爸妈/父亲/母亲 → relationship=父母）
  - name: "父母-关系推断"
    patterns:
      - '{SEARCH}(父母|爸妈|父亲|母亲|爸爸|妈妈)\d+[-~到]?\d*周?岁(?:的客户|客户)?'
      - '{SEARCH}(父母|爸妈|父亲|母亲|爸爸|妈妈)(?:以上|以下|大于|小于|超过|不超过)\d+岁(?:的客户|客户)?'
    field: "family_members.relationship"
    operator: "CONTAINS"
    value_type: "static"
    value: "父母"
    priority: 9

  # ==================== 家庭成员属性基础规则（统一引擎，供 composite_rules 引用）====================
  # 设计原则：
  #   1. value_mappings 将"孩子/老婆/妈妈"等预处理归一化为标准枚举值"子女/配偶/父母"
  #   2. 成员关系词-捕获 用 enum_ref 一条规则覆盖所有关系类型，动态捕获关系值
  #   3. 属性规则加 require_paired_field 安全锁：单独触发时丢弃，
  #      必须由 composite_rules 同时输出 relationship 才有效

  - name: "成员关系词-捕获"
    enum_ref: "family_members.relationship"
    patterns_template:
      - '{enum}'
    field: "family_members.relationship"
    operator: "CONTAINS"
    value_type: "capture"
    value:
      group: 1
    priority: 11

  - name: "成员姓名词-捕获"
    patterns:
      - '([\u4e00-\u9fa5]{2,4}?)'
    field: "family_members.name"
    operator: "NESTED_MATCH"
    value_type: "capture"
    value:
      group: 1
    require_paired_field: "family_members.relationship"
    priority: 2   # 极低：仅用于组合规则子规则，不单独 fullmatch 短查询

  - name: "成员手机号词-捕获"
    patterns:
      - '(1[3-9]\d{9})'
      - '(\d{4,10})'
    field: "family_members.mobile"
    operator: "NESTED_MATCH"
    value_type: "capture"
    value:
      group: 1
    require_paired_field: "family_members.relationship"
    priority: 11

  - name: "成员出生日期词-捕获"
    patterns:
      - '(\d{8})'
    field: "family_members.birth_date"
    operator: "NESTED_MATCH"
    value_type: "capture"
    value:
      group: 1
    require_paired_field: "family_members.relationship"
    priority: 11

  # ==================== 证件类型 (certificates.id_type) ====================
  - name: "证件类型"
    enum_ref: "certificates.id_type"
    patterns_template:
      - '{SEARCH}{enum}(?:的客户|客户)?'
      - '{SEARCH}证件{CW}{0,2}{enum}(?:的客户|客户)?'
    field: "certificates.id_type"
    operator: "NESTED_MATCH"
    value_type: "capture"
    value:
      group: 1
    priority: 7
    require_paired_field: "certificates.id_number"  # id_type 必须与 id_number 成对使用

  # ==================== 证件号码 (certificates.id_number) ====================

  - name: "身份证-匹配"
    patterns:
      - '{SEARCH}(\d{17}[\dXx])(?:的客户|客户)?'
      - '{SEARCH}身份证{CW}{0,2}(\d{1,18})(?:的客户|客户)?'
      - '{SEARCH}身份证{CW}{0,2}尾号(\d{1,18})(?:的客户|客户)?'
      - '{SEARCH}尾号(\d{1,18}){CW}{0,2}身份证(?:的客户|客户)?'
      - '{SEARCH}(\d{1,18})开头{CW}{0,2}身份证(?:的客户|客户)?'
      - '{SEARCH}身份证{CW}{0,2}(\d{1,18})开头(?:的客户|客户)?'
    field: "certificates.id_number"
    operator: "NESTED_MATCH"
    value_type: "capture"
    value:
      group: 1
    priority: 9

  # ==================== 保单产品名称 (policies.product_name) ====================

  - name: "保单-产品名称"
    enum_ref: "policies.product_name"
    patterns_template:
      - '{SEARCH}{enum}(?:的客户|客户)?'
      - '{SEARCH}所有{enum}(?:的客户|客户)?'
    field: "policies.product_name"
    operator: "CONTAINS"
    value_type: "capture"
    value:
      group: 1
    priority: 7
    negation_support: true

  # ==================== 保单号 (policies.policy_id) ====================

  - name: "保单号-匹配"
    patterns:
      - '{SEARCH}(P\d{6,15})(?:的客户|客户)?'
      - '{SEARCH}保单号{CW}{0,2}[为是：:]\s*(P?\d{1,15})(?:的客户|客户)?'
      - '{SEARCH}保单号{CW}{0,2}(P?\d{6,15})(?:的客户|客户)?'
      - '{SEARCH}保单号{CW}{0,2}(\d{1,15})结尾(?:的客户|客户)?'
    field: "policies.policy_id"
    operator: "NESTED_MATCH"
    value_type: "capture"
    value:
      group: 1
    priority: 10

  # ==================== 保单状态 (policies.status) ====================

  - name: "保单状态"
    enum_ref: "policies.status"
    patterns_template:
      - '{SEARCH}{enum}的?保单(?:的客户|客户)?'
      - '{SEARCH}保单{CW}{0,2}{enum}(?:的客户|客户)?'
      - '{SEARCH}{enum}(?:的)?客户'
      - '{SEARCH}有{enum}保单(?:的客户|客户)?'
    field: "policies.status"
    operator: "NESTED_MATCH"
    value_type: "capture"
    value:
      group: 1
    priority: 8

  # ==================== 保单险种类型 (policies.coverage_details.type) ====================

  - name: "保单险种类型-持有"
    enum_ref: "policies.coverage_details.type"
    patterns_template:
      - '{SEARCH}{position}{enum}(?:的客户|客户)?'
      - '{SEARCH}{enum}客户'
    field: "policies.coverage_details.type"
    operator: "NESTED_MATCH"
    value_type: "capture"
    value:
      group: 1
    priority: 8
    negation_support: true

  - name: "保单险种类型-未持有"
    enum_ref: "policies.coverage_details.type"
    patterns_template:
      - '{SEARCH}(?:没有|无|未配置|没买){enum}(?:的客户|客户)?'
    field: "policies.coverage_details.type"
    operator: "NOT_CONTAINS"
    value_type: "capture"
    value:
      group: 1
    priority: 9

  # ==================== 理赔记录 (policies.claim_records) ====================

  # 特定产品理赔："{产品名}理赔过" → claim_records.coverage CONTAINS {产品名}
  # 优先级 10 > 寿险产品-包含匹配(9)，防止被归入 life_insurance_product
  - name: "理赔产品-coverage"
    enum_ref: "life_insurance_product"
    patterns_template:
      - '{SEARCH}{enum}{CW}{0,2}(?:理赔|出险|报案)过?(?:的客户|客户)?'
      - '{SEARCH}(?:理赔过?|出险|报案){CW}{0,2}{enum}(?:的客户|客户)?'
    field: "policies.claim_records.coverage"
    operator: "CONTAINS"
    value_type: "capture"
    value:
      group: 1
    priority: 10

  - name: "理赔记录-有"
    patterns:
      - '{SEARCH}(?<![没无未])有(理赔|理赔记录|出险|报案|索赔)(?:记录|过)?(?:的客户|客户)?'
      - '{SEARCH}(?<!未)曾(理赔|出险|报案)(?:的客户|客户)?'
      - '{SEARCH}(?<!没有)(?<!未曾)(?<![没无未])(?:理赔|出险)过(?:的客户|客户)?'
    field: "policies.claim_records.case_id"
    operator: "EXISTS"
    value_type: "none"
    priority: 9

  - name: "理赔记录-无"
    patterns:
      - '{SEARCH}(?:没有|无|未)(理赔|理赔记录|出险|报案|索赔)(?:记录|过)?(?:的客户|客户)?'
      - '{SEARCH}未曾(理赔|出险|报案)(?:的客户|客户)?'
      - '{SEARCH}从未(理赔|出险|报案)(?:的客户|客户)?'
    field: "policies.claim_records.case_id"
    operator: "NOT_EXISTS"
    value_type: "none"
    priority: 9

  - name: "理赔时间-去年"
    patterns:
      - '{SEARCH}去年{CW}{0,2}(?:理赔|出险|报案)(?:过)?(?:的客户|客户)?'
      - '{SEARCH}(?:理赔|出险|报案)(?:过)?{CW}{0,2}去年(?:的客户|客户)?'
      - '{SEARCH}去年有?(?:理赔|出险|报案)(?:记录|过)?(?:的客户|客户)?'
    field: "policies.claim_records.report_date"
    operator: "RANGE"
    value_type: "date_range_dynamic"
    value:
      date_range: "last_year"
      format: "YYYY-MM-DD"
    priority: 9

  # ==================== 会员等级 (benefits.member_info.level) ====================

  - name: "会员等级"
    enum_ref: "benefits.member_info.level"
    patterns_template:
      - '{SEARCH}会员{CW}{0,2}{enum}(?:的客户|客户)?'
      - '{SEARCH}{enum}(?:会员|VIP)(?:的客户|客户)?'
    field: "benefits.member_info.level"
    operator: "NESTED_MATCH"
    value_type: "capture"
    value:
      group: 1
    priority: 7

  # ==================== 专属服务人员 (benefits.member_info.exclusive_service) ====================

  - name: "专属服务人员"
    enum_ref: "benefits.member_info.exclusive_service"
    patterns_template:
      - '{SEARCH}{enum}专属服务'
      - '{SEARCH}专属服务{CW}{0,2}{enum}(?:的客户|客户)?'
    field: "benefits.member_info.exclusive_service"
    operator: "NESTED_MATCH"
    value_type: "capture"
    value:
      group: 1
    priority: 6

  # ==================== 服务线阶段 (benefits.pingan_info.stage) ====================

  - name: "服务线阶段"
    enum_ref: "benefits.pingan_info.stage"
    patterns_template:
      - '{SEARCH}服务{CW}{0,2}{enum}(?:的客户|客户)?'
      - '{SEARCH}{enum}服务(?:的客户|客户)?'
    field: "benefits.pingan_info.stage"
    operator: "NESTED_MATCH"
    value_type: "capture"
    value:
      group: 1
    priority: 6

  # ==================== 服务线等级 (benefits.pingan_info.service_level) ====================

  - name: "服务线等级"
    enum_ref: "benefits.pingan_info.service_level"
    patterns_template:
      - '{SEARCH}服务{CW}{0,2}{enum}等级(?:的客户|客户)?'
      - '{SEARCH}{enum}服务(?:的客户|客户)?'
    field: "benefits.pingan_info.service_level"
    operator: "NESTED_MATCH"
    value_type: "capture"
    value:
      group: 1
    priority: 6

  # ==================== 联系地址 (contact_address) ====================

  - name: "联系地址-小区街道"
    patterns:
      - '{SEARCH}([\u4e00-\u9fa5]{2,10})(小区|街道|社区|大道)(?:的客户|客户)?'
    field: "contact_address"
    operator: "CONTAINS"
    value_type: "capture"
    value:
      group: 1
    priority: 7

  - name: "联系地址-城市"
    patterns:
      - '{SEARCH}([\u4e00-\u9fa5]{2,6}(?:市|省|县|区))(?:客户?)?'
      - '{SEARCH}(上海|北京|天津|重庆|广州|深圳|杭州|南京|武汉|成都|苏州|西安|宁波|沈阳|长沙|郑州|青岛|济南|大连|东莞|佛山|无锡|合肥|昆明|福州|厦门|贵阳|哈尔滨|长春|石家庄|太原|海口|南宁|兰州|银川|西宁|乌鲁木齐|拉萨)(?:市)?(?:的)?客户?'
    field: "contact_address"
    operator: "CONTAINS"
    value_type: "capture"
    value:
      group: 1
    priority: 7

  # ==================== 职业 (occupation) ====================

  - name: "职业"
    enum_ref: "occupation"
    patterns_template:
      - '{SEARCH}{enum}职业(?:的客户|客户)?'
      - '{SEARCH}{enum}客户?'
    field: "occupation"
    operator: "MATCH"
    value_type: "capture"
    value:
      group: 1
    priority: 7

  # ==================== 年收入 (annual_income) ====================

  - name: "年收入-以上"
    patterns:
      - '{SEARCH}年收入{CW}{0,2}(\d+)万?以上(?:的客户|客户)?'
      - '{SEARCH}年薪{CW}{0,2}(\d+)万?以上(?:的客户|客户)?'
    field: "annual_income"
    operator: "GTE"
    value_type: "capture"
    value:
      group: 1
      transform: "multiply"
      multiplier: 10000
    priority: 9

  - name: "年收入-以下"
    patterns:
      - '{SEARCH}年收入{CW}{0,2}(\d+)万?以下(?:的客户|客户)?'
      - '{SEARCH}年薪{CW}{0,2}(\d+)万?以下(?:的客户|客户)?'
    field: "annual_income"
    operator: "LTE"
    value_type: "capture"
    value:
      group: 1
      transform: "multiply"
      multiplier: 10000
    priority: 9

  - name: "年收入-范围"
    patterns:
      - '{SEARCH}年收入{CW}{0,2}(\d+)[-~到](\d+)万(?:的客户|客户)?'
    field: "annual_income"
    operator: "RANGE"
    value_type: "range"
    value:
      min_group: 1
      max_group: 2
      transform: "multiply"
      multiplier: 10000
    priority: 9

  # ==================== 家庭收入 (household_income) ====================

  - name: "家庭收入-以上"
    patterns:
      - '{SEARCH}家庭(?:年)?收入{CW}{0,2}(\d+)万以上(?:的客户|客户)?'
    field: "household_income"
    operator: "GTE"
    value_type: "capture"
    value:
      group: 1
      transform: "multiply"
      multiplier: 10000
    priority: 9

  - name: "家庭收入-以下"
    patterns:
      - '{SEARCH}家庭(?:年)?收入{CW}{0,2}(\d+)万以下(?:的客户|客户)?'
    field: "household_income"
    operator: "LTE"
    value_type: "capture"
    value:
      group: 1
      transform: "multiply"
      multiplier: 10000
    priority: 9

  - name: "家庭收入-范围"
    patterns:
      - '{SEARCH}家庭收入{CW}{0,2}(\d+)[-~到](\d+)万(?:的客户|客户)?'
      - '{SEARCH}家庭年收入{CW}{0,2}(\d+)[-~到](\d+)万(?:的客户|客户)?'
    field: "household_income"
    operator: "RANGE"
    value_type: "range"
    value:
      min_group: 1
      max_group: 2
      transform: "multiply"
      multiplier: 10000
    priority: 9

  # ==================== 房产状况 (real_estate_status) ====================

  - name: "房产状况"
    enum_ref: "real_estate_status"
    patterns_template:
      - '{SEARCH}{enum}(?:的客户|客户)?'
    field: "real_estate_status"
    operator: "MATCH"
    value_type: "capture"
    value:
      group: 1
    priority: 7

  # ==================== 车辆状况 (real_vehicle_status) ====================

  - name: "车辆状况"
    enum_ref: "real_vehicle_status"
    patterns_template:
      - '{SEARCH}{enum}(?:的客户|客户)?'
    field: "real_vehicle_status"
    operator: "MATCH"
    value_type: "capture"
    value:
      group: 1
    priority: 10

  # ==================== 资产规模 (asset_scale) ====================

  - name: "资产规模-数值"
    patterns:
      - '{SEARCH}资产{CW}{0,2}(\d+)万?以上(?:的客户|客户)?'
    field: "asset_scale"
    operator: "GTE"
    value_type: "capture"
    value:
      group: 1
      transform: "multiply"
      multiplier: 10000
    priority: 8

  - name: "资产规模-枚举"
    enum_ref: "asset_scale"
    patterns_template:
      - '{SEARCH}{enum}客户'
      - '{SEARCH}{enum}(?:[\u4e00-\u9fa5]{0,4})?客户'
      - '{SEARCH}资产规模[为是：:]{enum}(?:的客户|客户)?'
    field: "asset_scale"
    operator: "MATCH"
    value_type: "capture"
    value:
      group: 1
    priority: 8

  # ==================== 车辆购置价 (vehicle_purchase_price) ====================

  - name: "车辆购置价"
    enum_ref: "vehicle_purchase_price"
    patterns_template:
      - '{SEARCH}车价{CW}{0,2}{enum}(?:的客户|客户)?'
      - '{SEARCH}车辆价格{CW}{0,2}{enum}(?:的客户|客户)?'
    field: "vehicle_purchase_price"
    operator: "MATCH"
    value_type: "capture"
    value:
      group: 1
    priority: 6


# ==================== 组合查询规则 ====================
# 每条规则的 pattern 必须 fullmatch 整个查询字符串，一次提取多个条件。
#
# 【rule_name】 占位符：自动替换为该单条规则的第一个 pattern，并追踪捕获组偏移。
# 占位符之外的文本是连接词正则或尾词，严格控制长度以保证准确率。
#
# extra_conditions：附加纯静态条件（不依赖捕获组）。
#
# 规则按条件数由多到少排列；第一个 fullmatch 成功的规则立即返回。
#
# SEP  = (?:[的、，, ]{0,3})?   条件之间最多 3 个字符的连接词
# TAIL = (?:[的青年家庭]{0,4})?客户

composite_rules:

  # ==============================
  # 4 条件
  # ==============================

  - name: "年龄GTE+婚姻+高净值+性别"
    # 45岁以上已婚高净值女性客户
    patterns:
      - '{SEARCH}【年龄-以上】(?:[的、，, ]{0,3})?【婚姻状况】(?:[的、，, ]{0,3})?高净值(?:[的、，, ]{0,3})?【性别-枚举】(?:性)?(?:[的]{0,2})?(?:的客户|客户)?'
      - '{SEARCH}【年龄-以上】(?:[的、，, ]{0,3})?高净值(?:[的、，, ]{0,3})?【婚姻状况】(?:[的、，, ]{0,3})?【性别-枚举】(?:性)?(?:[的]{0,2})?(?:的客户|客户)?'
    extra_conditions:
      - field: "investable_assets"
        operator: "MATCH"
        value: "高净值"
    priority: 35

  - name: "年龄GTE+婚姻+有子女+未配置寿险责任"
    # 35岁已婚有子女未配置重疾险的客户
    patterns:
      - '{SEARCH}【年龄-以上】(?:[的、，, ]{0,3})?【婚姻状况】(?:[的、，, ]{0,3})?【家庭成员关系-有】(?:[的、，, ]{0,3})?【寿险责任类型-未持有】(?:[的]{0,2})?(?:的客户|客户)?'
    priority: 35

  - name: "年龄GTE+婚姻+有子女+未配置险种"
    # 35岁已婚有小朋友未配置医疗险的客户
    patterns:
      - '{SEARCH}【年龄-以上】(?:[的、，, ]{0,3})?【婚姻状况】(?:[的、，, ]{0,3})?【家庭成员关系-有】(?:[的、，, ]{0,3})?【险种-未配置】(?:[的]{0,2})?(?:的客户|客户)?'
    priority: 35

  # ==============================
  # 3 条件
  # ==============================

  - name: "年龄GTE+婚姻+性别"
    # 45岁以上已婚女性客户
    patterns:
      - '{SEARCH}【年龄-以上】(?:[的、，, ]{0,3})?【婚姻状况】(?:[的、，, ]{0,3})?【性别-枚举】(?:性)?(?:[的]{0,2})?(?:的客户|客户)?'
      - '{SEARCH}【年龄-以上】(?:[的、，, ]{0,3})?【性别-枚举】(?:性)?(?:[的、，, ]{0,3})?【婚姻状况】(?:[的]{0,2})?(?:的客户|客户)?'
    priority: 30

  - name: "年龄GTE+婚姻+未配置寿险责任"
    # 45岁以上已婚未配置养老险的客户
    patterns:
      - '{SEARCH}【年龄-以上】(?:[的、，, ]{0,3})?【婚姻状况】(?:[的、，, ]{0,3})?【寿险责任类型-未持有】(?:[的]{0,2})?(?:的客户|客户)?'
      - '{SEARCH}【婚姻状况】(?:[的、，, ]{0,3})?【年龄-以上】(?:[的、，, ]{0,3})?【寿险责任类型-未持有】(?:[的]{0,2})?(?:的客户|客户)?'
    priority: 30

  - name: "年龄GTE+婚姻+未配置险种"
    # 45岁以上已婚未配置医疗险的客户
    patterns:
      - '{SEARCH}【年龄-以上】(?:[的、，, ]{0,3})?【婚姻状况】(?:[的、，, ]{0,3})?【险种-未配置】(?:[的]{0,2})?(?:的客户|客户)?'
    priority: 30

  - name: "年龄GTE+婚姻+高净值"
    # 45岁以上已婚高净值客户
    patterns:
      - '{SEARCH}【年龄-以上】(?:[的、，, ]{0,3})?【婚姻状况】(?:[的、，, ]{0,3})?高净值(?:[的]{0,2})?(?:的客户|客户)?'
      - '{SEARCH}【年龄-以上】(?:[的、，, ]{0,3})?高净值(?:[的、，, ]{0,3})?【婚姻状况】(?:[的]{0,2})?(?:的客户|客户)?'
    extra_conditions:
      - field: "investable_assets"
        operator: "MATCH"
        value: "高净值"
    priority: 30

  - name: "年龄GTE+有子女+未配置寿险责任"
    # 35岁有小朋友未配置重疾险的客户
    patterns:
      - '{SEARCH}【年龄-以上】(?:[的、，, ]{0,3})?【家庭成员关系-有】(?:[的、，, ]{0,3})?【寿险责任类型-未持有】(?:[的]{0,2})?(?:的客户|客户)?'
    priority: 30

  - name: "年龄精确+有子女+未配置寿险责任"
    # 35岁有小朋友还没配置重疾险的客户（精确年龄，含"还/就/也"连接词）
    patterns:
      - '{SEARCH}【年龄-精确】(?:[的、，, 还就也]{0,4})?【家庭成员关系-有】(?:[的、，, 还就也]{0,4})?【寿险责任类型-未持有】(?:[的]{0,2})?(?:的客户|客户)?'
    priority: 30

  - name: "年龄GTE+有子女+未配置险种"
    # 35岁有孩子未配置医疗险的客户
    patterns:
      - '{SEARCH}【年龄-以上】(?:[的、，, ]{0,3})?【家庭成员关系-有】(?:[的、，, ]{0,3})?【险种-未配置】(?:[的]{0,2})?(?:的客户|客户)?'
    priority: 30

  - name: "年龄精确+有子女+未配置险种"
    # 35岁有小朋友还没配置医疗险的客户（精确年龄）
    patterns:
