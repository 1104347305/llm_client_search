    enum_ref: "marital_status"
    patterns_template:
      - '{SEARCH}{enum}(?:的客户|客户)?'
      - '{SEARCH}(?:客户)?.{0,1}婚姻状态.{0,1}(?:的客户|客户)?'
    field: "marital_status"
