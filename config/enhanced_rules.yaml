  # ==================== 家庭成员属性基础规则（统一引擎，供 composite_rules 引用）====================
  # 设计原则：
  #   1. value_mappings 将"孩子/老婆/妈妈"等预处理归一化为标准枚举值"子女/配偶/父母"
  #   2. 成员关系词-捕获 用 enum_ref 一条规则覆盖所有关系类型，动态捕获关系值
  #   3. 属性规则加 require_paired_field 安全锁：单独触发时丢弃，
  #      必须由 composite_rules 同时输出 relationship 才有效

  - name: "成员关系词-捕获"
    enum_ref: "familyRelation"
    patterns_template:
      - '{enum}'
    field: "familyRelation"
    operator: "CONTAINS"
    value_type: "capture"
    value:
      group: 1
    priority: 11

  - name: "成员姓名词-捕获"
    patterns:
      - '([\u4e00-\u9fa5]{2,4}?)'
    field: "familyClientName"
    operator: "NESTED_MATCH"
    value_type: "capture"
    value:
      group: 1
    require_paired_field: "familyRelation"
    priority: 2   # 极低：仅用于组合规则子规则，不单独 fullmatch 短查询

  - name: "成员出生日期词-捕获"
    patterns:
      - '(\d{8})'
    field: "familyClientBirthday"
    operator: "NESTED_MATCH"
    value_type: "capture"
    value:
      group: 1
    require_paired_field: "familyRelation"
    priority: 11

