      - '{SEARCH}总?保额{CW}{0,2}(\d+)万以上(?:的客户|客户|的人|人|名单|有哪些人|有哪些)?'
      - '{SEARCH}总?保额{CW}{0,2}(?:在)?(\d+)万以上(?:的客户|客户|的人|人|名单|有哪些人|有哪些)?'
