  # ==================== 年缴保费 (annual_premium) ====================

  - name: "年缴保费-以上"
    patterns:
      - '{SEARCH}年交?保费{CW}{0,2}(\d+)万以上(?:的客户|客户)?'
      - '{SEARCH}年缴{CW}{0,2}(\d+)万以上(?:的客户|客户)?'
      - '{SEARCH}年交?保费{CW}{0,2}大于(\d+)万(?:的客户|客户)?'
      - '{SEARCH}年交?保费{CW}{0,2}超过(\d+)万(?:的客户|客户)?'
      - '{SEARCH}年缴{CW}{0,2}高于(\d+)万(?:的客户|客户)?'
      - '{SEARCH}客户年交?保费{CW}{0,2}(\d+)万以上(?:的客户|客户)?'
      - '{SEARCH}(?:年交?|年缴)?保费{CW}{0,2}(\d+)万以上(?:的客户|客户)?'
      - '{SEARCH}(?:年交?|年缴)?保费{CW}{0,2}(?:在)?(\d+)万以上(?:的客户|客户)?'
      - '{SEARCH}(?:年交?|年缴)?保费{CW}{0,2}(一)万以上(?:的客户|客户|有哪些)?'
    field: "annual_premium"
    operator: "GTE"
    value_type: "capture"
    value:
      group: 1
      transform: "multiply"
      multiplier: 10000
    priority: 9

  - name: "年缴保费-以上-非万"
    patterns:
      - '{SEARCH}年交?保费{CW}{0,2}(\d{4,})以上(?:的客户|客户)?'
      - '{SEARCH}年缴{CW}{0,2}(\d{4,})以上(?:的客户|客户)?'
      - '{SEARCH}年交?保费{CW}{0,2}大于(\d{4,})(?:的客户|客户)?'
      - '{SEARCH}年交?保费{CW}{0,2}超过(\d{4,})(?:都有谁|的客户|客户)?'
      - '{SEARCH}年缴{CW}{0,2}高于(\d{4,})(?:的客户|客户)?'
      - '{SEARCH}(?:年交?|年缴)?保费{CW}{0,2}(\d{4,})以上(?:的客户|客户)?'
      - '{SEARCH}(?:年交?|年缴)?保费{CW}{0,2}超过(\d{4,})(?:都有谁|的客户|客户)?'
    field: "annual_premium"
    operator: "GTE"
    value_type: "capture"
    value:
      group: 1
      transform: "int"
    priority: 10

  - name: "年缴保费-以下"
    patterns:
      - '{SEARCH}年交?保费{CW}{0,2}(\d+)万?以下(?:的客户|客户)?'
      - '{SEARCH}年缴{CW}{0,2}(\d+)万?以下(?:的客户|客户)?'
      - '{SEARCH}年交?保费{CW}{0,2}低于(\d+)万?(?:的客户|客户)?'
      - '{SEARCH}年缴{CW}{0,2}小于(\d+)万?(?:的客户|客户)?'
    field: "annual_premium"
    operator: "LTE"
    value_type: "capture"
    value:
      group: 1
      transform: "multiply"
      multiplier: 10000
    priority: 9

  - name: "年缴保费-范围"
    patterns:
      - '{SEARCH}(?:的客户|客户)?保费{CW}{0,2}(\d+)[-~到](\d+)万(?:的客户|客户)?'
      - '{SEARCH}(?:的客户|客户)?年缴保费{CW}{0,2}(\d+)[-~到](\d+)万(?:的客户|客户)?'
    field: "annual_premium"
    operator: "RANGE"
    value_type: "range"
    value:
      min_group: 1
      max_group: 2
      transform: "multiply"
      multiplier: 10000
    priority: 9

  # ==================== 总保额 (total_coverage) ====================

  - name: "总保额-以上"
