    patterns_template:
      - '{SEARCH}{enum}(?:学历|毕业|及)?以上(?:的客户|客户)?'
      - '{SEARCH}以上{CW}{0,2}{enum}(?:学历|毕业|及)?(?:的客户|客户)?'
    field: "education"
    operator: "CONTAINS"
    value_type: "enum_gte"
    value:
      group: 1
    priority: 9

  - name: "学历-以下"
