# Level 2 增强规则配置 - 按客户信息表格字段顺序排列
#
# 规则结构：
# - name: 规则名称
# - patterns: 正则表达式列表
# - field: 目标字段
# - operator: 操作符 (MATCH, GTE, LTE, RANGE, CONTAINS, NOT_CONTAINS, NESTED_MATCH)
# - value_type: 值类型 (static, capture, range, transform)
# - value: 静态值或值处理配置
# - priority: 优先级

pattern_vars:
  CW: '[，,。\.？\?\！! ：\:\u4e00-\u9fa5]'
  SEARCH: '(?:(?:查找|查询|查|找|找一下|查一下|检索|搜索|帮我查|帮我找|帮我搜索|给我看看)(?:一下|下)?(?:[，, ]{0,2}))?'


rules:

  # ==================== 姓名 (name) ====================

  - name: "姓名-匹配"
    patterns:
      - '{SEARCH}(?:的客户|客户)?(?:叫|名叫|姓名是)(?!的客)([\u4e00-\u9fa5]{2,4})(?:的客户|客户)?'
      - '{SEARCH}(?:的客户|客户)?姓([\u4e00-\u9fa5])(?:的)?客户'
      - '{SEARCH}(?:的客户|客户)?名字(?:带|含|包含|有|里有|中有|里包含)([\u4e00-\u9fa5]{1,4})的客户'
    field: "name"
    operator: "MATCH"
    value_type: "capture"
    value:
      group: 1
    priority: 10

  - name: "被保人姓名-匹配"
    patterns:
      # 被保人在名字前：被保人名叫张三 / 被保人姓名为张三
      - '{SEARCH}被保人.{0,4}(?:叫|名叫|姓名[是为])([\u4e00-\u9fa5]{1,4})(?:的客户|客户)?'
      # 名字在前，被保人在后（必须有"的被保人"）：名叫张三的被保人
      - '{SEARCH}(?:的客户|客户)?(?:叫|名叫|姓名[是为])([\u4e00-\u9fa5]{2,4})的被保人'
      - '{SEARCH}(?:的客户|客户)?姓([\u4e00-\u9fa5])(?:的)?被保人'
      - '{SEARCH}(?:的客户|客户)?名字(?:带|含|包含|有|里有|中有|里包含)([\u4e00-\u9fa5]{1,4})的被保人'
    field: "policies.insured_name"
    operator: "NESTED_MATCH"
    value_type: "capture"
    value:
      group: 1
    priority: 11

  - name: "投保人姓名-匹配"
    patterns:
      # 投保人在名字前：投保人名叫张三 / 投保人姓名为张三
      - '{SEARCH}投保人{CW}{0,2}(?:叫|名叫|姓名[是为])([\u4e00-\u9fa5]{1,4})(?:的客户|客户)?'
      # 名字在前，投保人在后（必须有"的投保人"）：名叫张三的投保人
      - '{SEARCH}(?:的客户|客户)?(?:叫|名叫|姓名[是为])([\u4e00-\u9fa5]{2,4})的投保人'
      - '{SEARCH}(?:的客户|客户)?姓([\u4e00-\u9fa5])(?:的)?投保人'
      - '{SEARCH}(?:的客户|客户)?名字(?:带|含|包含|有|里有|中有|里包含)([\u4e00-\u9fa5]{1,4})的投保人'
    field: "policies.applicant_name"
    operator: "NESTED_MATCH"
    value_type: "capture"
    value:
      group: 1
    priority: 11

  - name: "受益人姓名-匹配"
    patterns:
      # 受益人在名字前：受益人名叫张三
      - '{SEARCH}受益人{CW}{0,2}(?:叫|名叫|姓名是)([\u4e00-\u9fa5]{1,4})(?:的客户|客户)?'
      # 名字在前，受益人在后（必须有"的受益人"）：名叫张三的受益人
      - '{SEARCH}(?:的客户|客户)?(?:叫|名叫|姓名是)([\u4e00-\u9fa5]{2,4})的受益人'
      - '{SEARCH}(?:的客户|客户)?姓([\u4e00-\u9fa5])(?:的)?受益人'
      - '{SEARCH}(?:的客户|客户)?名字(?:带|含|包含|有|里有|中有|里包含)([\u4e00-\u9fa5]{1,4})的受益人'
    field: "policies.beneficiary_name"
    operator: "MATCH"
    value_type: "capture"
    value:
      group: 1
    priority: 11

  # ==================== 微信昵称 (wechat_nickname) ====================

  - name: "微信昵称-匹配"
    patterns:
      - '{SEARCH}微信(?:昵称|名|名字|号昵称)[为是：:]\s*([\u4e00-\u9fa5\w]{1,6})(?:的客户|客户)?'
      - '{SEARCH}昵称[为是叫：:]\s*([\u4e00-\u9fa5\w]{1,6})(?:的客户|客户)?'
    field: "wechat_nickname"
    operator: "MATCH"
    value_type: "capture"
    value:
      group: 1
    priority: 10

  # ==================== 手机号 (mobile_phone) ====================

  - name: "手机号-匹配"
    patterns:
      - '{SEARCH}?(1[3-9]\d{9})'
      - '{SEARCH}手机号?(\d{1,10})(?:的客户|客户)?'
      - '{SEARCH}手机号?(\d{1,11})开头(?:的客户|客户)?'
      - '{SEARCH}手机{CW}{0,2}(\d{1,11})开头(?:的客户|客户)?'
      - '{SEARCH}手机{CW}{0,2}尾号(\d{1,11})(?:的客户|客户)?'
      - '{SEARCH}手机号?段(\d{1,11})(?:的客户|客户)?'
      - '{SEARCH}手机{CW}{0,2}号段(\d{1,11})(?:的客户|客户)?'
    field: "mobile_phone"
    operator: "MATCH"
    value_type: "capture"
    value:
      group: 1
    priority: 8

  - name: "被投保人手机号-匹配"
    patterns:
      - '{SEARCH}被投保人{CW}{0,2}手机{CW}{0,2}(?:号)?{CW}{0,2}(?:为|是)?{CW}{0,2}(1[3-9]\d{9})(?:的客户|客户)?'
      - '{SEARCH}(1[3-9]\d{9}){CW}{0,2}被投保人'
      - '{SEARCH}被投保人手机号?(\d{1,10})(?:的客户|客户)?'
      - '{SEARCH}被投保人手机号?(\d{1,11})开头(?:的客户|客户)?'
      - '{SEARCH}手机{CW}{0,2}(\d{1,11})开头{CW}{0,2}被投保人'
      - '{SEARCH}手机{CW}{0,2}尾号(\d{1,11}){CW}{0,2}被投保人'
      - '{SEARCH}手机号?段(\d{1,11}){CW}{0,2}被投保人'
      - '{SEARCH}手机{CW}{0,2}号段(\d{1,11}){CW}{0,2}被投保人'
      - '{SEARCH}被保人{CW}{0,2}手机{CW}{0,2}(?:号)?{CW}{0,2}(?:为|是)?{CW}{0,2}(1[3-9]\d{9})(?:的客户|客户)?'
    field: "policies.insured_mobile"
    operator: "NESTED_MATCH"
    value_type: "capture"
    value:
      group: 1
    priority: 9

  - name: "投保人手机号-匹配"
    patterns:
      - '{SEARCH}投保人{CW}{0,2}手机{CW}{0,2}(1[3-9]\d{9})(?:的客户|客户)?'
      - '{SEARCH}(1[3-9]\d{9}){CW}{0,2}投保人'
      - '{SEARCH}手机号?(\d{1,10}){CW}{0,2}投保人'
      - '{SEARCH}手机号?(\d{1,11})开头{CW}{0,2}投保人'
      - '{SEARCH}手机{CW}{0,2}(\d{1,11})开头{CW}{0,2}投保人'
      - '{SEARCH}手机{CW}{0,2}尾号(\d{1,11}){CW}{0,2}投保人'
      - '{SEARCH}手机号?段(\d{1,11}){CW}{0,2}投保人'
      - '{SEARCH}手机{CW}{0,2}号段(\d{1,11}){CW}{0,2}投保人'
    field: "policies.applicant_mobile"
    operator: "NESTED_MATCH"
    value_type: "capture"
    value:
      group: 1
    priority: 9

  - name: "受益人手机号-匹配"
    patterns:
      - '{SEARCH}受益人{CW}{0,2}手机{CW}{0,2}(1[3-9]\d{9})(?:的客户|客户)?'
      - '{SEARCH}{CW}{0,2}(1[3-9]\d{9}){CW}{0,2}受益人'
      - '{SEARCH}手机号?(\d{1,10}){CW}{0,2}受益人'
      - '{SEARCH}手机号?(\d{1,11})开头{CW}{0,2}受益人'
      - '{SEARCH}手机{CW}{0,2}(\d{1,11})开头{CW}{0,2}受益人'
      - '{SEARCH}手机{CW}{0,2}尾号(\d{1,11}){CW}{0,2}受益人'
      - '{SEARCH}手机号?段(\d{1,11}){CW}{0,2}受益人'
      - '{SEARCH}手机{CW}{0,2}号段(\d{1,11}){CW}{0,2}受益人'
    field: "policies.beneficiary_mobile"
    operator: "NESTED_MATCH"
    value_type: "capture"
    value:
      group: 1
    priority: 9

  # ==================== 家庭成员手机号 (family_members.mobile) ====================

  - name: "家庭成员手机号-匹配"
    patterns:
      - '{SEARCH}(?:家庭成员|家属|成员){CW}{0,2}手机号?[为是：:]?\s*(1[3-9]\d{9})(?:的客户|客户)?'
      - '{SEARCH}(?:家庭成员|家属|成员){CW}{0,2}手机号?(\d{1,10})(?:的客户|客户)?'
      - '{SEARCH}家庭{CW}{0,2}手机{CW}{0,2}(1[3-9]\d{9})(?:的客户|客户)?'
    field: "family_members.mobile"
    operator: "NESTED_MATCH"
    value_type: "capture"
    value:
      group: 1
    priority: 10

  # ==================== 被投保人年龄 (policies.insured_age) ====================

  - name: "被投保人年龄-精确"
    patterns:
      - '{SEARCH}被(?:投)?保人{CW}{0,2}(\d+)周?岁(?:的客户|客户)?'
      - '{SEARCH}(\d+)周?岁{CW}{0,2}被(?:投)?保人'
    field: "policies.insured_age"
    operator: "RANGE"
    value_type: "capture"
    value:
      group: 1
      transform: "exact_range"
    priority: 10

  - name: "被投保人年龄-以上"
    patterns:
      - '{SEARCH}被(?:投)?保人{CW}{0,2}(\d+)岁?以上(?:的客户|客户)?'
      - '{SEARCH}被(?:投)?保人{CW}{0,2}(?:大于|超过)(\d+)岁(?:的客户|客户)?'
      - '{SEARCH}(\d+)岁?以上{CW}{0,2}被(?:投)?保人'
    field: "policies.insured_age"
    operator: "GTE"
    value_type: "capture"
    value:
      group: 1
      transform: "int"
    priority: 10

  - name: "被投保人年龄-以下"
    patterns:
      - '{SEARCH}被(?:投)?保人{CW}{0,2}(\d+)岁?以下(?:的客户|客户)?'
      - '{SEARCH}被(?:投)?保人{CW}{0,2}(?:小于|不超过)(\d+)岁(?:的客户|客户)?'
      - '{SEARCH}(\d+)岁?以下{CW}{0,2}被(?:投)?保人'
    field: "policies.insured_age"
    operator: "LTE"
    value_type: "capture"
    value:
      group: 1
      transform: "int"
    priority: 10

  - name: "被投保人年龄-范围"
    patterns:
      - '{SEARCH}被(?:投)?保人{CW}{0,2}(\d+)[-~到至](\d+)周?岁(?:的客户|客户)?'
      - '{SEARCH}(\d+)[-~到至](\d+)周?岁{CW}{0,2}被(?:投)?保人(?:的客户|客户)?'
    field: "policies.insured_age"
    operator: "RANGE"
    value_type: "range"
    value:
      min_group: 1
      max_group: 2
      transform: "int"
    priority: 10

  # ==================== 投保人年龄 (policies.applicant_age) ====================

  - name: "投保人年龄-精确"
    patterns:
      - '{SEARCH}投保人{CW}{0,2}(\d+)周?岁(?:的客户|客户)?'
      - '{SEARCH}(\d+)周?岁{CW}{0,2}投保人'
    field: "policies.applicant_age"
    operator: "RANGE"
    value_type: "capture"
    value:
      group: 1
      transform: "exact_range"
    priority: 10

  - name: "投保人年龄-以上"
    patterns:
      - '{SEARCH}投保人{CW}{0,2}(\d+)岁?以上(?:的客户|客户)?'
      - '{SEARCH}投保人{CW}{0,2}(?:大于|超过)(\d+)岁(?:的客户|客户)?'
      - '{SEARCH}(\d+)岁?以上{CW}{0,2}投保人'
    field: "policies.applicant_age"
    operator: "GTE"
    value_type: "capture"
    value:
      group: 1
      transform: "int"
    priority: 10

  - name: "投保人年龄-以下"
    patterns:
      - '{SEARCH}投保人{CW}{0,2}(\d+)岁?以下(?:的客户|客户)?'
      - '{SEARCH}投保人{CW}{0,2}(?:小于|不超过)(\d+)岁(?:的客户|客户)?'
      - '{SEARCH}(\d+)岁?以下{CW}{0,2}投保人'
    field: "policies.applicant_age"
    operator: "LTE"
    value_type: "capture"
    value:
      group: 1
      transform: "int"
    priority: 10

  - name: "投保人年龄-范围"
    patterns:
      - '{SEARCH}投保人{CW}{0,2}(\d+)[-~到至](\d+)周?岁(?:的客户|客户)?'
      - '{SEARCH}(\d+)[-~到至](\d+)周?岁{CW}{0,2}投保人'
    field: "policies.applicant_age"
    operator: "RANGE"
    value_type: "range"
    value:
      min_group: 1
      max_group: 2
      transform: "int"
    priority: 10

  # ==================== 受益人年龄 (policies.beneficiary_age) ====================

  - name: "受益人年龄-精确"
    patterns:
      - '{SEARCH}受益人{CW}{0,2}(\d+)周?岁(?:的客户|客户)?'
      - '{SEARCH}(\d+)周?岁{CW}{0,2}受益人'
    field: "policies.beneficiary_age"
    operator: "RANGE"
    value_type: "capture"
    value:
      group: 1
      transform: "exact_range"
    priority: 10

  - name: "受益人年龄-以上"
    patterns:
      - '{SEARCH}受益人{CW}{0,2}(\d+)岁?以上(?:的客户|客户)?'
      - '{SEARCH}受益人{CW}{0,2}(?:大于|超过)(\d+)岁(?:的客户|客户)?'
      - '{SEARCH}(\d+)岁?以上{CW}{0,2}受益人'
    field: "policies.beneficiary_age"
    operator: "GTE"
    value_type: "capture"
    value:
      group: 1
      transform: "int"
    priority: 10

  - name: "受益人年龄-以下"
    patterns:
      - '{SEARCH}受益人{CW}{0,2}(\d+)岁?以下(?:的客户|客户)?'
      - '{SEARCH}受益人{CW}{0,2}(?:小于|不超过)(\d+)岁(?:的客户|客户)?'
      - '{SEARCH}(\d+)岁?以下{CW}{0,2}受益人'
    field: "policies.beneficiary_age"
    operator: "LTE"
    value_type: "capture"
    value:
      group: 1
      transform: "int"
    priority: 10

  - name: "受益人年龄-范围"
    patterns:
      - '{SEARCH}受益人{CW}{0,2}(\d+)[-~到至](\d+)周?岁(?:的客户|客户)?'
      - '{SEARCH}(\d+)[-~到至](\d+)周?岁{CW}{0,2}受益人'
    field: "policies.beneficiary_age"
    operator: "RANGE"
    value_type: "range"
    value:
      min_group: 1
      max_group: 2
      transform: "int"
    priority: 10

  # ==================== 被投保人年龄分类 (policies.insured_age) ====================

  - name: "被投保人年龄-青年"
    patterns:
      - '{SEARCH}被(?:投)?保人{CW}{0,2}(青年)(?:的客户|客户)?'
      - '{SEARCH}(青年){CW}{0,2}被(?:投)?保人'
    field: "policies.insured_age"
    operator: "RANGE"
    value_type: "static"
    value:
      min: 18
      max: 35
    priority: 8

  - name: "被投保人年龄-中年"
    patterns:
      - '{SEARCH}被(?:投)?保人{CW}{0,2}(中年)(?:的客户|客户)?'
      - '{SEARCH}(中年){CW}{0,2}被(?:投)?保人'
    field: "policies.insured_age"
    operator: "RANGE"
    value_type: "static"
    value:
      min: 36
      max: 55
    priority: 8

  - name: "被投保人年龄-老年"
    patterns:
      - '{SEARCH}被(?:投)?保人{CW}{0,2}(老年)(?:的客户|客户)?'
      - '{SEARCH}(老年){CW}{0,2}被(?:投)?保人'
    field: "policies.insured_age"
    operator: "RANGE"
    value_type: "static"
    value:
      min: 56
      max: 100
    priority: 8

  - name: "被投保人年龄-未成年"
    patterns:
      - '{SEARCH}被(?:投)?保人{CW}{0,2}(未成年|没成年|未成年人)(?:的客户|客户)?'
      - '{SEARCH}(未成年|没成年|未成年人){CW}{0,2}被(?:投)?保人'
    field: "policies.insured_age"
    operator: "RANGE"
    value_type: "static"
    value:
      min: 0
      max: 18
    priority: 8

  # ==================== 投保人年龄分类 (policies.applicant_age) ====================

  - name: "投保人年龄-青年"
    patterns:
      - '{SEARCH}投保人{CW}{0,2}(青年)(?:的客户|客户)?'
      - '{SEARCH}(青年){CW}{0,2}投保人'
    field: "policies.applicant_age"
    operator: "RANGE"
    value_type: "static"
    value:
      min: 18
      max: 35
    priority: 8

  - name: "投保人年龄-中年"
    patterns:
      - '{SEARCH}投保人{CW}{0,2}(中年)(?:的客户|客户)?'
      - '{SEARCH}(中年){CW}{0,2}投保人'
    field: "policies.applicant_age"
    operator: "RANGE"
    value_type: "static"
    value:
      min: 36
      max: 55
    priority: 8

  - name: "投保人年龄-老年"
    patterns:
      - '{SEARCH}投保人{CW}{0,2}(老年)(?:的客户|客户)?'
      - '{SEARCH}(老年){CW}{0,2}投保人'
    field: "policies.applicant_age"
    operator: "RANGE"
    value_type: "static"
    value:
      min: 56
      max: 100
    priority: 8

  - name: "投保人年龄-未成年"
    patterns:
      - '{SEARCH}投保人{CW}{0,2}(未成年|没成年|未成年人)(?:的客户|客户)?'
      - '{SEARCH}(未成年|没成年|未成年人){CW}{0,2}投保人'
    field: "policies.applicant_age"
    operator: "RANGE"
    value_type: "static"
    value:
      min: 0
      max: 18
    priority: 8

  # ==================== 受益人年龄分类 (policies.beneficiary_age) ====================

  - name: "受益人年龄-青年"
    patterns:
      - '{SEARCH}受益人{CW}{0,2}(青年)(?:的客户|客户)?'
      - '{SEARCH}(青年){CW}{0,2}受益人'
    field: "policies.beneficiary_age"
    operator: "RANGE"
    value_type: "static"
    value:
      min: 18
      max: 35
    priority: 8

  - name: "受益人年龄-中年"
    patterns:
      - '{SEARCH}受益人{CW}{0,2}(中年)(?:的客户|客户)?'
      - '{SEARCH}(中年){CW}{0,2}受益人'
    field: "policies.beneficiary_age"
    operator: "RANGE"
    value_type: "static"
    value:
      min: 36
      max: 55
    priority: 8

  - name: "受益人年龄-老年"
    patterns:
      - '{SEARCH}受益人{CW}{0,2}(老年)(?:的客户|客户)?'
      - '{SEARCH}(老年){CW}{0,2}受益人'
    field: "policies.beneficiary_age"
    operator: "RANGE"
    value_type: "static"
    value:
      min: 56
      max: 100
    priority: 8

  - name: "受益人年龄-未成年"
    patterns:
      - '{SEARCH}受益人{CW}{0,2}(未成年|没成年|未成年人)(?:的客户|客户)?'
      - '{SEARCH}(未成年|没成年|未成年人){CW}{0,2}受益人'
    field: "policies.beneficiary_age"
    operator: "RANGE"
    value_type: "static"
    value:
      min: 0
      max: 18
    priority: 8

  # ==================== 性别 (gender) ====================

  - name: "性别-枚举"
    enum_ref: "gender"
    patterns_template:
      - '{SEARCH}性别[为是：:]{enum}(?:的客户|客户)?'
      - '{SEARCH}{enum}性(?:客户)?'
      - '{SEARCH}{enum}客户'
    field: "gender"
    operator: "MATCH"
    value_type: "capture"
    value:
      group: 1
    priority: 9

  - name: "性别-简单"
    # 用于组合规则，只匹配"男"或"女"
    patterns:
      - '(男|女)'
    field: "gender"
    operator: "MATCH"
    value_type: "capture"
    value:
      group: 1
    priority: 8

  # ==================== 年龄 (age) ====================

  - name: "年龄-中文年代几岁"
    patterns:
      - '{SEARCH}([一二三四五六七八九]?十)几岁(?:的客户|客户)?'
      - '{SEARCH}([一二三四五六七八九]?十)多岁(?:的客户|客户)?'
    field: "age"
    operator: "RANGE"
    value_type: "capture"
    value:
      group: 1
      transform: "chinese_decade_plus_range"
      offset: 1
      range: 9
    priority: 10

  - name: "年龄-青年"
    patterns:
      - '{SEARCH}(青年)(?:客户)?'
    field: "age"
    operator: "RANGE"
    value_type: "static"
    value:
      min: 18
      max: 35
    priority: 5

  - name: "年龄-中年"
    patterns:
      - '{SEARCH}(中年)(?:客户)?'
    field: "age"
    operator: "RANGE"
    value_type: "static"
    value:
      min: 36
      max: 55
    priority: 5

  - name: "年龄-老年"
    patterns:
      - '{SEARCH}(老年)(?:客户)?'
    field: "age"
    operator: "RANGE"
    value_type: "static"
    value:
      min: 56
      max: 100
    priority: 5

  - name: "年龄-未成年"
    patterns:
      - '{SEARCH}(未成年|没成年|未成年人|没成年的)(?:客户)?'
    field: "age"
    operator: "RANGE"
    value_type: "static"
    value:
      min: 0
      max: 18
    priority: 5

  - name: "年龄-精确"
    patterns:
      - '{SEARCH}(\d+)周?岁(?:的客户|客户)?'
      - '{SEARCH}(?<!子女)(?<!小孩)(?<!儿子)(?<!女儿)(?<!小朋友)(?<!孩子)(?<![-~到至])(\d+)周?岁(?:的客户|客户)?'
    field: "age"
    operator: "RANGE"
    value_type: "capture"
    value:
      group: 1
      transform: "exact_range"
    priority: 8

  - name: "年龄-以上"
    patterns:
      - '{SEARCH}(\d+)岁?以上(?:的客户|客户|的人|人)?'
      - '{SEARCH}(?<!不)超过(\d+)岁(?:的客户|客户|的人|人)?'
      - '{SEARCH}大于(\d+)岁(?:的客户|客户|的人|人)?'
      - '{SEARCH}高于(\d+)岁(?:的客户|客户|的人|人)?'
    field: "age"
    operator: "GTE"
    value_type: "capture"
    value:
      group: 1
      transform: "int"
    priority: 9

  - name: "年龄-以下"
    patterns:
      - '{SEARCH}(\d+)岁?以下(?:的客户|客户|的人|人)?'
      - '{SEARCH}小于(\d+)岁(?:的客户|客户|的人|人)?'
      - '{SEARCH}不超过(\d+)岁(?:的客户|客户|的人|人)?'
      - '{SEARCH}低于(\d+)岁(?:的客户|客户|的人|人)?'
    field: "age"
    operator: "LTE"
    value_type: "capture"
    value:
      group: 1
      transform: "int"
    priority: 9

  - name: "年龄-范围"
    patterns:
      - '{SEARCH}(\d+)[-~到至](\d+)周?岁(?:的客户|客户|的人|人)?'
    field: "age"
    operator: "RANGE"
    value_type: "range"
    value:
      min_group: 1
      max_group: 2
      transform: "int"
    priority: 9

  - name: "年龄-左右"
    patterns:
      - '{SEARCH}(\d+)岁左右(?:的客户|客户|的人|人)?'
      - '{SEARCH}(\d+)岁左右有哪些(?:客户|人)?'
    field: "age"
    operator: "RANGE"
    value_type: "exact_range"
    value:
      group: 1
      transform: "int"
      range: 5
    priority: 9

  - name: "年龄-多岁"
    patterns:
      - '{SEARCH}(\d+)多岁(?:的客户|客户)?'
      - '{SEARCH}(\d+)几岁(?:的客户|客户)?'
    field: "age"
    operator: "RANGE"
    value_type: "capture"
    value:
      group: 1
      transform: "plus_range"
      offset: 1
      range: 9
    priority: 9

# ==================== client_birth（出生年月日） ====================
  - name: "出生年月日-精确匹配"
    patterns:
      - '{SEARCH}出生[于年月日](\d{8})(?:的客户|客户)?'
      - '{SEARCH}出生日期[为是：:](\d{8})(?:的客户|客户)?'
      - '{SEARCH}生辰(\d{8})(?:的客户|客户)?'
    field: "client_birth"
    operator: "MATCH"
    value_type: "capture"
    value:
      group: 1
    priority: 9

  - name: "出生年份-范围"
    patterns:
      - '{SEARCH}(\d{4})年(?:出生|出生的|生)(?:的客户|客户)?'
      - '{SEARCH}出生于(\d{4})年(?:的客户|客户)?'
      - '{SEARCH}生于(\d{4})年(?:的客户|客户)?'
    field: "client_birth"
    operator: "RANGE"
    value_type: "capture"
    value:
      group: 1
      transform: "year_to_birth_range"
    priority: 8

  - name: "生日-本月"
    patterns:
      - '{SEARCH}本月{CW}{0,2}生日(?:的客户|客户)?'
      - '{SEARCH}这个?月{CW}{0,2}生日(?:的客户|客户)?'
      - '{SEARCH}当月{CW}{0,2}生日(?:的客户|客户)?'
      - '{SEARCH}生日{CW}{0,2}在本月(?:的客户|客户)?'
      - '{SEARCH}生日{CW}{0,2}在这个?月(?:的客户|客户)?'
      - '{SEARCH}生日{CW}{0,2}在当月(?:的客户|客户)?'
    field: "client_birth_month_and_day"
    operator: "RANGE"
    value_type: "date_range_dynamic"
    value:
      date_range: "current_month"
      format: "MM-DD"
    priority: 9

  - name: "生日-下个月"
    patterns:
      - '{SEARCH}下个?月{CW}{0,2}生日(?:的客户|客户)?'
      - '{SEARCH}生日{CW}{0,2}在下个?月(?:的客户|客户)?'
    field: "client_birth_month_and_day"
    operator: "RANGE"
    value_type: "date_range_dynamic"
    value:
      date_range: "next_month"
      format: "MM-DD"
    priority: 9

  - name: "生日-未来N天"
    patterns:
      - '{SEARCH}未来{CW}{0,2}(\d+)天{CW}{0,2}生日(?:的客户|客户)?'
      - '{SEARCH}(\d+)天内{CW}{0,2}生日(?:的客户|客户)?'
      - '{SEARCH}生日{CW}{0,2}在未来{CW}{0,2}(\d+)天(?:的客户|客户)?'
    field: "client_birth_month_and_day"
    operator: "RANGE"
    value_type: "date_range_dynamic"
    value:
      date_range: "next_n_days"
      days_group: 1
      format: "MM-DD"
    priority: 9

  - name: "生日-未来一周"
    patterns:
      - '{SEARCH}未来{CW}{0,2}一周{CW}{0,2}生日(?:的客户|客户)?'
      - '{SEARCH}生日{CW}{0,2}在未来{CW}{0,2}一周(?:的客户|客户)?'
    field: "client_birth_month_and_day"
    operator: "RANGE"
    value_type: "date_range_dynamic"
    value:
      date_range: "next_n_days"
      days: 7
      format: "MM-DD"
    priority: 9

  - name: "生日-下周"
    patterns:
      - '{SEARCH}下周{CW}{0,2}生日(?:的客户|客户)?'
      - '{SEARCH}生日{CW}{0,2}在下周(?:的客户|客户)?'
    field: "client_birth_month_and_day"
    operator: "RANGE"
    value_type: "date_range_dynamic"
    value:
      date_range: "next_week"
      format: "MM-DD"
    priority: 9

  - name: "生日-今天"
    patterns:
      - '{SEARCH}今天{CW}{0,2}生日(?:的客户|客户|的人)?'
      - '{SEARCH}今日{CW}{0,2}生日(?:的客户|客户|的人)?'
      - '{SEARCH}生日{CW}{0,2}在今天(?:的客户|客户|的人)?'
      - '{SEARCH}生日{CW}{0,2}是今天(?:的客户|客户|的人)?'
    field: "client_birth_month_and_day"
    operator: "RANGE"
    value_type: "date_range_dynamic"
    value:
      date_range: "today"
      format: "MM-DD"
    priority: 10

  - name: "生日-明天"
    patterns:
      - '{SEARCH}明天{CW}{0,2}生日(?:的客户|客户|的人)?'
      - '{SEARCH}明日{CW}{0,2}生日(?:的客户|客户|的人)?'
      - '{SEARCH}生日{CW}{0,2}在明天(?:的客户|客户|的人)?'
      - '{SEARCH}生日{CW}{0,2}是明天(?:的客户|客户|的人)?'
    field: "client_birth_month_and_day"
    operator: "RANGE"
    value_type: "date_range_dynamic"
    value:
      date_range: "tomorrow"
      format: "MM-DD"
    priority: 10

  - name: "生日-后天"
    patterns:
      - '{SEARCH}后天{CW}{0,2}生日(?:的客户|客户|的人)?'
      - '{SEARCH}生日{CW}{0,2}在后天(?:的客户|客户|的人)?'
      - '{SEARCH}生日{CW}{0,2}是后天(?:的客户|客户|的人)?'
    field: "client_birth_month_and_day"
    operator: "RANGE"
    value_type: "date_range_dynamic"
    value:
      date_range: "day_after_tomorrow"
      format: "MM-DD"
    priority: 10

  # ==================== 学历 (education) ====================

  - name: "学历"
    enum_ref: "education"
    patterns_template:
      - '{SEARCH}(?!{CW}{0,2}(?:以上|及以上|以下|及以下)){CW}{0,2}{enum}(?:学历|毕业)?(?:的客户|客户|的人|人)?'
      - '{SEARCH}(?!{CW}{0,2}(?:以上|及以上|以下|及以下)){CW}{0,2}(?:学历|毕业)[为是：:]{enum}(?:的客户|客户|的人|人)?'
      - '{SEARCH}(?!{CW}{0,2}(?:以上|及以上|以下|及以下)){CW}{0,2}(?:具有|拥有|获得|取得)[^，,。.]*?{enum}(?:学历|毕业)?(?:的客户|客户|的人|人)?'
    field: "education"
    operator: "MATCH"
    value_type: "capture"
    value:
      group: 1
    priority: 8

  - name: "学历-以上"
