# Level 2 增强规则配置 - 按客户信息表格字段顺序排列
#
# 规则结构：
# - name: 规则名称
# - patterns: 正则表达式列表
# - field: 目标字段
# - operator: 操作符 (MATCH, GTE, LTE, RANGE, CONTAINS, NOT_CONTAINS, NESTED_MATCH)
# - value_type: 值类型 (static, capture, range, transform)
# - value: 静态值或值处理配置
# - priority: 优先级

pattern_vars:
  CW: '[，,。\.？\?\！! ：\:\u4e00-\u9fa5]'
  SEARCH: '(?:(?:查找|查询|查|找|找一下|查一下|检索|搜索|帮我查|帮我找|帮我搜索|给我看看|帮我看看|看看|哪些是|谁是)(?:一下|下)?(?:[，, ]{0,2}))?'


rules:

  # ==================== 姓名 (clientName) ====================

  - name: "姓名-匹配"
    patterns:
      - '{SEARCH}(?:的客户|客户)?(?:叫|名叫|姓名是)(?!的客)([\u4e00-\u9fa5]{2,4})(?:的客户|客户)?'
      - '{SEARCH}(?:的客户|客户)?姓([\u4e00-\u9fa5])(?:的)?客户'
      - '{SEARCH}(?:的客户|客户)?姓([\u4e00-\u9fa5])(?:的)?(?:[，,])?'
      - '{SEARCH}(?:的客户|客户)?名字(?:带|含|包含|有|里有|中有|里包含)([\u4e00-\u9fa5]{1,4})的客户'
    field: "clientName"
    operator: "MATCH"
    value_type: "capture"
    value:
      group: 1
    priority: 10

  - name: "手机号-匹配"
    patterns:
      - '{SEARCH}?(1[3-9]\d{9})'
      - '{SEARCH}手机号?(\d{1,10})(?:的客户|客户)?'
      - '{SEARCH}手机号?(\d{1,11})开头(?:的客户|客户)?'
      - '{SEARCH}手机{CW}{0,2}(\d{1,11})开头(?:的客户|客户)?'
      - '{SEARCH}手机{CW}{0,2}尾号(\d{1,11})(?:的客户|客户)?'
      - '{SEARCH}手机号?段(\d{1,11})(?:的客户|客户)?'
      - '{SEARCH}手机{CW}{0,2}号段(\d{1,11})(?:的客户|客户)?'
    field: "clientMobile"
    operator: "MATCH"
    value_type: "capture"
    value:
      group: 1
    priority: 8

  - name: "性别-枚举"
    enum_ref: "clientSex"
    patterns_template:
      - '{SEARCH}性别[为是：:]{enum}(?:的客户|客户)?'
      - '{SEARCH}{enum}性(?:客户)?'
      - '{SEARCH}{enum}客户'
    field: "clientSex"
    operator: "MATCH"
    value_type: "capture"
    value:
      group: 1
    priority: 9

  - name: "性别-简单"
    # 用于组合规则，只匹配"男"或"女"
    enum_ref: "clientSex"
    patterns_template:
      - '{enum}'
    field: "clientSex"
    operator: "MATCH"
    value_type: "capture"
    value:
      group: 1
    priority: 8

  # ==================== 年龄 (clientAge) ====================

  - name: "年龄-中文年代几岁"
    patterns:
      - '{SEARCH}([一二三四五六七八九]?十)几岁(?:的客户|客户)?'
      - '{SEARCH}([一二三四五六七八九]?十)多岁(?:的客户|客户)?'
    field: "clientAge"
    operator: "RANGE"
    value_type: "capture"
    value:
      group: 1
      transform: "chinese_decade_plus_range"
      offset: 1
      range: 9
    priority: 10

  - name: "年龄-青年"
    patterns:
      - '{SEARCH}(青年)(?:客户)?'
    field: "clientAge"
    operator: "RANGE"
    value_type: "static"
    value:
      min: 18
      max: 35
    priority: 5

  - name: "年龄-中年"
    patterns:
      - '{SEARCH}(中年)(?:客户)?'
    field: "clientAge"
    operator: "RANGE"
    value_type: "static"
    value:
      min: 36
      max: 55
    priority: 5

  - name: "年龄-老年"
    patterns:
      - '{SEARCH}(老年)(?:客户)?'
    field: "clientAge"
    operator: "RANGE"
    value_type: "static"
    value:
      min: 56
      max: 100
    priority: 5

  - name: "年龄-未成年"
    patterns:
      - '{SEARCH}(未成年|没成年|未成年人|没成年的)(?:客户)?'
    field: "clientAge"
    operator: "RANGE"
    value_type: "static"
    value:
      min: 0
      max: 18
    priority: 5

  - name: "年龄-精确"
    patterns:
      - '{SEARCH}(\d+)周?岁(?:的客户|客户|的人|人|名单|有哪些人|有哪些|的)?'
      - '{SEARCH}(?<!子女)(?<!小孩)(?<!儿子)(?<!女儿)(?<!小朋友)(?<!孩子)(?<![-~到至])(\d+)周?岁(?:的客户|客户|的人|人|名单|有哪些人|有哪些|的)?'
    field: "clientAge"
    operator: "RANGE"
    value_type: "capture"
    value:
      group: 1
      transform: "exact_range"
    priority: 8

  - name: "年龄-以上"
    patterns:
      - '{SEARCH}(\d+)岁?以上(?:的客户|客户|的人|人|名单|有哪些人|有哪些|的)?'
      - '{SEARCH}大于(\d+)岁(?:的客户|客户|的人|人|名单|有哪些人|有哪些|的)?'
      - '{SEARCH}高于(\d+)岁(?:的客户|客户|的人|人|名单|有哪些人|有哪些|的)?'
      - '{SEARCH}超过(\d+)岁(?:的客户|客户|的人|人|名单|有哪些人|有哪些|的)?'
    field: "clientAge"
    operator: "GTE"
    value_type: "capture"
    value:
      group: 1
      transform: "int"
    priority: 9

  - name: "年龄-以下"
    patterns:
      - '{SEARCH}(\d+)岁?以下(?:的客户|客户|的人|人|名单|有哪些人|有哪些|的)?'
      - '{SEARCH}小于(\d+)岁(?:的客户|客户|的人|人|名单|有哪些人|有哪些|的)?'
      - '{SEARCH}不超过(\d+)岁(?:的客户|客户|的人|人|名单|有哪些人|有哪些|的)?'
      - '{SEARCH}低于(\d+)岁(?:的客户|客户|的人|人|名单|有哪些人|有哪些|的)?'
    field: "clientAge"
    operator: "LTE"
    value_type: "capture"
    value:
      group: 1
      transform: "int"
    priority: 9

  - name: "年龄-范围"
    patterns:
      - '{SEARCH}(\d+)[-~到至](\d+)周?岁(?:的客户|客户|的人|人)?'
    field: "clientAge"
    operator: "RANGE"
    value_type: "range"
    value:
      min_group: 1
      max_group: 2
      transform: "int"
    priority: 9

  - name: "年龄-左右"
    patterns:
      - '{SEARCH}(\d+)岁左右(?:的客户|客户|的人|人|名单|有哪些人|有哪些|的)?'
      - '{SEARCH}(\d+)岁左右有哪些(?:客户|人)?'
    field: "clientAge"
    operator: "RANGE"
    value_type: "exact_range"
    value:
      group: 1
      transform: "exact_range"
      range: 5
    priority: 9

  - name: "年龄-多岁"
    patterns:
      - '{SEARCH}(\d+)多岁(?:的客户|客户)?'
      - '{SEARCH}(\d+)几岁(?:的客户|客户)?'
    field: "clientAge"
    operator: "RANGE"
    value_type: "capture"
    value:
      group: 1
      transform: "plus_range"
      offset: 1
      range: 9
    priority: 9

# ==================== clientBirthday（出生年月日） ====================
  - name: "出生年月日-精确匹配"
    patterns:
      - '{SEARCH}出生[于年月日](\d{8})(?:的客户|客户)?'
      - '{SEARCH}出生日期[为是：:](\d{8})(?:的客户|客户)?'
      - '{SEARCH}生辰(\d{8})(?:的客户|客户)?'
    field: "clientBirthday"
    operator: "MATCH"
    value_type: "capture"
    value:
      group: 1
      transform: "yyyymmdd_to_datetime"
    priority: 9

  - name: "出生年份-范围"
    patterns:
      - '{SEARCH}(\d{4})年(?:出生|出生的|生)(?:的客户|客户)?'
      - '{SEARCH}出生于(\d{4})年(?:的客户|客户)?'
      - '{SEARCH}生于(\d{4})年(?:的客户|客户)?'
    field: "clientBirthday"
    operator: "RANGE"
    value_type: "capture"
    value:
      group: 1
      transform: "year_to_birth_range"
    priority: 8

  - name: "生日-本月"
    patterns:
      - '{SEARCH}本月{CW}{0,2}生日(?:的客户|客户)?'
      - '{SEARCH}这个?月{CW}{0,2}生日(?:的客户|客户)?'
      - '{SEARCH}当月{CW}{0,2}生日(?:的客户|客户)?'
      - '{SEARCH}生日{CW}{0,2}在本月(?:的客户|客户)?'
      - '{SEARCH}生日{CW}{0,2}在这个?月(?:的客户|客户)?'
      - '{SEARCH}生日{CW}{0,2}在当月(?:的客户|客户)?'
    field: "birthdayMd"
    operator: "RANGE"
    value_type: "date_range_dynamic"
    value:
      date_range: "current_month"
      format: "MM-dd"
    priority: 9

  - name: "生日-下个月"
    patterns:
      - '{SEARCH}下个?月{CW}{0,2}生日(?:的客户|客户)?'
      - '{SEARCH}生日{CW}{0,2}在下个?月(?:的客户|客户)?'
    field: "birthdayMd"
    operator: "RANGE"
    value_type: "date_range_dynamic"
    value:
      date_range: "next_month"
      format: "MM-dd"
    priority: 9

  - name: "生日-未来N天"
    patterns:
      - '{SEARCH}未来{CW}{0,2}(\d+)天{CW}{0,2}生日(?:的客户|客户)?'
      - '{SEARCH}(\d+)天内{CW}{0,2}生日(?:的客户|客户)?'
      - '{SEARCH}生日{CW}{0,2}在未来{CW}{0,2}(\d+)天(?:的客户|客户)?'
    field: "birthdayMd"
    operator: "RANGE"
    value_type: "date_range_dynamic"
    value:
      date_range: "next_n_days"
      days_group: 1
      format: "MM-dd"
    priority: 9

  - name: "生日-未来一周"
    patterns:
      - '{SEARCH}未来{CW}{0,2}一周{CW}{0,2}生日(?:的客户|客户)?'
      - '{SEARCH}生日{CW}{0,2}在未来{CW}{0,2}一周(?:的客户|客户)?'
    field: "birthdayMd"
    operator: "RANGE"
    value_type: "date_range_dynamic"
    value:
      date_range: "next_n_days"
      days: 7
      format: "MM-dd"
    priority: 9

  - name: "生日-近期"
    patterns:
      - '{SEARCH}生日(?:快到了|即将到来|快到|将到)(?:的客户|客户|的人)?'
      - '{SEARCH}即将过生日(?:的客户|客户|的人)?'
      - '{SEARCH}近期生日(?:的客户|客户|的人)?'
    field: "birthdayMd"
    operator: "RANGE"
    value_type: "date_range_dynamic"
    value:
      date_range: "next_n_days"
      days: 30
      format: "MM-dd"
    priority: 9

  - name: "生日-下周"
    patterns:
      - '{SEARCH}下周{CW}{0,2}生日(?:的客户|客户)?'
      - '{SEARCH}生日{CW}{0,2}在下周(?:的客户|客户)?'
    field: "birthdayMd"
    operator: "RANGE"
    value_type: "date_range_dynamic"
    value:
      date_range: "next_week"
      format: "MM-dd"
    priority: 9

  - name: "生日-今天"
    patterns:
      - '{SEARCH}今天{CW}{0,2}生日(?:的客户|客户|的人)?'
      - '{SEARCH}今日{CW}{0,2}生日(?:的客户|客户|的人)?'
      - '{SEARCH}生日{CW}{0,2}在今天(?:的客户|客户|的人)?'
      - '{SEARCH}生日{CW}{0,2}是今天(?:的客户|客户|的人)?'
    field: "birthdayMd"
    operator: "RANGE"
    value_type: "date_range_dynamic"
    value:
      date_range: "today"
      format: "MM-dd"
    priority: 10

  - name: "生日-明天"
    patterns:
      - '{SEARCH}明天{CW}{0,2}生日(?:的客户|客户|的人)?'
      - '{SEARCH}明日{CW}{0,2}生日(?:的客户|客户|的人)?'
      - '{SEARCH}生日{CW}{0,2}在明天(?:的客户|客户|的人)?'
      - '{SEARCH}生日{CW}{0,2}是明天(?:的客户|客户|的人)?'
    field: "birthdayMd"
    operator: "RANGE"
    value_type: "date_range_dynamic"
    value:
      date_range: "tomorrow"
      format: "MM-dd"
    priority: 10

  - name: "生日-后天"
    patterns:
      - '{SEARCH}后天{CW}{0,2}生日(?:的客户|客户|的人)?'
      - '{SEARCH}生日{CW}{0,2}在后天(?:的客户|客户|的人)?'
      - '{SEARCH}生日{CW}{0,2}是后天(?:的客户|客户|的人)?'
    field: "birthdayMd"
    operator: "RANGE"
    value_type: "date_range_dynamic"
    value:
      date_range: "day_after_tomorrow"
      format: "MM-dd"
    priority: 10

  # ==================== 学历 (education) ====================

  - name: "学历"
    enum_ref: "education"
    patterns_template:
      - '{SEARCH}{enum}(?:学历|毕业)?(?:的客户|客户|的人|人)?'
      - '{SEARCH}(?!{CW}{0,2}(?:以上|及以上|以下|及以下)){CW}{0,2}{enum}(?:学历|毕业)?(?:的客户|客户|的人|人)?'
      - '{SEARCH}(?!{CW}{0,2}(?:以上|及以上|以下|及以下)){CW}{0,2}(?:学历|毕业)[为是：:]{enum}(?:的客户|客户|的人|人)?'
      - '{SEARCH}(?!{CW}{0,2}(?:以上|及以上|以下|及以下)){CW}{0,2}(?:具有|拥有|获得|取得)[^，,。.]*?{enum}(?:学历|毕业)?(?:的客户|客户|的人|人)?'
    field: "education"
    operator: "MATCH"
    value_type: "capture"
    value:
      group: 1
    priority: 8

  - name: "学历-以上"
    enum_ref: "education"
    patterns_template:
      - '{SEARCH}{enum}(?:学历|毕业)?以上(?:的客户|客户)?'
      - '{SEARCH}以上{CW}{0,2}{enum}(?:学历|毕业)?(?:的客户|客户)?'
    field: "education"
    operator: "CONTAINS"
    value_type: "enum_gt"
    value:
      group: 1
    priority: 9

  - name: "学历-及以上"
    enum_ref: "education"
    patterns_template:
      - '{SEARCH}{enum}(?:学历|毕业)?及以上(?:的客户|客户)?'
      - '{SEARCH}{enum}及以上(?:学历|毕业)?(?:的客户|客户)?'
      - '{SEARCH}{enum}及(?:学历|毕业)?以上(?:的客户|客户)?'
      - '{SEARCH}及以上{CW}{0,2}{enum}(?:学历|毕业)?(?:的客户|客户)?'
    field: "education"
    operator: "CONTAINS"
    value_type: "enum_gte"
    value:
      group: 1
    priority: 9

  - name: "学历-以下"
    enum_ref: "education"
    patterns_template:
      - '{SEARCH}{enum}(?:学历|毕业|及)?以下(?:的客户|客户)?'
    field: "education"
    operator: "CONTAINS"
    value_type: "enum_lte"
    value:
      group: 1
    priority: 9

  # ==================== 婚姻状况 (marriSts) ====================

  - name: "婚姻状况"
    enum_ref: "marriSts"
    patterns_template:
      - '{SEARCH}{enum}(?:的客户|客户)?'
      - '{SEARCH}(?:客户)?.{0,1}婚姻状态.{0,1}(?:的客户|客户)?'
    field: "marriSts"
    operator: "MATCH"
    value_type: "capture"
    value:
      group: 1
    priority: 10

  # ==================== 客户号 (clientNo) ====================

  # 理赔案件号（LC前缀，优先于客户号匹配，避免C被误提取）
  - name: "客户号-匹配"
    patterns:
      - '{SEARCH}客户号{CW}{0,2}[为是：:]\s*([C]?\d{1,15})'
      - '{SEARCH}客户号{CW}{0,2}([C]?\d{1,15})(?:的客户|客户)?'
      - '{SEARCH}(?<![A-Za-z])(C\d{1,15}){CW}{0,2}'   # 无关键词但有强制 C 前缀，负向回溯避免误匹配 LC...
    field: "clientNo"
    operator: "MATCH"
    value_type: "capture"
    value:
      group: 1
    priority: 8

  # 2.1 customer_added_date（客户添加日）
  - name: "客户价值"
    enum_ref: "newValueLabel"
    patterns_template:
      - '{SEARCH}{enum}(?!{CW}{0,2}(?:以上|及以上|更高|以下|及以下))(?:的客户|客户|有哪些客户|有哪些人|名单|的人|人)?'
      - '{SEARCH}客户价值[为是：:]{enum}(?:的客户|客户)?'
      - '{SEARCH}(?:谁是|哪些是)?{enum}(?:的客户|客户)?'
      - '{SEARCH}{enum}有哪些(?:客户)?'
      - '{SEARCH}{enum}都有谁'
      - '{SEARCH}{enum}名单'
    field: "newValueLabel"
    operator: "MATCH"
    value_type: "capture"
    value:
      group: 1
    priority: 8

  - name: "客户价值-A类"
    patterns:
      - '{SEARCH}A类(?:的客户|客户|有哪些客户|名单)?'
    field: "newValueLabel"
    operator: "CONTAINS"
    value_type: "static"
    value:
      - "A1"
      - "A2"
      - "A3"
      - "A4"
    priority: 8

  - name: "客户价值-以上"
    enum_ref: "newValueLabel"
    patterns_template:
      - '{SEARCH}{enum}(?:以上|更高)(?:的客户|客户)?'
      - '{SEARCH}客户价值{CW}{0,2}{enum}(?:以上|更高)(?:的客户|客户)?'
    field: "newValueLabel"
    operator: "CONTAINS"
    value_type: "enum_gt"
    value:
      group: 1
    priority: 9

  - name: "客户价值-及以上"
    enum_ref: "newValueLabel"
    patterns_template:
      - '{SEARCH}{enum}及以上(?:的客户|客户)?'
      - '{SEARCH}客户价值{CW}{0,2}{enum}及以上(?:的客户|客户)?'
    field: "newValueLabel"
    operator: "CONTAINS"
    value_type: "enum_gte"
    value:
      group: 1
    priority: 9

  - name: "客户价值-以下"
    enum_ref: "newValueLabel"
    patterns_template:
      - '{SEARCH}{enum}以下(?:的客户|客户)?'
      - '{SEARCH}客户价值{CW}{0,2}{enum}以下(?:的客户|客户)?'
    field: "newValueLabel"
    operator: "CONTAINS"
    value_type: "enum_lt"
    value:
      group: 1
    priority: 9

  - name: "客户价值-及以下"
    enum_ref: "newValueLabel"
    patterns_template:
      - '{SEARCH}{enum}及以下(?:的客户|客户)?'
      - '{SEARCH}客户价值{CW}{0,2}{enum}及以下(?:的客户|客户)?'
    field: "newValueLabel"
    operator: "CONTAINS"
    value_type: "enum_lte"
    value:
      group: 1
    priority: 9

  # ==================== 客户温度 (clientTemperature) ====================

  - name: "客户温度"
    enum_ref: "clientTemperature"
    patterns_template:
      - '{SEARCH}{enum}(?:客户)?(?!{CW}{0,2}(?:以上|及以上|更高|以下|及以下))(?:的客户|客户|名单|的人|人)?'
      - '{SEARCH}客户温度{CW}{0,2}{enum}(?:客户)?(?!{CW}{0,2}(?:以上|及以上|更高|以下|及以下))(?:的客户|客户|名单|的人|人)?'
      - '{SEARCH}客温{CW}{0,2}{enum}(?:客户)?(?!{CW}{0,2}(?:以上|及以上|更高|以下|及以下))(?:的客户|客户|名单|的人|人)?'
    field: "clientTemperature"
    operator: "MATCH"
    value_type: "capture"
    value:
      group: 1
    priority: 7

  - name: "客户温度-以上"
    enum_ref: "clientTemperature"
    patterns_template:
      - '{SEARCH}{enum}(?:客户)?(?:以上|更高)(?:的客户|客户)?'
      - '{SEARCH}客户温度{CW}{0,2}{enum}(?:以上|更高)(?:的客户|客户)?'
      - '{SEARCH}客温{CW}{0,2}{enum}(?:以上|更高)(?:的客户|客户)?'
    field: "clientTemperature"
    operator: "CONTAINS"
    value_type: "enum_gt"
    value:
      group: 1
    priority: 8

  - name: "客户温度-及以上"
    enum_ref: "clientTemperature"
    patterns_template:
      - '{SEARCH}{enum}(?:客户)?及以上(?:的客户|客户)?'
      - '{SEARCH}客户温度{CW}{0,2}{enum}及以上(?:的客户|客户)?'
      - '{SEARCH}客温{CW}{0,2}{enum}及以上(?:的客户|客户)?'
    field: "clientTemperature"
    operator: "CONTAINS"
    value_type: "enum_gte"
    value:
      group: 1
    priority: 8

  - name: "客户温度-以下"
    enum_ref: "clientTemperature"
    patterns_template:
      - '{SEARCH}{enum}(?:客户)?以下(?:的客户|客户)?'
