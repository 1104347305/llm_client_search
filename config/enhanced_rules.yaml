      - '{SEARCH}(?:的客户|客户)?总?保额{CW}{0,2}超过(\d{5,})(?:的客户|客户|的人|人)?'
    field: "total_coverage"
    operator: "GTE"
    value_type: "capture"
    value:
      group: 1
