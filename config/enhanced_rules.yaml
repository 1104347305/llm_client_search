      - '{SEARCH}(?:的客户|客户)?保障金额{CW}{0,2}(\d+)万?以下(?:的客户|客户)?'
    field: "total_coverage"
    operator: "LTE"
    value_type: "capture"
    value:
      group: 1
      transform: "multiply"
      multiplier: 10000
    priority: 8

  - name: "总保额-范围"
    patterns:
