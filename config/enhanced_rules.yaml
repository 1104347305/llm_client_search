      - '{SEARCH}总?保额{CW}{0,2}超过(\d{4,})(?:都有谁|的客户|客户)?'
      - '{SEARCH}总?保额{CW}{0,2}高于(\d{4,})(?:的客户|客户)?'
      - '{SEARCH}总?保额{CW}{0,2}(\d{4,})以上(?:的客户|客户)?'
      - '{SEARCH}总?保额{CW}{0,2}超过(\d{4,})(?:都有谁|的客户|客户)?'
