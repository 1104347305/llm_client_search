      - '{SEARCH}(?:身份证|证件){CW}{0,2}(?:有效期)?{CW}{0,2}(?:快到期|即将到期|快过期|将到期)(?:的客户|客户)?'
      - '{SEARCH}(?:快到期|即将到期|快过期|将到期)的?(?:身份证|证件)(?:有效期)?(?:的客户|客户)?'
      - '{SEARCH}(?:身份证|证件)(?:有效期)?近期到期(?:的客户|客户)?'
    field: "idValidDate"
    operator: "LTE"
    value_type: "date_range_dynamic"
    value:
      date_range: "today_plus_n_days"
      days: 30
      format: "yyyy-MM-dd HH:mm:ss"
    priority: 9

